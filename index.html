ion":"Client Scenarios","question":"An adviser recommends a client invest in a product the adviser knows will be closed to new investors next week, without disclosing this. Which Standard is MOST directly breached?","a":"Standard 4","b":"Standard 7","c":"Standard 9","d":"Standard 12","correct":"C","explanation":"X A - Standard 4 - This is incorrect because Standard 4 requires the client's free, prior and informed consent. While non-disclosure of imminent closure affects whether consent is truly informed, the primary breach is the misleading nature of the advice itself - which is Standard 9. X B - Standard 7 - This is incorrect because Standard 7 requires fees to be fair and represent value for money. The issue here is not about remuneration - it is about the adviser providing misleading advice by omitting a material fact about the recommended product. \u2713 C - Standard 9 - This is correct because Standard 9 of the FASEA Code requires that all advice be 'neither misleading nor deceptive.' Recommending a product the adviser knows will be closed to new investors imminently, without disclosing this material fact, is misleading conduct - the client is making a decision based on incomplete information the adviser possesses. X D - Standard 12 - This is incorrect because Standard 12 requires advisers to uphold and promote the ethical standards of the profession. While the conduct described ultimately involves an ethical failing, the most direct and specific breach is Standard 9 - misleading and deceptive advice.","type":"standard"},{"section":"Client Scenarios","question":"A client made a large profit on a technology stock five years ago and continues to allocate heavily to tech stocks. This is BEST described as:","a":"Recency bias","b":"Overconfidence bias","c":"Anchoring","d":"Availability bias","correct":"D","explanation":"X A - Recency bias - This is incorrect because recency bias involves overweighting the most recent events. The defining profit was five years ago - it is not a recent event. Availability bias is the more precise explanation because the profit is memorable (available in memory) rather than recent. X B - Overconfidence bias - This is incorrect because overconfidence involves overestimating one's own knowledge and predictive ability. The client is not claiming superior analytical skill - they are being influenced by a vivid past experience, which is availability bias. X C - Anchoring - This is incorrect because anchoring involves fixation on a specific price point as a reference. The client's ongoing technology overallocation is driven by the emotional salience of the memorable profit - not by fixation on a specific stock price. \u2713 D - Availability bias - This is correct because availability bias causes investors to overweight easily recalled, vivid personal experiences when making decisions. The large profit made five years ago is a memorable, emotionally significant experience - its vividness makes it disproportionately influential in the investor's ongoing assessment of technology stocks, causing continued overallocation.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following is the MOST important reason for an AFS licensee to maintain an approved product list (APL)?","a":"To limit individual adviser liability for product recommendations","b":"To maximise the licensee's revenue from preferred product manufacturers","c":"To ensure advisers only recommend products that have been subject to proper","d":"To satisfy the Privacy Act obligations on collection of client financial","correct":"C","explanation":"X A - The APL protects clients, not advisers; it does not limit adviser liability. X B - Revenue maximisation from manufacturers would create a structural conflict of interest; that is contrary to the APL's proper purpose. \u2713 C - The primary purpose of an APL is to ensure that products available for recommendation have been subjected to appropriate due diligence by the licensee, helping to satisfy the licensee's s912A obligations and the adviser's best interests duty. X D - The Privacy Act governs personal information handling; it does not require or regulate APLs.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the role of an adviser in managing client behavioural biases?","a":"Eliminating all client biases through structured education programs","b":"Making investment decisions on behalf of the client to bypass biases","c":"Helping clients recognise their biases and implement strategies that support","d":"Ignoring biases and focusing solely on technical portfolio analysis","correct":"C","explanation":"X A - Biases cannot be fully eliminated; the goal is to manage their impact, not eradicate them. X B - Making decisions on behalf of the client would undermine autonomy and likely breach Standard 4 (informed consent). \u2713 C - The adviser's role is to help clients recognise their behavioural tendencies and implement structural strategies - such as investment policy statements and automatic rebalancing - that support their long-term goals despite those tendencies. X D - Ignoring behavioural factors produces portfolios clients will not maintain, making technical analysis alone insufficient.","type":"standard"},{"section":"Client Scenarios","question":"Under APP 3, a financial planning firm may only collect personal information that is:","a":"Information required by the Australian Taxation Office for compliance","b":"Information reasonably necessary for one or more of the entity's functions or activities","c":"Any information the client chooses to voluntarily provide to the firm","d":"Information that has been approved by the licensee's compliance team","correct":"B","explanation":"X A - ATO requirements may justify specific collection but are not the general test under APP 3. \u2713 B - APP 3 limits collection of personal information to what is reasonably necessary for one or more of the entity's functions or activities. Collection beyond this is a breach regardless of the client's willingness to provide it. X C - Voluntary provision by a client does not override APP 3; the collection must still be reasonably necessary. X D - Internal compliance approval is not the test under APP 3; the Act sets the standard, not the licensee.","type":"standard"},{"section":"Client Scenarios","question":"A client says 'I knew the market would crash' after a significant correction, despite having no prior concern. This is BEST described as:","a":"Hindsight bias","b":"Confirmation bias","c":"Recency bias","d":"Overconfidence","correct":"A","explanation":"\u2713 A - Hindsight bias - This is correct because hindsight bias causes people to believe, after an event has occurred, that they predicted or knew it would happen. Saying 'I knew the market would crash' after a significant correction - when no protective action was taken before the event - is the textbook example of hindsight bias: reconstructing memory to include a prediction that was not actually made. X B - Confirmation bias - This is incorrect because confirmation bias is prospective - it involves seeking confirming information before making a decision. Hindsight bias is retrospective - it involves rewriting memory after an event to believe one predicted it. These are distinct biases. X C - Recency bias - This is incorrect because recency bias causes investors to overweight recent events in forward-looking decisions. The statement 'I knew it would crash' is about the past - it is a retrospective memory distortion, not a forward-looking overweighting of recent data. X D - Overconfidence - This is incorrect because overconfidence involves a forward-looking overestimate of one's predictive ability. Hindsight bias is backward-looking - it involves rewriting past memories to appear more prescient than one actually was. While they can reinforce each other, the described statement is specifically hindsight bias.","type":"standard"},{"section":"Client Scenarios","question":"Under APP 11, when must an entity destroy or de-identify personal information?","a":"After every client meeting where new information has been collected","b":"When the information is no longer needed for any purpose and no legal","c":"When a client requests destruction, regardless of any applicable","d":"After three years of inactivity on the client's account automatically","correct":"B","explanation":"X A - Destruction after every meeting would eliminate records that are still needed; the test is whether they are still needed. \u2713 B - APP 11(2) requires entities to destroy or de-identify personal information when it is no longer needed for any purpose for which it may lawfully be used or disclosed, and there is no legal obligation to retain it. X C - A client request does not override a legal retention obligation such as the seven-year Corporations Act requirement. X D - Inactivity on an account is not the test; ongoing legal retention obligations may still apply regardless of account activity.","type":"standard"},{"section":"Client Scenarios","question":"A client is considering whether to use savings or take out a car loan to purchase a vehicle. Their financial adviser is asked: 'What would you do?' What can the adviser discuss without needing an ACL?","a":"The adviser can discuss financial planning implications without providing","b":"Advise the client to use savings - this is incidental financial advice fully","c":"Refuse to discuss the topic entirely - any connection to credit is outside the scope of an AFSL","d":"Recommend a specific bank car loan as it constitutes factual","correct":"A","explanation":"\u2713 A - An adviser can discuss the financial planning implications (cash flow, opportunity cost, impact on investments) without providing credit advice. For a specific loan product recommendation, a credit licensee is required. X B - Recommending the client use savings over a loan is a specific financial recommendation; the adviser must ensure it is in the client's best interests. X C - Discussing cash flow implications of a loan versus savings is within the financial adviser's scope; the restriction is on recommending specific credit products. X D - Recommending a specific bank loan is credit advice; a credit licence is required.","type":"standard"},{"section":"Behavioural Finance","question":"Which of the following is most likely to cause an investor to abandon a long-term strategy?","a":"Diversification","b":"Long-term planning","c":"Market volatility","d":"Professional advice","correct":"C","explanation":"\u2717 A - Diversification - This is incorrect because diversification is a risk management strategy that actually supports long-term strategies by reducing the volatility of individual holdings. Diversification makes it easier, not harder, to maintain a long-term plan. \u2717 B - Long-term planning - This is incorrect because long-term planning is designed to maintain investment discipline and helps investors stay committed to their strategy through market fluctuations. It is a factor that reduces the likelihood of abandoning a strategy. \u2713 C - Market volatility - This is correct because behavioural finance research consistently shows that market volatility triggers emotional responses - particularly fear and loss aversion - that cause investors to abandon long-term strategies and make panic-driven decisions inconsistent with their financial plans. \u2717 D - Professional advice - This is incorrect because professional financial advice is a key mechanism for helping clients maintain their long-term strategy during volatile periods. A good adviser actively works to prevent clients from abandoning their plans under emotional pressure.","type":"standard"},{"section":"Client Scenarios","question":"Under s912A, a licensee must have adequate arrangements for managing conflicts of interest. Which of the following MOST clearly demonstrates inadequate conflict management?","a":"Disclosing all conflicts generically in the FSG without specific","b":"Maintaining a conflicts register and reviewing it quarterly","c":"Training advisers on conflict identification annually","d":"Maintaining separation between product manufacturing and advice arms","correct":"A","explanation":"\u2713 A - Generic FSG disclosure without specific client-level disclosure - This is correct because s912A of the Corporations Act requires an AFS licensee to have 'adequate arrangements for managing conflicts of interest.' Generic FSG disclosure - the same boilerplate statement to all clients - does not constitute adequate conflict management. Conflicts must be identified, disclosed specifically and managed at the individual client level. X B - Maintaining a conflicts register with quarterly review - This is incorrect because maintaining a regularly reviewed conflicts register is an element of adequate conflict management under s912A. It is not inadequate - it is part of what a compliant conflicts management framework should include. X C - Training advisers on conflict identification annually - This is incorrect because training advisers to identify conflicts is a proactive compliance measure consistent with s912A's requirement for adequate arrangements. Annual training is a reasonable compliance practice. X D - Maintaining structural separation - This is incorrect because structural separation between product manufacturing and advice arms is one of the most robust forms of conflict management. It reduces structural conflicts at source - this is consistent with s912A, not a breach of it.","type":"standard"},{"section":"Client Scenarios","question":"Under the Privacy Act, when is an entity permitted to use personal information for a secondary purpose without consent?","a":"Never - client consent is always required before any secondary use of personal information","b":"Where the secondary purpose is directly related to the primary purpose and the individual would reasonably expect it","c":"Only with prior written approval obtained from the OAIC for the specific use","d":"Only for direct marketing sent to existing clients with an active account","correct":"B","explanation":"X A - APP 6 contains exceptions that permit secondary use without consent in specified circumstances. \u2713 B - APP 6(b) permits use or disclosure of personal information for a secondary purpose without consent where the secondary purpose is directly related to the primary purpose of collection and the individual would reasonably expect that use. X C - OAIC approval is not required for any permitted use under APP 6; the APPs set the conditions directly. X D - Direct marketing is governed by APP 7; APP 6(b) applies more broadly to any directly related secondary purpose.","type":"standard"},{"section":"Client Scenarios","question":"A client who has had three successful share picks in a row tells their adviser: 'I don't need diversification - I can read the market better than the fund?","a":"Sell winning investments too quickly to lock in gains","b":"Hold losing investments too long due to reluctance to accept a loss","c":"Underestimate personal risk and overtrade, reducing net returns","d":"Follow market trends driven by other overconfident investors","correct":"C","explanation":"X A - Selling winners early is the disposition effect, not the primary consequence of overconfidence. X B - Holding losers too long reflects loss aversion and the sunk cost fallacy, not overconfidence. \u2713 C - Overconfidence bias, particularly following a streak of success, leads investors to underestimate risk and overtrade. Excessive trading increases transaction costs and typically reduces net returns relative to a disciplined strategy. X D - Following market trends is herding behaviour; overconfidence typically produces the opposite - a belief in independent superior judgment.","type":"standard"}]},{"label":"Wednesday 2 July","mode":"standards","warmup":[{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","b":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","correct":"A","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"B","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"D","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","correct":"C","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"D","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"B","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"D","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"C","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"C","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"B","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"C","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"D","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7}],"questions":[{"section":"Client Scenarios","question":"Under s912D, when must a licensee notify ASIC of a significant breach?","a":"Within 30 calendar days of becoming aware of the breach","b":"Within 10 business days of becoming aware of the breach","c":"Within 5 business days of the breach first occurring","d":"Within 60 calendar days of the end of the financial year","correct":"A","explanation":"\u2713 A - Under s912D of the Corporations Act as amended by the Financial Sector Reform (Hayne Royal Commission Response) Act 2020, a licensee must notify ASIC of a significant breach (or likely significant breach) within 30 calendar days of becoming aware of it. X B - 10 business days was a former standard under the old breach reporting regime; the current requirement is 30 calendar days. X C - 5 business days applies to certain AUSTRAC reporting obligations, not Corporations Act breach reporting. X D - 60 days was never the applicable standard; the current obligation is 30 calendar days of awareness.","type":"standard"},{"section":"Ethics & Corps Act","question":"Which obligation under the Corporations Act applies when personal advice is given to a retail client?","a":"Provide a Statement of Advice (SOA)","b":"Provide a Product Disclosure Statement (PDS)","c":"Provide a Financial Services Guide (FSG) only","d":"Provide a Target Market Determination (TMD)","correct":"A","explanation":"\u2713 A - s946A of the Corporations Act requires an adviser to provide a Statement of Advice when personal advice is given to a retail client. \u2717 B - A PDS must be provided when recommending a specific financial product, not as a general consequence of giving personal advice. \u2717 C - An FSG is provided at first contact, not specifically triggered by giving advice; providing an FSG alone does not satisfy the SOA obligation. \u2717 D - A TMD is a product issuer obligation under the DDO regime; it is not provided by the adviser.","type":"standard"},{"section":"Client Scenarios","question":"Under the FASEA Code, which value is MOST directly relevant to ensuring an adviser fully investigates a client's existing insurance before recommending changes?","a":"Honesty","b":"Trustworthiness","c":"Diligence","d":"Fairness","correct":"C","explanation":"X A - Honesty - This is incorrect because Honesty relates to truthful, transparent communication. Thorough research is about the quality of the advice process - Honesty is most relevant when presenting findings to the client. X B - Trustworthiness - This is incorrect because Trustworthiness relates to reliability and consistent client-focused conduct. While thorough research contributes to trustworthiness, Diligence is the value most directly engaged by careful pre-recommendation research. \u2713 C - Diligence - This is correct because the FASEA Code value of Diligence requires advisers to perform professional engagements with due care and thoroughness. Conducting careful, thorough research before recommending an investment directly embodies this value. X D - Fairness - This is incorrect because Fairness requires professional objectivity and impartial treatment. Conducting thorough research is about due care - most directly the value of Diligence.","type":"standard"},{"section":"Client Scenarios","question":"During a review meeting, a client asks their financial adviser: 'Can I claim my home office expenses as a tax deduction?' The adviser is not TPB-registered. Which of the following BEST describes the adviser's obligations?","a":"Answer the question - explaining a tax deduction is factual","b":"Answer based on their general knowledge as the question is straightforward","c":"Explain that advising on tax deductions falls under TASA","d":"Ignore the tax question entirely and redirect to the investment topics","correct":"C","explanation":"X A - Advising on tax deductions is not merely providing factual information; it constitutes tax advice under TASA. X B - The complexity of the question does not determine whether registration is required; the nature of the advice does. \u2713 C - Advising on whether specific expenses are deductible is advice about tax obligations under a taxation law, which constitutes tax advice under TASA. Without TPB registration, the adviser must not provide this advice and should refer to a registered tax agent. X D - Ignoring the question is unhelpful; the appropriate response is to explain the limitation and refer.","type":"standard"},{"section":"Client Scenarios","question":"A client has existing income protection through their superannuation fund. An adviser recommends a retail income protection policy without comparing it to the current cover. Which standard is the adviser MOST in breach of?","a":"Standard 8 - the adviser failed to maintain complete records of existing insurance","b":"Standard 12 - the adviser failed to hold themselves accountable","c":"s961B(2)(d) - the safe harbour requires the adviser to consider the client's subject matter of advice and the basis for the recommendation","d":"s961B(2)(e) - the adviser must identify and consider the client's existing financial products, including insurance inside super","correct":"D","explanation":"X A - Standard 8 governs record keeping; the primary issue here is the failure to identify and consider existing cover. X B - Standard 12 addresses peer accountability; it does not govern the duty to investigate existing products. X C - s961B(2)(d) requires consideration of the client's relevant circumstances; s961B(2)(e) more precisely captures the obligation to identify existing products. \u2713 D - Section 961B(2)(e) requires the adviser to identify and consider the subject matter of the advice, including existing financial products. Failing to compare the recommended retail cover against existing super fund insurance breaches this safe harbour step.","type":"standard"},{"section":"Client Scenarios","question":"Standard 1 of the FASEA Code requires advisers to act in accordance with all applicable laws. Which of the following actions would MOST clearly breach Standard 1?","a":"Referring a client to a specialist without full documentation","b":"Providing scaled advice within an agreed scope","c":"Charging a flat fee disclosed in the Statement of Advice","d":"Technically complying while deliberately avoiding the intent","correct":"D","explanation":"X A - Referring clients to specialists is permissible and does not breach Standard 1. X B - Scaled advice within an agreed scope is expressly permitted under the Corporations Act. X C - A flat fee disclosed in the SOA is consistent with Standard 7 and the Corporations Act. \u2713 D - Standard 1 requires compliance not just with the letter of the law but its spirit. Deliberately exploiting a loophole to circumvent legislative intent breaches Standard 1.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the concept of 'informed consent' under Standard 4?","a":"The client signs all documentation provided to them by the adviser","b":"The client understands the advice, risks, fees and any conflicts","c":"The client verbally confirms they are happy","d":"The client has received and acknowledged receipt of a Statement of Advice","correct":"B","explanation":"X A - Signing documents without understanding them does not satisfy Standard 4. \u2713 B - Standard 4 requires free, prior and informed consent. The client must genuinely understand the advice, its risks, the fees involved and any conflicts of interest before agreeing to proceed. X C - A verbal 'happy to proceed' without genuine understanding does not satisfy the informed consent requirement. X D - Receiving an SOA does not in itself constitute informed consent - understanding is required.","type":"standard"},{"section":"Client Scenarios","question":"Under s912A(1)(aa), an AFS licensee must maintain a dispute resolution system. What does this require?","a":"Maintaining an internal legal team capable of managing all adviser-related","b":"Having both an internal dispute resolution process (IDR) and membership of an ASIC-approved external dispute resolution scheme","c":"Becoming a member of AFCA as the sole external dispute resolution","d":"Providing an internal complaints process only","correct":"B","explanation":"X A - An internal legal team does not constitute a compliant IDR process under RG 271. \u2713 B - Under s912A(1)(aa), a licensee must maintain both an internal dispute resolution (IDR) process complying with ASIC standards (RG 271) and membership of an approved external dispute resolution scheme (AFCA). X C - AFCA membership alone is insufficient; an internal IDR process must also be maintained. X D - Internal process only, without AFCA membership, does not satisfy s912A(1)(aa).","type":"standard"},{"section":"Behavioural Finance","question":"An adviser knows their client tends to panic during market downturns and make impulsive decisions. Understanding the client's behavioural investor type helps the adviser to:","a":"Increase investment frequency","b":"Maximise trading volume","c":"Provide tailored investment advice","d":"Increase portfolio complexity","correct":"C","explanation":"\u2717 A - Increase investment frequency - This is incorrect because increasing trading frequency is associated with poor long-term outcomes and higher costs. It is inconsistent with acting in the client's best interests under s961B of the Corporations Act. \u2717 B - Maximise trading volume - This is incorrect because maximising trading volume serves the adviser's or firm's fee interest, not the client's best interests. Recommendations to increase volume would raise concerns about churning under Standard 2 of the FASEA Code. \u2713 C - Provide tailored investment advice - This is correct because understanding a client's behavioural investor type helps an adviser provide advice tailored to how that client actually thinks about and responds to investment decisions - not just their stated risk tolerance, but their likely behaviour in practice. This is consistent with Standard 5 of the FASEA Code (advice appropriate to individual circumstances). \u2717 D - Increase portfolio complexity - This is incorrect because for emotionally driven investors, increasing portfolio complexity typically worsens outcomes by creating more decision points and more opportunities for emotionally driven reactions.","type":"standard"},{"section":"Client Scenarios","question":"A client asks an adviser to send their personal financial records to a third-party comparison website. The adviser does so. Which APP is MOST directly engaged?","a":"APP 6","b":"APP 3","c":"APP 8","d":"APP 11","correct":"A","explanation":"\u2713 A - APP 6 - This is correct because APP 6 of the Privacy Act 1988 (Cth) governs the use and disclosure of personal information. Sending personal financial records to a third-party financial institution at the client's request is a secondary disclosure - it goes beyond the primary purpose for which the information was collected. APP 6 permits this disclosure where the client has specifically consented (which they have by requesting it). X B - APP 3 - This is incorrect because APP 3 governs the collection of personal information. The records have already been collected - sending them to a third party is a disclosure issue, not a collection issue. X C - APP 8 - This is incorrect because APP 8 governs cross-border disclosure. The third-party financial institution is not specified as overseas - APP 6 governs the general use and disclosure framework including domestic disclosures. X D - APP 11 - This is incorrect because APP 11 governs the security of personal information. Sending information to a third party at the client's request is a deliberate, authorised disclosure - not a security failure.","type":"standard"},{"section":"Privacy & AML/CTF","question":"An AFSL holder stores client data electronically. What is their primary obligation?","a":"Allow unrestricted client and staff access to all stored data","b":"Destroy all electronic records within 30 days of collection","c":"Share it with product providers as part of standard onboarding","d":"Protect the information from unauthorised access or disclosure","correct":"D","explanation":"\u2717 A - Unrestricted access is contrary to APP 11; access must be controlled and limited to those who need it. \u2717 B - APP 11 requires protection, not immediate destruction; retention obligations under the Corporations Act also apply. \u2717 C - Sharing data with product providers without a proper basis would likely breach APP 6 as well as APP 11. \u2713 D - APP 11 requires entities to take reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification and disclosure.","type":"standard"},{"section":"Client Scenarios","question":"COMMON MISCONCEPTION: An adviser believes they can use the title 'independent' because they rebate all commissions and volume payments back to clients. Is this correct?","a":"No - s923A prohibits receiving conflicted remuneration at all, regardless of rebating","b":"Yes - full rebating combined with transparent disclosure satisfies s923A's independence requirements","c":"Yes - rebating demonstrates the adviser is not financially influenced","d":"Yes - as long as the rebating arrangement is fully disclosed in the FSG","correct":"A","explanation":"\u2713 A - Section 923A requires that the adviser does not receive commissions or volume payments at all. Rebating them after receipt does not cure the initial receipt; the independence test requires that conflicted remuneration is not received in the first place. X B - Disclosure and rebating do not satisfy s923A; the prohibition is on receipt, not on ultimate retention. X C - Rebating does not address the influence at the point of receipt. X D - FSG disclosure is not a substitute for the independence requirements.","type":"standard"},{"section":"Client Scenarios","question":"COMMON MISCONCEPTION: An adviser is working with an elderly client who has granted an enduring power of attorney to her adult son. Should the adviser take instructions from the son rather than the client?","a":"Yes - once an EPOA is in place, the attorney has full authority to make all decisions regardless of the donor's capacity","b":"No - unless the client is legally incapacitated","c":"Yes - the adviser's duty runs to the EPOA holder as they are legally","d":"Yes - the EPOA holder's instructions take priority over the client's","correct":"B","explanation":"X A - An EPOA does not give the attorney authority while the donor retains legal capacity. \u2713 B - An enduring power of attorney only becomes operative when the donor loses legal capacity. Until that point, the client retains full legal capacity and the adviser's duty runs directly to the client. X C - The duty runs to the client until capacity is lost; the EPOA holder has no authority while the client has capacity. X D - Execution of the EPOA does not activate it; activation requires the client to have lost legal capacity.","type":"standard"},{"section":"Client Scenarios","question":"An investor continues to hold a losing managed fund because they 'have always used this fund.' This is BEST described as:","a":"Loss aversion","b":"Overconfidence","c":"Herding","d":"Status quo bias","correct":"D","explanation":"X A - Loss aversion - This is incorrect because loss aversion specifically relates to the asymmetric pain of losses compared to gains - it drives the reluctance to sell and crystallise a paper loss. Holding a fund because of long familiarity (not to avoid realising a loss) is status quo bias. X B - Overconfidence - This is incorrect because overconfidence involves overestimating one's own knowledge or predictive ability. Holding a familiar fund without analysis reflects inertia, not an inflated belief in one's own investment expertise. X C - Herding - This is incorrect because herding involves following the investment decisions of others. Holding a familiar fund out of inertia is an individual preference-based decision - it is not driven by following the crowd. \u2713 D - Status quo bias - This is correct because status quo bias, identified in behavioural economics research, is the tendency to maintain existing positions through inertia - even when change would be beneficial. Holding a managed fund solely because 'I've always used this fund' - without current evidence-based analysis - is the defining example of status quo bias: the preference for the familiar current state over potentially better alternatives.","type":"standard"},{"section":"Client Scenarios","question":"Standard 9 requires advice to be offered in good faith, with competence, and to be neither misleading nor deceptive. Which of the following MOST clearly breaches Standard 9?","a":"Providing a balanced assessment of a product's risks","b":"Recommending a product the adviser has thoroughly researched","c":"Describing a speculative investment as virtually guaranteed to a risk-averse","d":"Acknowledging uncertainty about future returns when presenting","correct":"C","explanation":"X A - Providing a balanced risk/return assessment is precisely what Standard 9 requires. X B - Thorough research before recommending is consistent with Standard 9. \u2713 C - Standard 9 prohibits misleading or deceptive advice. Describing a speculative investment as 'virtually guaranteed' to a risk-averse client is false and misleading conduct. X D - Acknowledging uncertainty is good practice and consistent with acting in good faith.","type":"standard"},{"section":"Ethics & Corps Act","question":"An adviser recommends a high-growth managed fund to a 72-year-old client with a conservative risk profile who needs income in retirement. Under s961G of the Corporations Act, which of the following BEST describes what the obligation requires?","a":"Advice must be based on the adviser's professional experience","b":"Advice must always result in a specific product recommendation","c":"Advice must result in better returns than the client currently achieves","d":"Advice must be appropriate to the client's individual circumstances","correct":"D","explanation":"\u2717 A - Appropriateness is assessed against the client's circumstances, not the adviser's experience. \u2717 B - s961G does not require a product recommendation; it requires that whatever is recommended is appropriate. \u2717 C - Appropriateness is a process test, not an outcome guarantee. \u2713 D - s961G requires advice to be appropriate if it is reasonable to conclude, given the client's circumstances, that the client would be likely to benefit.","type":"standard"},{"section":"Client Scenarios","question":"When an adviser explains to a client that they will feel the pain of a $10,000 loss far more intensely than the pleasure of a $10,000 gain, they are describing?","a":"Investors rationally evaluate all prospects based on expected utility","b":"People evaluate outcomes relative to a reference point and weight losses more heavily than equivalent gains","c":"Investors prefer certain small gains over uncertain larger gains in all situations","d":"Investment decisions are always rational when made by financially literate people","correct":"B","explanation":"X A - Expected utility theory assumes rational evaluation; prospect theory was developed specifically to challenge this assumption. \u2713 B - Prospect theory, developed by Kahneman and Tversky, describes how people evaluate outcomes relative to a reference point and consistently weight losses more heavily than equivalent gains. This asymmetry is the theoretical foundation of loss aversion. X C - Preference for certain gains over uncertain gains describes risk aversion in specific contexts but does not capture the core loss/gain asymmetry of prospect theory. X D - Prospect theory demonstrates that financial decision-making is systematically irrational in predictable ways.","type":"standard"},{"section":"Client Scenarios","question":"Under s912A, a licensee discovers an adviser has been providing advice outside their authorisation for six months without detection. Which of the following BEST describes the licensee's position?","a":"The licensee's supervision and monitoring systems were inadequate","b":"Only the individual adviser is responsible for acting outside their authorisation","c":"The licensee is required to terminate the adviser immediately upon discovery","d":"No breach occurs at the licensee level if the adviser is subsequently","correct":"A","explanation":"\u2713 A - Six months of unauthorised advice going undetected demonstrates the licensee's supervision and monitoring systems failed. This breaches s912A(1)(d) (adequate resources and supervision) and s912A(1)(e) (ensuring only competent and authorised people provide advice). X B - The licensee bears responsibility for the conduct of its authorised representatives and for having systems that detect unauthorised conduct. X C - Termination of the adviser may be appropriate but is not the primary regulatory consequence; the breach is the supervisory failure. X D - Subsequent termination does not cure the breach; the supervisory failure existed throughout the six months of undetected conduct.","type":"standard"},{"section":"Client Scenarios","question":"A stockbroker places a trade on behalf of a client using information about another client's large pending order to benefit the first client's position. This conduct is BEST described as:","a":"Insider trading - using material non-public information to trade in a security","b":"Churning - excessive trading to generate commission without client benefit","c":"Front-running - using non-public order information","d":"Market manipulation - creating an artificial appearance of trading","correct":"C","explanation":"X A - Insider trading involves trading on material non-public information about a company; front-running involves non-public order flow information. X B - Churning involves excessive transaction frequency to generate commissions; it does not involve trading ahead of client orders. \u2713 C - Front-running involves using knowledge of a pending client order to trade in the same security before executing the client's order, profiting from the price movement the order will cause. X D - Market manipulation involves creating misleading artificial trading activity; front-running is about exploiting order flow knowledge.","type":"standard"},{"section":"SOA/FDS/FSG Obligations","question":"A prospective client asks their adviser 'What does your FSG actually tell me?' The primary purpose of a Financial Services Guide is to:","a":"To provide specific financial product advice to the client","b":"To disclose the licensee's past investment performance and returns","c":"To replace the Statement of Advice for general advice engagements","d":"To explain the services offered, how the adviser is remunerated","correct":"D","explanation":"\u2717 A - Specific advice is contained in an SOA; the FSG describes the services available and the business relationship. \u2717 B - Past investment performance is not a required or appropriate FSG disclosure; the FSG is about the services offered. \u2717 C - An FSG cannot replace an SOA; they serve entirely different purposes under the Corporations Act. \u2713 D - Under s942B and s942C of the Corporations Act, an FSG must explain the financial services offered, how the adviser and licensee are remunerated, any relationships that could influence advice, and how to make a complaint.","type":"standard"},{"section":"Behavioural Finance","question":"An investor believes they can consistently pick winning stocks because they have made correct calls three times in a row.","a":"Loss aversion","b":"Hindsight bias","c":"Overconfidence bias","d":"Confirmation bias","correct":"C","explanation":"\u2717 A - Loss aversion relates to the asymmetric pain of losses versus gains; it does not explain overestimation of skill. \u2717 B - Hindsight bias involves believing one predicted an outcome after it has occurred; the issue here is forward-looking overestimation of skill. \u2713 C - Overconfidence bias involves overestimating one's own ability based on limited experience. Three correct calls in a row is a small sample that does not support the conclusion that the investor has genuine skill in stock selection. \u2717 D - Confirmation bias involves seeking confirming information; the issue here is an overestimation of ability from a small sample.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the purpose of the 'safe harbour' steps in s961B(2)?","a":"To guarantee that the adviser cannot be sued by clients","b":"To replace the Code of Ethics obligations for retail advice engagements","c":"To provide evidence that the adviser took steps in the client's best","d":"To limit the adviser's financial liability to the amount of the advice","correct":"C","explanation":"X A - Safe harbour is evidentiary, not immunity; it reduces but does not eliminate the risk of a finding of breach. X B - Safe harbour operates alongside the Code; it does not replace the Code's ethical obligations. \u2713 C - The s961B(2) safe harbour steps provide evidentiary protection - completing them is evidence that the adviser acted in the client's best interests. They do not guarantee immunity. X D - Safe harbour does not cap liability to the fee amount.","type":"standard"},{"section":"Client Scenarios","question":"Under the AML/CTF Act, a 'designated service' triggers customer identification and verification obligations. Which of the following is a designated service?","a":"Providing a financial product such as opening a bank account","b":"Providing general financial advice on investment strategies to retail","c":"Preparing and lodging a client's annual income tax return with the ATO","d":"Conducting a formal property valuation for mortgage lending purposes","correct":"A","explanation":"\u2713 A - Under s6 of the AML/CTF Act, designated services include financial product-related services such as operating accounts, issuing managed funds, and transmitting or exchanging currency. These trigger customer identification obligations. X B - Providing financial advice is not a designated service under the AML/CTF Act; it does not trigger customer identification obligations under that Act. X C - Tax return preparation is regulated by the Tax Practitioners Board and is not a designated service under the AML/CTF Act. X D - Property valuations are not a designated service under the AML/CTF Act.","type":"standard"},{"section":"Client Scenarios","question":"An adviser provides advice to a self-managed superannuation fund trustee. Does the FASEA Code of Ethics apply?","a":"Yes - the Code applies to all relevant providers regardless of the client type","b":"No - the Code only applies when personal advice is given to individual","c":"Only if the SMSF holds more than $500,000 in assets under management","d":"Only if the advice specifically relates to insurance held inside the SMSF","correct":"A","explanation":"\u2713 A - The FASEA Code of Ethics applies to all relevant providers (as defined in the Corporations Act) regardless of whether the client is an individual, a company or an SMSF trustee. The Code is not limited by client type. X B - The Code's application is not limited to retail clients or individuals; it applies to the adviser's conduct generally. X C - There is no asset threshold in the Code; it applies regardless of fund size. X D - The Code applies to all advice provided by the adviser, not only insurance advice.","type":"standard"},{"section":"Ethics & Corps Act","question":"The requirement to provide an FSG (Financial Services Guide) arises under which Part of the Corporations Act?","a":"Part 7.6","b":"Part 7.7A","c":"Part 7.7","d":"Part 7.8","correct":"C","explanation":"\u2717 A - Part 7.6 - This is incorrect because Part 7.6 of the Corporations Act governs the licensing regime - the granting, conditions, cancellation and suspension of Australian Financial Services Licences. \u2717 B - Part 7.7A - This is incorrect because Part 7.7A of the Corporations Act contains the best interests duty (s961B), the appropriate advice obligation (s961G) and the priority rule (s961J). \u2713 C - Part 7.7 - This is correct because the obligation to provide a Financial Services Guide is contained in Part 7.7 of the Corporations Act 2001 (Cth), specifically in Division 2 of Part 7.7 (ss941A-941F). Part 7.7 deals broadly with financial services disclosure. \u2717 D - Part 7.8 - This is incorrect because Part 7.8 of the Corporations Act deals with product disclosure - the obligation to provide a Product Disclosure Statement when recommending a specific financial product.","type":"standard"},{"section":"Client Scenarios","question":"Under the DDO regime, what is the primary obligation of an AFS licensee acting as a distributor?","a":"To prepare and maintain a Target Market Determination for each product","b":"To take reasonable steps to ensure products are distributed","c":"To independently review and reissue the TMD on an annual basis","d":"To obtain prior ASIC approval before distributing any new financial product","correct":"B","explanation":"X A - Preparing the TMD is the product issuer's obligation, not the distributor's. \u2713 B - Under Part 7.8A, a distributor's primary obligation is to take reasonable steps to ensure distribution of a product is consistent with the product's TMD. X C - Annual TMD review is the issuer's obligation on trigger events, not the distributor's obligation. X D - ASIC pre-approval is not required for product distribution.","type":"standard"},{"section":"Ethics & Corps Act","question":"A client is presented with an SOA and told to 'just sign here.' They later say they did not read or understand it. Under Standard 4 of the FASEA Code, consent must be:","a":"Written and witnessed by a third party","b":"Informed and free from coercion","c":"Signed by the adviser and licensee","d":"Retained for 7 years","correct":"B","explanation":"\u2717 A - Written and witnessed by a third party - This is incorrect because Standard 4 does not require consent to be written or witnessed by a third party. The substance of the consent (that it is genuine, informed and free) matters more than its form. \u2713 B - Informed and free from coercion - This is correct because Standard 4 of the FASEA Code of Ethics requires advisers to act for a client 'only with the client's free, prior and informed consent.' All three elements - free, prior and informed - must be present. \u2717 C - Signed by the adviser and licensee - This is incorrect because Standard 4 imposes no requirement for adviser or licensee signatures as a condition of valid consent. Signatures alone do not make consent informed. \u2717 D - Retained for 7 years - This is incorrect because the 7-year retention requirement is a record-keeping obligation under Standard 8 of the Code and s942D of the Corporations Act. It is separate from the consent requirement in Standard 4.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the purpose of ASIC's Regulatory Guide 104?","a":"It sets mandatory minimum qualifications for all financial advisers","b":"It provides guidance on AFS licensee obligations including compliance","c":"It replaces the Corporations Act obligations for all AFS licensees","d":"It sets the maximum fee levels that licensees may charge for ongoing","correct":"B","explanation":"X A - Adviser qualifications are addressed in the Financial Adviser Standards and Ethics Authority (FASEA) framework and ASIC's RG 146 and its successors, not RG 104. \u2713 B - ASIC's Regulatory Guide 104 (RG 104) provides guidance to AFS licensees on their obligations under s912A of the Corporations Act, covering compliance arrangements, competence of responsible managers, and management of conflicts of interest. X C - RG 104 is regulatory guidance; it does not replace or override the Corporations Act. X D - Fee levels are not regulated by RG 104; they are subject to Standard 7 of the FASEA Code and the value-for-money test.","type":"standard"}]},{"label":"Thursday 3 July","mode":"mixed","warmup":[{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"B","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"B","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","c":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"C","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","correct":"A","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"D","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"B","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"C","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"C","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","correct":"B","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"D","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","correct":"C","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"D","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5}],"questions":[{"section":"Client Scenarios","question":"An adviser charges a fixed annual advice fee and deducts it from the client's investment platform. Under the Corporations Act, what must happen each year?","a":"An FDS must be provided and the client must give written consent to continue","b":"The client need only be notified of the ongoing fee deduction each year","c":"An updated SOA must be prepared to reflect the ongoing fee","d":"The fee may continue without further annual obligation once it has been initially established","correct":"A","explanation":"\u2713 A - Under s962G and s962K of the Corporations Act, a licensee must provide an FDS each year and obtain the client's written consent to continue the ongoing fee arrangement. Without consent renewal, the arrangement cannot continue. X B - Notification alone is insufficient; written consent must be obtained each year. X C - An updated SOA is not required annually for an ongoing fee arrangement; the FDS and consent renewal are the required steps. X D - The ongoing consent obligation cannot be satisfied once at inception; annual renewal is mandatory under s962K.","type":"standard"},{"section":"Client Scenarios","question":"A financial adviser is also a mortgage broker. They recommend a client take out a loan through their broking business to fund an investment the adviser is also recommending. Which Standard is MOST directly at risk?","a":"Standard 8 - the dual role creates a record-keeping obligation across","b":"s961B - the best interests duty applies only to the investment advice","c":"Standard 3 - the dual role creates a conflict requiring specific","d":"APP 6 - the sharing of client information between the two roles is a privacy","correct":"C","explanation":"X A - Standard 8 governs record keeping; the primary concern is the conflicted dual role. X B - s961B applies to the advice; the primary concern is the conflict created by the dual role. \u2713 C - An adviser who acts as mortgage broker and then recommends the client take a loan through their own broking business has a direct financial interest in both sides. Standard 3 requires specific identification, disclosure and management of this conflict. X D - APP 6 governs use and disclosure of personal information; sharing between roles may raise APP issues but is not the primary concern here.","type":"standard"},{"section":"Client Scenarios","question":"A couple is divorcing and the wife believes her husband has undisclosed assets. What is the most appropriate legal avenue to access information about his?","a":"Use the Freedom of Information Act","b":"Wait until assets are split and then find out","c":"Seek disclosure through family law court proceedings","d":"Use the Privacy Act to demand disclosure","correct":"C","explanation":"X A - Use the Freedom of Information Act - This is incorrect because the Freedom of Information Act 1982 (Cth) applies to Commonwealth government agencies and documents - it does not provide a mechanism for obtaining a private individual's financial information from another private individual or their financial adviser. X B - Wait until assets are split - This is incorrect because waiting for assets to be split without making any effort to identify undisclosed assets could mean the client agrees to an unfair property settlement. The Family Court process specifically addresses undisclosed assets. \u2713 C - Seek disclosure through family law court proceedings - This is correct because asset disclosure between divorcing parties is properly obtained through the Family Court process. Under the Family Law Act 1975 (Cth), parties to divorce proceedings have obligations to make full and frank disclosure of their financial circumstances - the court can compel production of financial documents. X D - Use the Privacy Act to demand disclosure - This is incorrect because the Privacy Act 1988 (Cth) gives individuals rights to access their own personal information held by organisations - it does not provide a mechanism for obtaining another person's financial information from their adviser.","type":"standard"},{"section":"Code Values","question":"Competence is NOT listed. An adviser builds a strong referral network of specialists across aged care, estate planning and tax to ensure clients always have access to appropriate expertise. Which value best applies?","a":"Fairness","b":"Honesty","c":"Trustworthiness","d":"Diligence","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Building a referral network for specialist areas is not about treating clients comparably - it is about the quality of professional service provision and preparation. X B - Honesty relates to truthful communication. Building a specialist referral network is not about the truthfulness of information - it is about professional preparation and thoroughness. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While having access to specialists serves clients' long-term interests, the specific conduct of investing in building a strong professional network is most directly Diligence. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively preparing the professional resources necessary to serve a wide range of client needs. Building a strong referral network across aged care, tax, legal and SMSF specialists demonstrates professional foresight and thoroughness. Note: Competence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Client Scenarios","question":"COMMON MISCONCEPTION: An adviser believes that AML/CTF reporting obligations are only triggered when a cash transaction exceeds $10,000. Is this correct?","a":"No - a TTR applies to $10,000+ cash, but an SMR can be required for any amount where suspicion arises","b":"Yes - all transactions below $10,000 are entirely and completely","c":"Yes - the $10,000 threshold is the only and sole trigger for any AML/CTF","d":"Yes - AUSTRAC reporting under the AML/CTF Act is only mandatory for physical","correct":"A","explanation":"\u2713 A - The TTR threshold of $10,000 is not the only reporting trigger. An SMR must be filed whenever the reporting entity suspects money laundering or other criminal activity, regardless of the transaction amount. X B - Transactions below $10,000 can still trigger SMR obligations if suspicion exists. X C - The $10,000 threshold applies only to TTRs; SMR obligations are suspicion-based. X D - AUSTRAC reporting for SMRs is suspicion-based with no dollar threshold.","type":"standard"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser completes a full financial needs analysis before recommending any product, even when the client just wants a quick answer. Which value does this MOST demonstrate?","a":"Honesty","b":"Trustworthiness","c":"Competence","d":"Fairness","correct":"C","explanation":"X A - Honesty relates to truthful and transparent communication. Conducting a thorough financial needs analysis before recommending a product is not primarily about communication - it is about the quality and thoroughness of the professional engagement. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While a trustworthy adviser would conduct thorough analysis, the specific act of completing a full needs analysis is most directly a demonstration of Competence - applying the correct analytical process. \u2713 C - Competence requires advisers to possess the knowledge and skills necessary to conduct a proper professional engagement. Completing a full financial needs analysis before making any recommendation - rather than proceeding on assumptions - demonstrates that the adviser has the professional capability to follow the correct advice process. The needs analysis is a core competence requirement. Note: Diligence would also be the primary answer were it not excluded from this question. X D - Fairness relates to equitable treatment of all clients. Conducting a thorough needs analysis is not about treating clients comparably - it is about the quality of professional process applied to each individual engagement.","type":"values"},{"section":"Code Values","question":"An adviser asks detailed questions about a client's family situation, health, and lifestyle before recommending a life insurance policy. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Trustworthiness","d":"Honesty","correct":"B","explanation":"X A - Fairness relates to equitable treatment of all clients. Asking detailed questions about a client's family, health and lifestyle before recommending insurance is not about comparing one client to another - it is about the thoroughness of the needs analysis for this particular client. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including conducting a detailed and comprehensive needs analysis before making any recommendation. Asking detailed questions about family situation, health and lifestyle - rather than proceeding on assumptions - demonstrates the depth of engagement and due care that Diligence demands in an insurance advice context. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While thorough questioning does serve the client's long-term interest, the specific conduct of conducting a detailed needs analysis is most directly a Diligence obligation. X D - Honesty relates to truthful and transparent communication. Asking comprehensive questions is about gathering information, not about the adviser's own communication of truth.","type":"values"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser takes on a challenging and time-consuming estate planning case because no other adviser in the firm has the expertise to help and the client cannot afford specialist advice. Which value best applies?","a":"Fairness","b":"Trustworthiness","c":"Competence","d":"Diligence","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Taking on a challenging estate planning case because the client cannot afford specialist advice is not about comparing the treatment of different clients - it is about the thoroughness and care of the individual engagement. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While taking the time to do the work well does serve the client's long-term interest, the specific conduct of investing significant effort in a complex, time-consuming engagement is most directly Diligence. X C - Competence relates to knowledge and skills. Taking on a challenging case is not primarily about demonstrating knowledge - it is about the professional effort and thoroughness applied to the engagement. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including investing the time and effort required for complex cases even when those cases are commercially demanding. Taking on a challenging estate planning case and spending significant time to do it well - rather than taking shortcuts - demonstrates the professional commitment to due care that Diligence demands. Note: Honesty would not be the primary value here as it is excluded because it is genuinely not the primary value engaged.","type":"values"},{"section":"Client Scenarios","question":"A client instructs their adviser to transfer $200,000 to an account the adviser does not recognise, saying it is 'for an investment opportunity a friend told?","a":"Execute the transfer immediately - the instruction is client-directed","b":"Call the friend directly to verify the details of the investment","c":"Execute the transfer but file a report with ASIC after the fact","d":"Decline to execute until the investment opportunity and the recipient account are properly verified","correct":"D","explanation":"X A - Executing without verification could expose the client to financial harm. X B - Contacting the friend is not the appropriate verification mechanism. X C - Executing first and reporting afterward does not prevent the harm. \u2713 D - An instruction to transfer a large sum to an unrecognised account for a vague \"opportunity\" is a classic scam indicator. The adviser must verify the investment and the recipient before acting.","type":"standard"},{"section":"Client Scenarios","question":"An adviser reframes a client's portfolio review by presenting performance relative to the client's long-term goals rather than against a market index. The bias MOST likely being managed is:","a":"Loss aversion - the new frame reduces the emotional impact of short-term","b":"Availability bias - the client stops recalling index comparisons as vividly","c":"Anchoring - the client's reference point shifts from the market index to their personal long-term goals","d":"Sunk cost fallacy - the client stops focusing on past investment costs","correct":"C","explanation":"X A - Loss aversion is relevant but the specific mechanism here is the change of reference point - which is anchoring. X B - Availability bias involves the salience of recalled information; the mechanism here is the shift in the reference point used for evaluation. \u2713 C - When the adviser reframes performance against the client's personal goals rather than a market index, the client's reference point (or anchor) shifts. This reduces the emotional impact of short-term underperformance relative to the index. X D - The sunk cost fallacy involves past irrecoverable costs; the issue here is the present reference point for performance evaluation.","type":"standard"},{"section":"Client Scenarios","question":"Under the Privacy Act, an organisation must notify affected individuals of an eligi
