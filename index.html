<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan FASEA Values Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f4ff;color:#111827;font-size:16px;overflow-x:hidden;}
body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom);}

/* Header */
.hdr{background:linear-gradient(135deg,#1a56db,#1241a8);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:1.1rem;font-weight:700;line-height:1.3;}
.hdr p{font-size:0.75rem;opacity:.85;margin-top:2px;word-wrap:break-word;overflow-wrap:break-word;}

/* Progress bar */
.prog-wrap{background:#1241a8;padding:8px 16px 10px;}
.prog-row{display:flex;justify-content:space-between;font-size:0.72rem;color:rgba(255,255,255,.8);margin-bottom:5px;}
.prog-track{height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:#fff;border-radius:3px;transition:width .3s;}

/* Main */
.main{padding:12px;max-width:600px;margin:0 auto;}

/* Phase label */
.phase-lbl{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.phase-pill{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:0.76rem;font-weight:700;}
.p-wu{background:#e0f2fe;color:#0891b2;}
.p-val{background:#ede9fe;color:#7c3aed;}
.p-sv{background:#fef3c7;color:#d97706;}
.phase-num{font-size:0.72rem;color:#6b7280;margin-left:auto;}

/* Question card */
.qcard{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px;}
.wu-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:7px;background:#e0f2fe;color:#0891b2;font-size:0.7rem;font-weight:700;margin-bottom:10px;}
.sec-tag{display:inline-block;font-size:0.74rem;color:#6b7280;background:#f3f4f6;padding:3px 9px;border-radius:8px;margin-bottom:10px;}
.qtext{font-size:1rem;font-weight:600;line-height:1.6;color:#111827;word-wrap:break-word;overflow-wrap:break-word;}

/* Options */
.opts{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:15px 13px;border:2px solid #e5e7eb;border-radius:11px;background:#fff;cursor:pointer;text-align:left;font-size:0.92rem;line-height:1.5;width:100%;transition:border-color .12s,background .12s;word-wrap:break-word;overflow-wrap:break-word;-webkit-tap-highlight-color:transparent;}
.opt:active{opacity:.85;}
.opt.dis{cursor:default;pointer-events:none;}
.opt.correct{border-color:#0e9f6e;background:#def7ec;}
.opt.wrong{border-color:#e02424;background:#fde8e8;}
.opt.show-c{border-color:#0e9f6e;background:#ecfdf5;opacity:.6;}
.oltr{min-width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:#374151;flex-shrink:0;margin-top:1px;}
.opt.correct .oltr{background:#0e9f6e;color:#fff;}
.opt.wrong .oltr{background:#e02424;color:#fff;}
.opt.show-c .oltr{background:#0e9f6e;color:#fff;}
.otext{flex:1;min-width:0;word-wrap:break-word;overflow-wrap:break-word;}

/* Explanation */
.expbox{margin-top:13px;background:#f8fafc;border-left:3px solid #1a56db;border-radius:0 10px 10px 0;padding:12px 13px;font-size:0.84rem;line-height:1.65;color:#374151;display:none;word-wrap:break-word;overflow-wrap:break-word;}
.expbox.vis{display:block;}
.wu-expbox{border-left-color:#0891b2;}
.val-expbox{border-left-color:#7c3aed;}
.sv-expbox{border-left-color:#d97706;}
.res-badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:0.78rem;font-weight:700;margin-bottom:7px;}
.rb-ok{background:#def7ec;color:#0e9f6e;}
.rb-no{background:#fde8e8;color:#e02424;}
.exp-lbl{font-weight:700;font-size:0.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;margin-top:6px;}

/* Nav */
.nav{display:flex;gap:9px;margin-top:12px;padding-bottom:4px;}
.btn-next{flex:1;padding:14px;border:none;border-radius:11px;font-size:0.95rem;font-weight:700;cursor:pointer;color:#fff;background:#1a56db;-webkit-tap-highlight-color:transparent;}
.btn-next:disabled{opacity:.3;cursor:default;}
.btn-next.teal{background:#0891b2;}
.btn-next.purple{background:#7c3aed;}
.btn-next.amber{background:#d97706;}

/* Results */
#results{display:none;padding:12px;max-width:600px;margin:0 auto;}
.res-card{background:#fff;border-radius:14px;padding:22px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px;text-align:center;}
.big-pct{font-size:3rem;font-weight:800;color:#0e9f6e;line-height:1;}
.res-card h2{font-size:1.1rem;font-weight:700;margin-top:8px;}
.res-card p{font-size:0.84rem;color:#4b5563;margin-top:5px;}
.breakdown{display:flex;gap:8px;margin-top:14px;justify-content:center;}
.bki{background:#f9fafb;border-radius:10px;padding:10px 12px;text-align:center;flex:1;}
.bki .bn{font-size:1.2rem;font-weight:700;}
.bki .bl{font-size:0.68rem;color:#4b5563;margin-top:2px;}
.bki-wu .bn{color:#0891b2;}
.bki-val .bn{color:#7c3aed;}
.bki-sv .bn{color:#d97706;}
.btn-again{display:block;width:100%;padding:16px;border:none;border-radius:11px;font-size:0.95rem;font-weight:700;cursor:pointer;color:#fff;background:#1a56db;margin-top:14px;}

/* Review */
.rev-section{margin-bottom:4px;}
.rev-title{font-size:0.82rem;font-weight:700;color:#374151;margin:14px 0 8px;padding-left:2px;}
.ri{background:#fff;border-radius:10px;padding:12px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #e5e7eb;word-wrap:break-word;overflow-wrap:break-word;}
.ri.ok{border-left-color:#0e9f6e;}
.ri.no{border-left-color:#e02424;}
.ri-q{font-size:0.86rem;font-weight:600;margin-bottom:5px;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;}
.ri-a{font-size:0.76rem;color:#4b5563;word-wrap:break-word;overflow-wrap:break-word;}
.ri-exp{font-size:0.74rem;color:#374151;margin-top:7px;background:#f9fafb;border-radius:6px;padding:8px 10px;display:none;word-wrap:break-word;overflow-wrap:break-word;}
.ri-exp.open{display:block;}
.ri-tog{font-size:0.78rem;color:#1a56db;cursor:pointer;margin-top:6px;background:none;border:none;padding:4px 0;display:block;}
</style>
</head>

<div class="hdr">
  <h1>Nathan&#8217;s FASEA Quiz</h1>

<script type="application/json" id="appdata">
{"standards":[[1,"Comply with the law - act in accordance with all applicable laws and not seek to avoid them."],[2,"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank."],[3,"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty."],[4,"Informed consent - only act for a client with their free, prior and informed consent to the services and terms."],[5,"Best interests and suitability - ensure advice is appropriate to the client's circumstances and that they understand it."],[6,"Broader effects - take into account the broad effects of advice on the client and others such as family members."],[7,"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive."],[8,"Record keeping - keep complete, accurate and up-to-date records of advice and services provided."],[9,"Good faith in product recommendations - only offer financial products in good faith and not mislead clients."],[10,"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills."],[11,"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach."],[12,"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable."]],"values":[{"section":"Code Values","question":"Competence is NOT listed. An adviser builds a strong referral network of specialists across aged care, estate planning and tax to ensure clients always have access to appropriate expertise. Which value best applies?","a":"Fairness","b":"Honesty","c":"Trustworthiness","d":"Diligence","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Building a referral network for specialist areas is not about treating clients comparably - it is about the quality of professional service provision and preparation. X B - Honesty relates to truthful communication. Building a specialist referral network is not about the truthfulness of information - it is about professional preparation and thoroughness. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While having access to specialists serves clients' long-term interests, the specific conduct of investing in building a strong professional network is most directly Diligence. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively preparing the professional resources necessary to serve a wide range of client needs. Building a strong referral network across aged care, tax, legal and SMSF specialists demonstrates professional foresight and thoroughness. Note: Competence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser completes a full financial needs analysis before recommending any product, even when the client just wants a quick answer. Which value does this MOST demonstrate?","a":"Honesty","b":"Trustworthiness","c":"Competence","d":"Fairness","correct":"C","explanation":"X A - Honesty relates to truthful and transparent communication. Conducting a thorough financial needs analysis before recommending a product is not primarily about communication - it is about the quality and thoroughness of the professional engagement. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While a trustworthy adviser would conduct thorough analysis, the specific act of completing a full needs analysis is most directly a demonstration of Competence - applying the correct analytical process. \u2713 C - Competence requires advisers to possess the knowledge and skills necessary to conduct a proper professional engagement. Completing a full financial needs analysis before making any recommendation - rather than proceeding on assumptions - demonstrates that the adviser has the professional capability to follow the correct advice process. The needs analysis is a core competence requirement. Note: Diligence would also be the primary answer were it not excluded from this question. X D - Fairness relates to equitable treatment of all clients. Conducting a thorough needs analysis is not about treating clients comparably - it is about the quality of professional process applied to each individual engagement.","type":"values"},{"section":"Code Values","question":"An adviser asks detailed questions about a client's family situation, health, and lifestyle before recommending a life insurance policy. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Trustworthiness","d":"Honesty","correct":"B","explanation":"X A - Fairness relates to equitable treatment of all clients. Asking detailed questions about a client's family, health and lifestyle before recommending insurance is not about comparing one client to another - it is about the thoroughness of the needs analysis for this particular client. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including conducting a detailed and comprehensive needs analysis before making any recommendation. Asking detailed questions about family situation, health and lifestyle - rather than proceeding on assumptions - demonstrates the depth of engagement and due care that Diligence demands in an insurance advice context. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While thorough questioning does serve the client's long-term interest, the specific conduct of conducting a detailed needs analysis is most directly a Diligence obligation. X D - Honesty relates to truthful and transparent communication. Asking comprehensive questions is about gathering information, not about the adviser's own communication of truth.","type":"values"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser takes on a challenging and time-consuming estate planning case because no other adviser in the firm has the expertise to help and the client cannot afford specialist advice. Which value best applies?","a":"Fairness","b":"Trustworthiness","c":"Competence","d":"Diligence","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Taking on a challenging estate planning case because the client cannot afford specialist advice is not about comparing the treatment of different clients - it is about the thoroughness and care of the individual engagement. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While taking the time to do the work well does serve the client's long-term interest, the specific conduct of investing significant effort in a complex, time-consuming engagement is most directly Diligence. X C - Competence relates to knowledge and skills. Taking on a challenging case is not primarily about demonstrating knowledge - it is about the professional effort and thoroughness applied to the engagement. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including investing the time and effort required for complex cases even when those cases are commercially demanding. Taking on a challenging estate planning case and spending significant time to do it well - rather than taking shortcuts - demonstrates the professional commitment to due care that Diligence demands. Note: Honesty would not be the primary value here as it is excluded because it is genuinely not the primary value engaged.","type":"values"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser notices their practice has been charging two clients different fees for the same service due to a system error. The adviser corrects this immediately and refunds both clients. Which value best applies?","a":"Diligence","b":"Trustworthiness","c":"Competence","d":"Honesty","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care in the advice process. Identifying fee inconsistencies may require diligent review, but the act of proactively correcting the error to ensure both clients pay fairly is most directly an expression of Trustworthiness. \u2713 B - Trustworthiness requires advisers to act reliably and consistently in a manner clients can depend on, including proactively correcting errors that may have disadvantaged them. Noticing and voluntarily correcting a fee inconsistency - rather than benefiting from the oversight - demonstrates that clients can trust the adviser to act honestly and consistently in their interests even without oversight. Note: Fairness would also be the primary answer were it not excluded from this question. X C - Competence relates to knowledge and skills. Identifying and correcting a fee error is not a knowledge challenge - it is a demonstration of the integrity and reliability that Trustworthiness demands. X D - Honesty relates to truthful and transparent communication. Correcting the fee error and notifying both clients involves honesty, but the broader conduct of proactively identifying and rectifying the inequity is Trustworthiness.","type":"values"},{"section":"Code Values","question":"An adviser creates a documented process for reviewing all client portfolios against their risk profiles every six months, regardless of market conditions. Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication. Creating a documented process for reviewing portfolios is not about the truthfulness of communication - it is about the professional thoroughness applied to portfolio management. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including implementing systematic processes to ensure regular, rigorous portfolio review. Creating a structured, documented annual review process demonstrates professional commitment to thorough and consistent client engagement. X C - Fairness relates to equitable treatment of clients. A systematic review process does ensure all clients receive the same quality of review, but the primary value demonstrated by creating a rigorous, documented process is Diligence. X D - Competence relates to knowledge and skills. Creating a review process is not a demonstration of technical financial knowledge - it is a demonstration of professional thoroughness.","type":"values"},{"section":"Code Values","question":"An adviser is asked by a client to co-sign a document verifying that the client's financial position meets lending criteria. The adviser knows the information is false and declines to sign. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care. Refusing to co-sign a false document requires integrity, not thoroughness. \u2713 B - Honesty requires advisers to be truthful and not to participate in conduct that is misleading or deceptive. Declining to co-sign a document that misrepresents a client's financial position - even though the client is asking - is a direct and unequivocal demonstration of Honesty. The adviser will not be party to a falsehood regardless of the client relationship or the client's wishes. X C - Fairness relates to equitable treatment of clients. Refusing to sign a false document is not about comparing the treatment of different clients - it is about the adviser's own commitment to truthful conduct. X D - Competence relates to knowledge and skills. Recognising that the document misrepresents the client's position requires competence, but the refusal to participate in the deception is Honesty.","type":"values"},{"section":"Code Values","question":"An adviser immediately notifies their licensee when they realise they have made a compliance error, even though self-reporting may result in disciplinary consequences for themselves. Which value does this MOST demonstrate?","a":"Fairness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Fairness relates to equitable treatment of clients. Immediately self-reporting a compliance error to the licensee is not about comparing the treatment of different clients - it is about the adviser's own truthful conduct. \u2713 B - Honesty requires advisers to be truthful and transparent, including - and especially - when reporting their own errors or compliance failures to those who need to know. Immediately notifying the licensee of a compliance error without waiting to see if it is discovered demonstrates the adviser's commitment to truthful conduct even when disclosure is to their own disadvantage. X C - Competence relates to knowledge and skills. Recognising a compliance error requires competence, but reporting it immediately is Honesty. X D - Diligence relates to thoroughness and due care. Noticing the error may require diligent review, but the act of immediate self-reporting is Honesty.","type":"values"},{"section":"Code Values","question":"An adviser prepares a simple comparison table showing how three products differ in fees and features before recommending one. Which value does this MOST demonstrate?","a":"Trustworthiness","b":"Honesty","c":"Diligence","d":"Fairness","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Preparing a clear comparison table to assist a client decision does serve their long-term interest, but the primary value demonstrated by presenting accurate, clear and complete comparative information is Honesty. \u2713 B - Honesty requires advisers to be truthful and transparent, including presenting product information in a way that gives clients an accurate and complete picture for decision-making. Preparing a simple, clear comparison table showing how three products differ in fees and features - rather than a one-sided summary favouring the adviser's preferred recommendation - is a direct demonstration of Honesty in the presentation of information. X C - Diligence relates to thoroughness and due care. Preparing a thorough comparison table requires diligence, but the primary value demonstrated by the balanced, transparent presentation of information is Honesty. X D - Fairness relates to equitable treatment of clients. Presenting a balanced comparison is not about comparing the treatment of different clients - it is about the quality and completeness of truthful information provided to this client.","type":"values"},{"section":"Code Values","question":"An adviser charges the same fee for a service regardless of whether the client is new or long-standing, because the work involved is equivalent. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Competence","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Charging the same fee for a service regardless of whether the client is new or long-standing is not a matter of thoroughness - it is a matter of professional objectivity and equitable treatment. X B - Honesty relates to truthful communication. Charging consistent fees is not about what the adviser communicates - it is about equitable professional conduct. \u2713 C - Fairness requires advisers to maintain professional objectivity and to treat all clients consistently, without giving preferential pricing or service based on the length or value of the relationship. Charging the same fee for the same service regardless of whether the client is new or long-standing demonstrates that professional objectivity governs the adviser's conduct - not personal familiarity or commercial considerations. X D - Competence relates to knowledge and skills. Consistent fee-charging is not a knowledge issue - it is a question of professional objectivity and equitable treatment.","type":"values"},{"section":"Code Values","question":"Competence is NOT listed. An adviser reads every piece of new ASIC regulatory guidance as it is released and updates their advice process accordingly. Which value best applies?","a":"Trustworthiness","b":"Fairness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Staying current with new ASIC regulatory guidance certainly serves clients' long-term interests, but the specific obligation driving an adviser to read guidance as it is released is Diligence - the continuous, thorough effort to remain professionally engaged. X B - Fairness relates to equitable treatment of clients. Staying current with regulations does not involve comparing the treatment of different clients - it is about the quality of professional effort applied to maintaining knowledge. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactive and continuous engagement with new regulatory developments. Reading every new ASIC guidance release as it is published - rather than waiting until it becomes immediately necessary - demonstrates the professional thoroughness and continuous engagement that Diligence demands. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful and transparent communication with clients. Staying current with regulations is not primarily about communication - it is about the thoroughness and care of professional effort.","type":"values"},{"section":"Code Values","question":"An adviser is offered a higher commission product but recommends a lower-cost alternative that better suits the client. Which value does this primarily demonstrate?","a":"Fairness","b":"Honesty","c":"Diligence","d":"Competence","correct":"A","explanation":"\u2713 A - Fairness requires advisers to maintain professional objectivity and to serve clients' interests without allowing personal financial incentives to distort advice. Recommending a lower-cost product that better suits the client's needs - despite the availability of a higher-commission alternative - demonstrates that the adviser's professional judgment is not distorted by personal gain. X B - Honesty relates to truthful and transparent communication. Not recommending the higher-commission product is not specifically an act of communication - it is an act of professional objectivity that places the client's interests above the adviser's financial benefit. X C - Diligence relates to thoroughness and due care in the advice process. Identifying the lower-cost alternative may require diligent research, but the decision to recommend it over the higher-commission option is an expression of Fairness. X D - Competence relates to knowledge and skills. Knowing which product better suits the client requires competence, but the value specifically demonstrated by choosing the client-appropriate option over personal gain is Fairness.","type":"values"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser discovers that the product they recommended last year has significantly changed its fee structure. They contact all affected clients immediately. Which value best applies?","a":"Diligence","b":"Fairness","c":"Competence","d":"Trustworthiness","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Proactively notifying clients of product problems requires diligence to identify, but the act of contacting clients to ensure they are protected is most directly an expression of Trustworthiness. X B - Fairness relates to equitable treatment of clients. Notifying clients of a product problem does not involve comparing the treatment of different clients - it is about acting reliably in each individual client's interest. X C - Competence relates to knowledge and skills. Identifying a product problem requires competence, but the act of proactively contacting clients to protect them is Trustworthiness. \u2713 D - Trustworthiness requires advisers to act reliably in clients' long-term interests, including proactively contacting them when the adviser becomes aware of a significant change that affects their position. Voluntarily contacting clients about a product problem - without being prompted - demonstrates that the client can trust the adviser to protect their interests continuously. Note: Honesty would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser who has a strong relationship with a client consistently charges them the same fee as new clients for equivalent services, without giving long-standing clients an unjustified discount. Which value best applies?","a":"Diligence","b":"Fairness","c":"Trustworthiness","d":"Competence","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care. Consistently charging the correct fees regardless of the relationship requires integrity, not thoroughness. \u2713 B - Fairness requires advisers to maintain professional objectivity and to treat all clients consistently - including charging fees consistently regardless of the personal warmth of the relationship. Consistently charging correct fees to a client with whom the adviser has a strong personal relationship - rather than discounting out of personal affinity - demonstrates that the adviser's professional conduct is governed by Fairness, not by personal closeness. Note: Honesty would also be a strong answer were it not excluded from this question. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While consistent fee practices build trust, the primary value demonstrated by ensuring personal relationships do not distort professional fee-charging is Fairness. X D - Competence relates to knowledge and skills. Consistent fee-charging is not a knowledge issue - it is a question of professional objectivity and equitable treatment.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser notices a long-standing client has not been contacted in 18 months due to a filing error. The adviser calls them to check in and address any outstanding matters. Which value best applies?","a":"Diligence","b":"Competence","c":"Fairness","d":"Honesty","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively identifying and contacting clients who have not been reviewed in an extended period. Noticing a long-standing client has not been contacted in 18 months and reaching out proactively - rather than waiting for the client to call - demonstrates the continuous professional engagement that Diligence demands. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X B - Competence relates to knowledge and skills. Identifying an overlooked client is not a matter of technical knowledge - it is a matter of professional thoroughness and systematic engagement. X C - Fairness relates to equitable treatment of clients. Proactively reaching out to a neglected client may raise fairness concerns, but the conduct of reaching out is most directly a demonstration of Diligence. X D - Honesty relates to truthful communication. Reaching out to a neglected client is not primarily about the truthfulness of communication - it is about the thoroughness and care of ongoing professional engagement.","type":"values"},{"section":"Code Values","question":"An adviser tells a client they cannot recommend a particular investment because it falls outside the adviser's AFSL authorisation, rather than providing an unqualified opinion anyway. Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Honesty requires advisers to be truthful and transparent with clients, including about the limits of their own authorisation. Telling a client clearly that a particular investment falls outside the adviser's AFSL authorisation - rather than attempting to provide advice beyond their scope - is a direct demonstration of Honesty. The adviser does not overstate what they can offer. X B - Diligence relates to thoroughness and due care. Knowing the boundaries of one's authorisation requires awareness, but the act of clearly communicating that limitation to the client is Honesty. X C - Fairness relates to equitable treatment of clients. Informing this client of a scope limitation is not about comparing their treatment to others - it is about truthful communication of the adviser's own limitations. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While being transparent about authorisation limits does serve the client's long-term interest, the specific act of clearly communicating a personal scope limitation is most directly Honesty.","type":"values"},{"section":"Code Values","question":"An adviser volunteers to mentor a junior colleague, helping them understand how to identify conflicts of interest in complex advice situations. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Competence","d":"Fairness","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Volunteering to mentor a junior colleague involves effort, but the primary value demonstrated by taking personal responsibility for upholding professional ethical standards is Competence. X B - Honesty relates to truthful communication. Mentoring involves honest guidance, but the primary value demonstrated by sharing professional expertise to raise the standard of the profession is Competence. \u2713 C - Competence requires advisers to develop and maintain their own knowledge and skills, and to contribute to the professional standards of the advice community. Volunteering to mentor a junior adviser - helping them understand conflicts of interest and the Code of Ethics - is an expression of professional Competence that extends beyond the individual adviser to the broader profession. X D - Fairness relates to equitable treatment of clients. Mentoring a junior colleague is not about how clients are treated relative to each other - it is about the professional standards of the advice community.","type":"values"},{"section":"Code Values","question":"An adviser explains to a client that the investment strategy the client wants to pursue carries a meaningful probability of losing a significant portion of their capital, even though this information may deter the client from proceeding. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Competence","d":"Honesty","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Explaining a meaningful risk to a client who has heard about a strategy through word of mouth is not about comparing the treatment of different clients - it is about the quality of truthful communication. X B - Diligence relates to thoroughness and due care. Explaining risks clearly requires thorough preparation, but the primary value demonstrated by ensuring the client understands the risks - particularly a medium to high-risk strategy - is Honesty. X C - Competence relates to knowledge and skills. Understanding the risks of the strategy requires competence, but communicating those risks truthfully and completely to the client is Honesty. \u2713 D - Honesty requires advisers to be truthful and transparent with clients, including ensuring that all material risks are disclosed clearly so the client can make a genuinely informed decision. Explaining to a client that a strategy carries medium to high risk - despite their enthusiasm from word of mouth - is a direct demonstration of Honesty. The adviser ensures the client has accurate information rather than a one-sided picture.","type":"values"},{"section":"Code Values","question":"A client asks their adviser about a product the adviser has no experience with. The adviser takes time to research it thoroughly before providing any opinion. Which value does this MOST demonstrate?","a":"Fairness","b":"Competence","c":"Trustworthiness","d":"Diligence","correct":"B","explanation":"X A - Fairness relates to equitable treatment of clients. Researching an unfamiliar product before advising on it is not about comparing the treatment of different clients - it is about the quality of professional preparation for this engagement. \u2713 B - Competence requires advisers to have the appropriate knowledge and skills to provide advice, including investing time to develop understanding of products they have not previously worked with. Researching and consulting experts before advising on an unfamiliar product - rather than relying on general financial knowledge or guessing - demonstrates the commitment to professional capability that Competence demands. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While developing product knowledge before advising does serve the client's long-term interest, the specific conduct of investing in building product expertise is most directly Competence. X D - Diligence relates to thoroughness and due care. Researching the product does require diligence, but the primary value demonstrated by acquiring the specific knowledge necessary to advise on an unfamiliar product is Competence.","type":"values"},{"section":"Code Values","question":"An adviser contacts a client whose circumstances have changed - they have recently had a child - to suggest a review of their insurance and estate planning without being asked. Which value does this MOST demonstrate?","a":"Diligence","b":"Competence","c":"Trustworthiness","d":"Honesty","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively identifying life events that change a client's circumstances and reaching out to review their advice. Contacting a client who has recently had a child - even without being asked - to review their insurance and estate planning demonstrates the continuous, thorough professional engagement that Diligence demands. X B - Competence relates to knowledge and skills. Knowing that having a child changes insurance and estate planning needs requires competence, but the act of proactively reaching out to address those needs is Diligence. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While proactive outreach does serve the client's long-term interest, the specific conduct of identifying a life event and acting on it without prompting is most directly Diligence. X D - Honesty relates to truthful communication. Proactively contacting a client about changed circumstances is not about the truthfulness of communication - it is about the thoroughness and care of ongoing professional engagement.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser confirms in writing after every meeting what was discussed, what was agreed, and what the next steps are, so there is always a clear record. Which value best applies?","a":"Competence","b":"Fairness","c":"Honesty","d":"Diligence","correct":"D","explanation":"X A - Competence relates to knowledge and skills. Providing a written summary after every meeting does not primarily demonstrate technical financial knowledge - it demonstrates reliable, systematic professional conduct. X B - Fairness relates to equitable treatment of clients. Providing written summaries to all clients is equitable, but the primary value demonstrated by the commitment to documenting every meeting outcome is Diligence and reliability. X C - Honesty relates to truthful communication. Written summaries do involve transparent communication, but the primary value demonstrated by creating a systematic record of every discussion and commitment is the reliability that Trustworthiness demands. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including maintaining a complete written record of every client meeting with outcomes and action items clearly documented. Confirming in writing after every meeting what was discussed, decided and committed to demonstrates the professional thoroughness that Diligence demands - and the reliability that Trustworthiness requires. Note: Trustworthiness would also be the primary answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Competence is NOT listed. An adviser takes on a client whose needs are at the edge of their expertise but invests significant time to ensure they are fully prepared to advise effectively. Which value best applies?","a":"Fairness","b":"Trustworthiness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Taking on a client at the edge of one's expertise and investing extra effort to ensure good advice is not about comparing the treatment of different clients - it is about the quality of professional engagement with this individual client. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While investing extra effort for a complex client does serve their long-term interest, the specific conduct of upskilling and consulting experts to reach the required standard is most directly Diligence. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including when that means investing additional effort to develop sufficient understanding for a case at the edge of one's expertise. Consulting specialists and doing additional research before advising - rather than proceeding on partial knowledge - demonstrates the professional commitment to due care that Diligence demands. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. Taking on a challenging case and investing extra effort is not about the truthfulness of communication - it is about the thoroughness of professional preparation.","type":"values"},{"section":"Code Values","question":"An adviser who has been advising a family for 10 years recognises that the adult children now need independent advice and refers them to colleagues rather than continuing to advise them. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Honesty","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Fairness requires advisers to treat clients equitably and with professional objectivity, including ensuring that where clients' needs exceed the adviser's current scope or capacity, appropriate arrangements are made. Recognising that the adult children of a long-standing family client have outgrown the current advisory arrangement and proactively ensuring they receive appropriate service - rather than retaining them in an unsuitable arrangement - demonstrates professional Fairness. X B - Diligence relates to thoroughness and due care. Recognising the need for a new arrangement requires diligence, but the decision to ensure clients receive equitable service is most directly Fairness. X C - Honesty relates to truthful communication. Acknowledging that the adult children's needs have grown beyond the current arrangement involves honesty, but the act of ensuring they receive equitable, appropriate service is Fairness. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While addressing the advisory gap does serve the clients' long-term interests, the specific value of ensuring equitable treatment for all clients - including those who have outgrown the current arrangement - is Fairness.","type":"values"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser proactively tells a client that a competitor product has a lower fee than the one they recommended and explains why the recommended product is still more appropriate overall. Which value best applies?","a":"Diligence","b":"Trustworthiness","c":"Competence","d":"Honesty","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Proactively telling a client that a competitor product has a lower fee requires honesty, not thoroughness. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While disclosing a better competitor product does serve the client's long-term interest, the primary value demonstrated by proactively disclosing information commercially disadvantageous to the adviser is Honesty. X C - Competence relates to knowledge and skills. Knowing that a competitor product has a lower fee requires market awareness and competence, but the act of voluntarily disclosing that information to the client is Honesty. \u2713 D - Honesty requires advisers to be truthful and transparent, including proactively disclosing material information that could affect the client's decision - even when that information is commercially disadvantageous to the adviser. Telling a client that a competitor product charges a lower fee for a comparable outcome - despite the personal cost of that disclosure - is a direct demonstration of Honesty. Note: Trustworthiness would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Competence is NOT listed. An adviser makes sure a client who recently lost their spouse understands all the financial decisions they now face, offering to pace the process to avoid overwhelming them. Which value best applies?","a":"Honesty","b":"Trustworthiness","c":"Diligence","d":"Fairness","correct":"D","explanation":"X A - Honesty relates to truthful communication. Ensuring a grieving client understands all their options before making any decisions is not about the truthfulness of information - it is about equitable professional treatment that does not allow a client's emotional vulnerability to result in lesser care. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While ensuring a grieving client gets the full picture serves their long-term interest, the specific value of giving this client the same level of careful, complete advice as any other is Fairness. X C - Diligence relates to thoroughness and due care. Taking the time to ensure a grieving client understands all their options requires diligence, but the primary value is treating this vulnerable client with the same professional rigour as any other. \u2713 D - Fairness requires advisers to maintain professional objectivity and to treat all clients equally, regardless of their emotional state or vulnerability. Ensuring a client who recently lost their spouse fully understands all their options before making any decisions - rather than taking shortcuts because the client is distressed - demonstrates that Fairness governs the adviser's conduct regardless of the client's personal circumstances. Note: Competence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser who is about to go on leave ensures all their clients are assigned a qualified colleague and personally briefs the colleague on each client's circumstances. Which value best applies?","a":"Fairness","b":"Honesty","c":"Diligence","d":"Competence","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Ensuring clients are covered during leave is not about comparing the treatment of different clients across the practice - it is about the ongoing reliability of service to the individual clients being handed over. X B - Honesty relates to truthful communication. Ensuring coverage for clients while on leave is not primarily about honest communication - it is about the systematic thoroughness of professional responsibility. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including ensuring that all client obligations are properly covered when the adviser is unavailable. Proactively arranging adequate coverage for all clients before going on leave - rather than simply leaving and hoping nothing arises - demonstrates the continuous professional commitment that Diligence demands. Note: Trustworthiness would also be the primary answer were it not excluded from this question. X D - Competence relates to knowledge and skills. Arranging client coverage while on leave is not a knowledge challenge - it is a professional discipline of thoroughness and responsibility.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser who is behind on CPD requirements declines to advise on a complex area until they have completed the relevant CPD. Which value best applies?","a":"Fairness","b":"Diligence","c":"Competence","d":"Honesty","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Declining to advise in an area where CPD is behind is not about comparing the treatment of different clients - it is about the quality of professional capability available to this client. X B - Diligence relates to thoroughness and due care. Recognising a CPD gap and declining to advise requires self-awareness and professional responsibility, but the primary value demonstrated by acknowledging the limit of current knowledge is Competence. \u2713 C - Competence requires advisers to recognise the limits of their current knowledge and to decline to advise on matters where their knowledge is not current enough to provide the required standard of advice. Declining to advise on an area where CPD requirements are behind - and committing to completing the required training first - demonstrates the self-awareness and professional integrity that Competence demands. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. While acknowledging a CPD gap involves honesty, the primary value demonstrated by recognising the limit of current professional knowledge is Competence.","type":"values"},{"section":"Code Values","question":"Competence is NOT listed. An adviser creates a follow-up schedule for all clients who received advice on insurance to check that their cover has been confirmed as placed. Which value best applies?","a":"Trustworthiness","b":"Fairness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Creating a follow-up schedule for clients who received advice during volatile times does serve clients' long-term interests, but the specific conduct of building a systematic follow-up process is most directly a demonstration of Diligence. X B - Fairness relates to equitable treatment of all clients. Creating a follow-up schedule is not about treating clients comparably - it is about the thoroughness and care of professional follow-through. \u2713 C - Diligence requires advisers to perform all professional engagements with due care, including following up to ensure advice has been understood and implemented appropriately. Creating a structured follow-up schedule for clients who received advice during a volatile period demonstrates the systematic thoroughness and professional commitment that Diligence demands - the adviser's responsibility does not end at the point of advice. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. A follow-up schedule is about thoroughness and care in professional follow-through, not about the truthfulness of communication.","type":"values"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser takes the same amount of time to carefully explain a complex strategy to a client with limited financial literacy as they do to a financially sophisticated client. Which value best applies?","a":"Diligence","b":"Honesty","c":"Trustworthiness","d":"Competence","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Taking the same amount of time to explain a strategy to a less financially literate client requires diligence, but the primary value demonstrated by ensuring this client receives the same quality of professional explanation as any other is Competence - the ability to communicate effectively across different levels of financial literacy. X B - Honesty relates to truthful communication. Taking extra time to explain a strategy clearly to a less literate client is not primarily about the truthfulness of information - it is about the professional skill of adapting communication. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While ensuring a less literate client genuinely understands advice does serve their long-term interest, the specific skill of adapting explanation to different levels of literacy is Competence. \u2713 D - Competence requires advisers to have the knowledge and skills to provide effective advice to clients at all levels of financial literacy. Taking the same amount of time and care to ensure a less financially literate client genuinely understands a complex strategy - adapting the explanation as needed - demonstrates the professional communication capability that Competence demands. Note: Fairness would also be the primary answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser uses interactive scenario modelling tools to help a client understand the long-term impact of different retirement income strategies. Which value best applies?","a":"Honesty","b":"Trustworthiness","c":"Fairness","d":"Competence","correct":"D","explanation":"X A - Honesty relates to truthful and transparent communication. Using interactive scenario modelling to help clients understand complex strategies involves honesty, but the primary value demonstrated by investing in and applying sophisticated analytical tools is Competence. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While using good modelling tools serves the client's long-term interest, the specific conduct of applying advanced analytical capability to explain complex scenarios is most directly a demonstration of Competence. X C - Fairness relates to equitable treatment of clients. Using scenario modelling for a specific client is not about comparing that client's treatment to others - it is about the quality of professional analysis applied. \u2713 D - Competence requires advisers to have and apply the knowledge, skills and professional tools necessary to provide advice at the required standard. Using interactive scenario modelling tools to help a client understand the implications of complex strategies demonstrates professional capability - the adviser has the skills and tools to make sophisticated analysis accessible. Note: Diligence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"An adviser declines to rush a complex strategy implementation even when the client says 'just get it done.' Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication. Refusing to rush a complex strategy implementation is not about the truthfulness of communication - it is about the quality and thoroughness of professional process. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, even under client pressure to proceed quickly. Refusing to rush a complex strategy implementation - despite the client's insistence - demonstrates that the adviser will not compromise the standard of professional care required to implement the strategy correctly. X C - Fairness relates to equitable treatment of clients. Refusing to rush this client is not about comparing their treatment to others - it is about the standard of care applied to the individual engagement. X D - Competence relates to knowledge and skills. Refusing to rush is not about the adviser's technical knowledge - it is about their commitment to applying that knowledge with appropriate care.","type":"values"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser explains clearly to a client that a strategy they want to pursue is outside the adviser's AFSL authorisation and that the client needs a specialist. Which value best applies?","a":"Diligence","b":"Fairness","c":"Competence","d":"Trustworthiness","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Explaining why a strategy is complex and risky requires thorough analysis, but the act of clearly communicating those risks and acknowledging the adviser's own limitations is most directly Competence. X B - Fairness relates to equitable treatment of clients. Explaining strategy complexity and risk to one client is not about comparing their treatment to others - it is about the quality of advice and communication. \u2713 C - Competence requires advisers to have the knowledge and skills to assess and explain complex strategies, including recognising where those strategies exceed the adviser's expertise and recommending specialist input. Explaining clearly why a strategy the client wants is complex and risky, and being transparent about the limits of the adviser's own expertise in that area, demonstrates the professional capability and self-awareness that Competence requires. Note: Honesty would also be a strong answer were it not excluded from this question. X D - Trustworthiness relates to acting reliably in the client's long-term interest. Advising the client of complexity and risk does serve their long-term interest, but the primary value demonstrated by the professional assessment and its clear communication is Competence.","type":"values"},{"section":"Code Values","question":"An adviser invests in a new software platform to improve the accuracy and efficiency of their financial modelling, primarily to improve outcomes for clients. Which value does this MOST demonstrate?","a":"Competence","b":"Honesty","c":"Diligence","d":"Fairness","correct":"A","explanation":"\u2713 A - Competence requires advisers to maintain and develop the knowledge, skills and professional tools necessary to provide advice at a high standard. Investing in new software specifically to improve the accuracy and efficiency of financial modelling demonstrates a commitment to professional capability - the adviser uses resources to do their work better. X B - Honesty relates to truthful and transparent communication. Investing in better modelling software is not about the truthfulness of communication - it is about the quality of professional capability. X C - Diligence relates to thoroughness and due care. While using better tools does enable more thorough work, the decision to invest in professional improvement is most directly a Competence commitment. X D - Fairness relates to equitable treatment of clients. Investing in tools that improve advice quality may benefit all clients equally, but the primary value demonstrated by the investment in professional capability is Competence.","type":"values"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser notices their own recommendation may be influenced by a recent bad experience with a similar product and takes extra care to assess the current product on its own merits. Which value best applies?","a":"Trustworthiness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Recognising that a personal bias could influence a recommendation does serve the client's interest by leading to a correction, but the primary value demonstrated by identifying and disclosing one's own potential bias is Honesty. \u2713 B - Honesty requires advisers to be truthful and transparent, including about their own potential biases or conflicts that could affect the objectivity of their advice. Noticing that a recent bad experience with a particular product category could be influencing a recommendation - and disclosing that potential bias - is a direct demonstration of Honesty. The adviser takes personal responsibility for transparent communication about the limits of their own objectivity. X C - Competence relates to knowledge and skills. Recognising the effect of bias on professional judgment requires self-awareness, but the act of disclosing that potential bias to the client is Honesty. X D - Diligence relates to thoroughness and due care. Identifying a potential bias in one's own recommendation is diligent, but disclosing it to the client is Honesty. Note: Fairness would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser documents every client interaction including phone calls and informal conversations to ensure a complete record exists. Which value best applies?","a":"Honesty","b":"Competence","c":"Fairness","d":"Trustworthiness","correct":"D","explanation":"X A - Honesty relates to truthful and transparent communication. Documenting every client interaction - including informal ones - is not about the truthfulness of communication - it is about the completeness and reliability of the professional record. X B - Competence relates to knowledge and skills. Thorough documentation is not a knowledge challenge - it is a professional discipline of reliable, consistent record-keeping. X C - Fairness relates to equitable treatment of clients. Documenting all interactions is not about comparing the treatment of different clients - it is about the reliability and integrity of each individual client record. \u2713 D - Trustworthiness requires advisers to maintain complete and reliable records of all client interactions so that clients can depend on an accurate account of what was discussed and agreed. Documenting every interaction - including informal phone calls - demonstrates professional reliability and ensures that the client relationship is built on a foundation of transparent, verifiable conduct. Note: Diligence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Which is the second FASEA Code Value that best supports the obligation to know your client?","a":"Honesty","b":"Trustworthiness","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication with clients. While honest communication supports good client relationships, the specific value of consistently acting in clients' long-term interests and maintaining their confidence is Trustworthiness. \u2713 B - Trustworthiness requires advisers to act reliably and in their clients' long-term interests, and to maintain client confidence through consistent, dependable conduct. An adviser who genuinely knows their client - understanding their life circumstances, goals and concerns - builds the kind of enduring trust that allows clients to rely on the advice relationship. This is the foundation of Trustworthiness. X C - Fairness relates to professional objectivity and equitable treatment. Knowing each client individually is not about treating clients comparably to each other - it is about the quality and reliability of the individual relationship. X D - Competence relates to knowledge, skills and professional development. While knowing clients requires skill in questioning and assessment, the specific obligation to maintain a deep, reliable understanding of each client's circumstances over time is an expression of Trustworthiness.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser recommends a product that benefits the licensee more than the client without disclosure. Which value is most clearly breached?","a":"Fairness","b":"Competence","c":"Diligence","d":"Honesty","correct":"A","explanation":"\u2713 A - Fairness requires advisers to maintain professional objectivity and to recommend products based on the client's needs rather than the adviser's or licensee's financial benefit. Recommending a product that benefits the licensee more than the client - without disclosure - is a direct breach of Fairness. The adviser allows institutional financial interests to distort professional objectivity. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X B - Competence relates to knowledge and skills. Recommending an unsuitable product is not a knowledge failure - the adviser may fully understand both products. It is a failure to apply professional objectivity. X C - Diligence relates to thoroughness in the advice process. Recommending the licensee's preferred product without disclosure is not a failure of thoroughness - it is a failure of professional objectivity. X D - Honesty relates to truthful and transparent communication. The failure to disclose the conflict is an Honesty issue, but the underlying failure of giving biased advice that benefits the licensee over the client is primarily a Fairness breach.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser who is asked a question on a topic they last studied five years ago checks updated references before responding. Which value best applies?","a":"Competence","b":"Fairness","c":"Trustworthiness","d":"Honesty","correct":"A","explanation":"\u2713 A - Competence requires advisers to maintain current knowledge across the areas they advise in, including pausing to refresh knowledge before answering questions on topics not recently studied. Checking current guidance before answering a client question on a topic last studied five years ago - rather than answering from potentially outdated memory - demonstrates the professional commitment to current, accurate knowledge that Competence demands. Note: Diligence would also be a strong answer were it not excluded from this question. X B - Fairness relates to equitable treatment of clients. Refreshing knowledge before answering a specific client's question is not about comparing the treatment of different clients - it is about the quality of professional knowledge available to this client. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While providing current, accurate answers serves the client's long-term interest, the specific conduct of refreshing knowledge before answering is most directly Competence. X D - Honesty relates to truthful communication. Refreshing knowledge to ensure an accurate answer is not primarily about the truthfulness of communication - it is about the currency and quality of professional knowledge.","type":"values"},{"section":"Code Values","question":"An adviser tells a couple that the strategy they want to pursue - using their SMSF to lend money to a family member - is illegal under the SIS Act, even though they know the couple will be disappointed. Which value does this MOST demonstrate?","a":"Trustworthiness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Telling clients that their SMSF plan is illegal does serve their long-term interest, but the primary value demonstrated by proactively telling them a truth they may not want to hear is Honesty. \u2713 B - Honesty requires advisers to tell clients the truth, including when that truth is unwelcome. Informing a couple that their proposed SMSF strategy - lending money to their son at below-market rates - is illegal, despite their enthusiasm for the plan, is a direct demonstration of Honesty. The adviser prioritises truthful guidance over client approval. X C - Competence relates to knowledge and skills. Knowing that the strategy is illegal requires competence, but communicating that truth to the clients is Honesty. X D - Diligence relates to thoroughness and due care. Identifying the illegality of the strategy may require diligent review, but the act of clearly informing the clients is Honesty.","type":"values"},{"section":"Code Values","question":"An adviser creates a structured annual review process that systematically considers changes in a client's circumstances, legislative changes, and product changes. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including implementing structured, systematic processes for regular client reviews. Creating a documented annual review process that systematically considers changes in a client's life circumstances, investment performance and regulatory environment demonstrates the professional commitment to thoroughness and continuous engagement that Diligence demands. X B - Honesty relates to truthful communication. Creating a review process is not about the truthfulness of communication - it is about the systematic thoroughness of professional engagement. X C - Fairness relates to equitable treatment of clients. A structured review process does ensure all clients receive the same quality of review, but the primary value demonstrated by creating a rigorous, documented process is Diligence. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While systematic annual reviews do serve clients' long-term interests, the specific conduct of creating and implementing a thorough process is most directly Diligence.","type":"values"}],"secval":[{"section":"Code Values","question":"You have a long-time colleague who works at an investment firm. You consider working together to share referrals to benefit your clients, but you decide against it. Which value guided your decision?","a":"Honesty","b":"Fairness","c":"Trustworthiness","d":"Diligence","correct":"C","explanation":"\u2717 A (Honesty) \u2014 Honesty would apply if the issue were about disclosing the offer.\n\u2717 B (Fairness) \u2014 Fairness relates to professional objectivity in advice \u2014 this scenario is about personal integrity in a relationship.\n\u2713 C (Trustworthiness) \u2014 declining a benefit that could compromise objectivity is the foundation of trust.\n\u2717 D (Diligence) \u2014 Diligence relates to thoroughness of work.","type":"secval"},{"section":"Code Values","question":"A client asks you to recommend a specific managed fund their brother-in-law manages. You decline because it would create a conflict of interest. Which value does this demonstrate?","a":"Diligence","b":"Fairness","c":"Honesty","d":"Trustworthiness","correct":"D","explanation":"\u2717 A (Diligence) \u2014 Diligence is about thoroughness.\n\u2717 B (Fairness) \u2014 Fairness is about objectivity in advice, which is relevant but trustworthiness (resisting social pressure) is the stronger match.\n\u2717 C (Honesty) \u2014 Honesty would apply to the communication aspect.\n\u2713 D (Trustworthiness) \u2014 recommending against a product linked to a client's relative despite social pressure demonstrates reliable, client-first conduct.","type":"secval"},{"section":"Code Values","question":"An adviser consistently follows through on every commitment made to clients \u2014 returning calls promptly and delivering advice when promised. Which value does this primarily demonstrate?","a":"Competence","b":"Diligence","c":"Honesty","d":"Trustworthiness","correct":"D","explanation":"\u2717 A (Competence) \u2014 Competence is about knowledge and skills.\n\u2717 B (Diligence) \u2014 Diligence is about thoroughness of professional work.\n\u2717 C (Honesty) \u2014 Honesty is about truthful communication.\n\u2713 D (Trustworthiness) \u2014 consistent follow-through on all commitments, large and small, is the core of what makes an adviser trustworthy.","type":"secval"},{"section":"Code Values","question":"You are offered a sponsored trip to a product provider's annual conference. You decline because you believe it could influence your advice. Which value is this?","a":"Honesty","b":"Trustworthiness","c":"Fairness","d":"Competence","correct":"B","explanation":"\u2717 A (Honesty) \u2014 Honesty would apply if the issue were about disclosing the offer.\n\u2713 B (Trustworthiness) \u2014 declining a sponsored trip to avoid the appearance of bias demonstrates placing client trust above personal benefit.\n\u2717 C (Fairness) \u2014 Fairness relates to objectivity in advice.\n\u2717 D (Competence) \u2014 Competence is about knowledge.","type":"secval"},{"section":"Code Values","question":"An adviser discloses a potential conflict of interest to a client even though it is minor and unlikely to affect the advice. Which value does this demonstrate?","a":"Diligence","b":"Competence","c":"Trustworthiness","d":"Fairness","correct":"C","explanation":"\u2717 A (Diligence) \u2014 Diligence is about thoroughness.\n\u2717 B (Competence) \u2014 Competence is about knowledge.\n\u2713 C (Trustworthiness) \u2014 proactively disclosing a conflict even when it is minor and could be overlooked demonstrates reliable, client-first conduct.\n\u2717 D (Fairness) \u2014 Fairness is about objectivity.","type":"secval"},{"section":"Code Values","question":"An adviser realises they have been charging a client slightly more than agreed due to a system error. They immediately correct the overcharge and refund the client without being asked. Which value does this primarily demonstrate?","a":"Fairness","b":"Diligence","c":"Honesty","d":"Trustworthiness","correct":"D","explanation":"\u2717 A (Fairness) \u2014 Fairness would apply to the corrective action.\n\u2717 B (Diligence) \u2014 Diligence is about thoroughness.\n\u2717 C (Honesty) \u2014 Honesty applies to the disclosure but trustworthiness captures the proactive correction.\n\u2713 D (Trustworthiness) \u2014 proactively discovering and correcting an overcharge without being asked demonstrates that the client can trust the adviser to act in their interests.","type":"secval"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser notices a mistake in a client's SOA before it is signed. Instead of correcting it, they allow it to proceed to avoid delays. Which value is most clearly breached?","a":"Trustworthiness","b":"Competence","c":"Fairness","d":"Diligence","correct":"A","explanation":"\u2713 A (Trustworthiness) \u2014 (Honesty NOT listed) allowing a known SOA error to proceed to avoid delays is a fundamental breach of Trustworthiness. Clients rely on advisers to proactively protect their interests \u2014 permitting a mistake to reach the client rather than correcting it prioritises the adviser's convenience over the client's right to accurate advice.\n\u2717 B (Competence) \u2014 Competence is about knowledge.\n\u2717 C (Fairness) \u2014 Fairness is about objectivity.\n\u2717 D (Diligence) \u2014 Diligence is about thoroughness.","type":"secval"},{"section":"Code Values","question":"A client's long-term friend who is also their adviser recommends a product the adviser personally benefits from, without disclosure. Which value is most clearly breached?","a":"Diligence","b":"Competence","c":"Fairness","d":"Trustworthiness","correct":"D","explanation":"\u2717 A (Diligence) \u2014 Diligence is about thoroughness.\n\u2717 B (Competence) \u2014 Competence is about knowledge.\n\u2717 C (Fairness) \u2014 Fairness is about objectivity \u2014 but the specific failure of recommending a personally beneficial product to a close friend without disclosure is most directly a breach of the reliable, client-first conduct Trustworthiness demands.\n\u2713 D (Trustworthiness) \u2014 recommending a product that benefits the adviser personally, to a client who is also a close friend, without disclosing that benefit, is a fundamental breach of Trustworthiness. The adviser prioritises personal gain over the client's interests, and the friendship makes it worse \u2014 not better.","type":"secval"},{"section":"Code Values","question":"An adviser maintains detailed notes of every client meeting and keeps them secure and accurate over many years. Which value does this primarily demonstrate?","a":"Competence","b":"Trustworthiness","c":"Diligence","d":"Honesty","correct":"B","explanation":"\u2717 A (Competence) \u2014 Competence is about knowledge.\n\u2713 B (Trustworthiness) \u2014 maintaining detailed, secure records of every meeting demonstrates the reliability and professional integrity that clients can depend on.\n\u2717 C (Diligence) \u2014 Diligence is about thoroughness of work.\n\u2717 D (Honesty) \u2014 Honesty is about truthful communication.","type":"secval"},{"section":"Code Values","question":"An adviser tells a client the full truth about the risks of an investment strategy even though the client will likely be upset and may leave. Which of the following values BEST describes this behaviour? (Note: Honesty is intentionally not among the options.)","a":"Trustworthiness","b":"Fairness","c":"Diligence","d":"Competence","correct":"A","explanation":"\u2713 A (Trustworthiness) \u2014 telling the full truth about investment risks, even when it may discourage the client, demonstrates reliable, honest professional conduct.\n\u2717 B (Fairness) \u2014 Fairness is about objectivity.\n\u2717 C (Diligence) \u2014 Diligence is about thoroughness.\n\u2717 D (Competence) \u2014 Competence is about knowledge.","type":"secval"},{"section":"Code Values","question":"An adviser regularly attends CPD training, reads ASIC guidance and stays up to date with legislative changes. Which value does this primarily demonstrate?","a":"Diligence","b":"Trustworthiness","c":"Competence","d":"Fairness","correct":"C","explanation":"\u2717 A (Diligence) \u2014 Diligence is about thoroughness of work.\n\u2717 B (Trustworthiness) \u2014 Trustworthiness is about reliability.\n\u2713 C (Competence) \u2014 consistently attending CPD and reading ASIC guidance to stay current is the definition of maintaining professional competence.\n\u2717 D (Fairness) \u2014 Fairness is about objectivity.","type":"secval"},{"section":"Code Values","question":"A client asks about a complex SMSF borrowing arrangement. The adviser refers the client to a specialist rather than advising on an area outside their expertise. Which value does this demonstrate?","a":"Honesty","b":"Fairness","c":"Diligence","d":"Competence","correct":"D","explanation":"\u2717 A (Honesty) \u2014 Honesty would apply to the communication.\n\u2717 B (Fairness) \u2014 Fairness is about objectivity.\n\u2717 C (Diligence) \u2014 Diligence is about thoroughness.\n\u2713 D (Competence) \u2014 recognising that an SMSF borrowing arrangement is outside one's expertise and referring to a specialist demonstrates competence \u2014 knowing the limits of one's knowledge.","type":"secval"},{"section":"Code Values","question":"An adviser develops a new lower-cost investment option for clients with smaller balances who still want super growth. Which value does this primarily show?","a":"F
