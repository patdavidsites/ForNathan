<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan FASEA Study Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;color:#111827;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#1a56db,#1241a8);color:#fff;padding:20px;}
.hdr h1{font-size:1.3rem;font-weight:700;}
.hdr p{font-size:0.8rem;opacity:.85;margin-top:3px;}

/* ── Logbook ── */
#lb{padding:30px 16px;max-width:480px;margin:0 auto;}
.lb-card{background:#fff;border-radius:12px;padding:28px 22px;box-shadow:0 1px 4px rgba(0,0,0,.1);text-align:center;}
.lb-card h2{font-size:1.15rem;font-weight:700;margin-bottom:8px;}
.lb-card p{font-size:0.85rem;color:#4b5563;margin-bottom:22px;line-height:1.55;}
.lb-btns{display:flex;gap:14px;justify-content:center;}
.lb-btn{width:130px;padding:18px 10px;border-radius:12px;border:2.5px solid #e5e7eb;background:#fff;font-size:1rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;}
.lb-btn span{font-size:1.8rem;}
.lb-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
#lb-yes{border-color:#0e9f6e;color:#0e9f6e;}
#lb-yes:hover{background:#def7ec;}
#lb-no{border-color:#e02424;color:#e02424;}
#lb-no:hover{background:#fde8e8;}
.lb-msg{margin-top:16px;padding:12px 14px;border-radius:8px;font-size:0.83rem;font-weight:500;line-height:1.5;display:none;}
.lb-msg.yes-msg{background:#def7ec;color:#065f46;display:block;}
.lb-msg.no-msg{background:#fde8e8;color:#991b1b;display:block;}
#lb-go{margin-top:16px;padding:13px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;width:100%;display:none;}
#lb-go.vis{display:block;}
#lb-go:hover{background:#1241a8;}

/* ── App ── */
#app{display:none;}
.tabs{display:flex;gap:5px;padding:13px 13px 0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-size:0.76rem;font-weight:600;cursor:pointer;color:#4b5563;white-space:nowrap;}
.tab:hover{border-color:#1a56db;color:#1a56db;}
.tab.act{background:#1a56db;border-color:#1a56db;color:#fff;}
.tab.done{background:#def7ec;border-color:#0e9f6e;color:#0e9f6e;}
.main{padding:13px;max-width:720px;margin:0 auto;}

/* Overview */
.ov{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:13px;}
.ov h2{font-size:1.08rem;font-weight:700;}
.badges{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;}
.b-std{background:#e8f0fe;color:#1a56db;}
.b-mix{background:#ede9fe;color:#7c3aed;}
.b-wu{background:#e0f2fe;color:#0891b2;}
.b-cnt{background:#f3f4f6;color:#374151;}
.progs{margin-top:13px;}
.prow{margin-bottom:9px;}
.plbl{display:flex;justify-content:space-between;font-size:0.74rem;color:#4b5563;margin-bottom:4px;font-weight:500;}
.ptrack{height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
.pfill{height:100%;border-radius:4px;transition:width .3s;}
.wu-fill{background:#0891b2;}
.reg-fill{background:#1a56db;}
.scores{display:flex;gap:9px;margin-top:11px;}
.sc{flex:1;background:#f9fafb;border-radius:8px;padding:8px 10px;text-align:center;}
.sc .n{font-size:1.35rem;font-weight:700;}
.sc .l{font-size:0.69rem;color:#4b5563;margin-top:1px;}
.sc-c .n{color:#0e9f6e;}
.sc-w .n{color:#e02424;}
.sc-r .n{color:#d97706;}
.ov-btn{display:block;width:100%;padding:12px;border:none;border-radius:12px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:11px;color:#fff;}
.ov-btn:hover{opacity:.9;}
.btn-blue{background:#1a56db;}
.btn-teal{background:#0891b2;}
.btn-reset{background:#fff;color:#e02424;border:1.5px solid #e02424;}

/* Quiz */
#qpanel{display:none;}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:7px;}
.qnum{font-size:0.8rem;color:#4b5563;font-weight:600;}
.qtags{display:flex;gap:5px;align-items:center;}
.pi{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:0.71rem;font-weight:700;}
.pi-wu{background:#e0f2fe;color:#0891b2;}
.pi-reg{background:#e8f0fe;color:#1a56db;}
.pi-val{background:#ede9fe;color:#7c3aed;}
.stag{font-size:0.68rem;color:#4b5563;background:#f3f4f6;padding:2px 7px;border-radius:9px;}
.qcard{background:#fff;border-radius:12px;padding:18px 16px;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.qcard.reg-card{border-top:3px solid #1a56db;}
.qcard.wu-card{border-top:3px solid #0891b2;}
.wu-lbl{display:inline-flex;align-items:center;padding:3px 9px;border-radius:7px;background:#e0f2fe;color:#0891b2;font-size:0.71rem;font-weight:700;margin-bottom:9px;}
.qtext{font-size:0.95rem;font-weight:600;line-height:1.55;margin-bottom:15px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:9px;background:#fff;cursor:pointer;text-align:left;font-size:0.87rem;line-height:1.45;width:100%;transition:border-color .12s,background .12s;}
.opt:hover{border-color:#1a56db;background:#e8f0fe;}
.wu-opt:hover{border-color:#0891b2;background:#e0f2fe;}
.opt.answered{cursor:default;pointer-events:none;}
.opt.correct{border-color:#0e9f6e;background:#def7ec;}
.opt.wrong{border-color:#e02424;background:#fde8e8;}
.opt.show-correct{border-color:#0e9f6e;background:#def7ec;opacity:.55;}
.oltr{min-width:25px;height:25px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:0.76rem;font-weight:700;color:#4b5563;flex-shrink:0;}
.opt.correct .oltr{background:#0e9f6e;color:#fff;}
.opt.wrong .oltr{background:#e02424;color:#fff;}
.opt.show-correct .oltr{background:#0e9f6e;color:#fff;}
.expbox{margin-top:13px;background:#f9fafb;border-left:3px solid #1a56db;border-radius:0 8px 8px 0;padding:11px 13px;font-size:0.8rem;line-height:1.6;color:#374151;display:none;}
.expbox.vis{display:block;}
.wu-exp{border-left-color:#0891b2;}
.exp-title{font-weight:700;font-size:0.72rem;color:#1a56db;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.wu-exp .exp-title{color:#0891b2;}
.res-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:700;margin-bottom:6px;}
.res-ok{background:#def7ec;color:#0e9f6e;}
.res-no{background:#fde8e8;color:#e02424;}
.qnav{display:flex;gap:8px;margin-top:11px;}
.btn-next{flex:1;padding:12px;border:none;border-radius:9px;font-size:0.91rem;font-weight:700;cursor:pointer;color:#fff;background:#1a56db;}
.btn-next:disabled{opacity:.33;cursor:default;}
.btn-next.teal-next{background:#0891b2;}
.btn-back{padding:11px 14px;background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:9px;font-size:0.87rem;cursor:pointer;}

/* Done */
#done{display:none;background:#fff;border-radius:12px;padding:26px 20px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-align:center;}
.big-pct{font-size:2.8rem;font-weight:800;color:#0e9f6e;}
#done h3{font-size:1.1rem;font-weight:700;margin-top:5px;}
#done p{color:#4b5563;font-size:0.85rem;margin-top:5px;}
.done-bk{display:flex;gap:9px;margin:14px 0;justify-content:center;}
.dbi{background:#f9fafb;border-radius:8px;padding:9px 13px;text-align:center;}
.dbi .dn{font-size:1.25rem;font-weight:700;}
.dbi .dl{font-size:0.69rem;color:#4b5563;}
.dbi-wu .dn{color:#0891b2;}
.dbi-reg .dn{color:#1a56db;}

/* Review */
.revwrap{margin-top:13px;}
.rev-title{font-size:0.83rem;font-weight:700;color:#374151;margin:13px 0 7px;padding-left:3px;}
.ri{background:#fff;border-radius:9px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #e5e7eb;}
.ri.ok{border-left-color:#0e9f6e;}
.ri.no{border-left-color:#e02424;}
.ri.wu-ri{border-left-color:#0891b2;}
.ri.wu-ri.no{border-left-color:#e02424;}
.ri-q{font-size:0.83rem;font-weight:600;margin-bottom:4px;line-height:1.4;}
.ri-a{font-size:0.76rem;color:#4b5563;}
.ri-a b{font-weight:700;}
.ri-exp{font-size:0.74rem;color:#374151;margin-top:6px;background:#f9fafb;border-radius:5px;padding:7px 9px;display:none;}
.ri-exp.open{display:block;}
.ri-tog{font-size:0.71rem;color:#1a56db;cursor:pointer;margin-top:4px;background:none;border:none;padding:0;display:block;}
@media(max-width:480px){.main{padding:10px;}.qtext{font-size:0.9rem;}}
</style>
</head>
<body>
<div class="hdr">
  <h1>Nathan&#8217;s FASEA Study Planner &#128218;</h1>
  <p>7 days &middot; Mon 30 June &ndash; Sun 6 July &middot; 12 warm-up + 28 questions per day</p>
</div>

<div id="lb">
  <div class="lb-card">
    <h2>&#128211; Is your logbook up to date?</h2>
    <p>Before you start today&#8217;s session, take a moment to check your CPD logbook. Standard 10 requires it to be current.</p>
    <div class="lb-btns">
      <button class="lb-btn" id="lb-yes" onclick="lbPick(true)"><span>&#9989;</span>Yes</button>
      <button class="lb-btn" id="lb-no" onclick="lbPick(false)"><span>&#10060;</span>No</button>
    </div>
    <div class="lb-msg" id="lb-msg"></div>
    <button id="lb-go" onclick="startApp()">Let&#8217;s study &#8594;</button>
  </div>
</div>

<div id="app">
  <div class="tabs" id="tabs"></div>
  <div class="main">
    <div id="ov">
      <div class="ov" id="ov-card"></div>
      <div class="revwrap" id="revwrap" style="display:none"></div>
    </div>
    <div id="qpanel">
      <div class="qtop">
        <span class="qnum" id="qnum"></span>
        <div class="qtags">
          <span class="pi" id="qpi"></span>
          <span class="stag" id="qsec"></span>
        </div>
      </div>
      <div class="qcard" id="qcard">
        <div class="qtext" id="qtext"></div>
        <div class="opts" id="qopts"></div>
        <div class="expbox" id="expbox"></div>
      </div>
      <div class="qnav">
        <button class="btn-back" onclick="goOv()">&#8592; Overview</button>
        <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>Next &#8594;</button>
      </div>
    </div>
    <div id="done">
      <div class="big-pct" id="done-pct"></div>
      <h3 id="done-h"></h3>
      <p id="done-p"></p>
      <div class="done-bk">
        <div class="dbi dbi-wu"><div class="dn" id="d-wu"></div><div class="dl">Warm-up correct</div></div>
        <div class="dbi dbi-reg"><div class="dn" id="d-reg"></div><div class="dl">Questions correct</div></div>
      </div>
      <button class="ov-btn btn-blue" onclick="goOv()">&#8592; Back to overview</button>
    </div>
  </div>
</div>

rvices and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","correct":"C","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"D","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"A","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"C","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11}],"questions":[{"section":"Client Scenarios","question":"An adviser recommends a client make a large investment without disclosing that the client's elderly mother has recently been diagnosed with a condition likely?","a":"s961B - the adviser failed to identify and consider a relevant circumstance affecting the client's financial position","b":"Standard 8 - the adviser failed to maintain a complete record of the client's","c":"Standard 9 - the adviser's recommendation was misleading given the known aged","d":"Standard 12 - the adviser failed to hold themselves accountable","correct":"A","explanation":"\u2713 A - Under s961B(2)(a), the safe harbour requires the adviser to identify the client's relevant circumstances. A known upcoming aged care cost is a material relevant circumstance that must be considered before recommending a large investment. X B - Standard 8 governs record keeping; the primary breach is the failure to consider a known relevant circumstance. X C - Standard 9 prohibits misleading conduct; the breach here is failing to identify relevant circumstances, not making a false statement. X D - Standard 12 addresses peer accountability; the issue here is the adviser's own failure to consider the client's circumstances.","type":"standard"},{"section":"Behavioural Finance","question":"Which of the following best describes behavioural investor types?","a":"Psychological classifications of investor personality and behaviour","b":"Categories of financial products matched to investor risk levels","c":"Market sector groupings based on investor activity patterns","d":"Economic indicators used to predict investor market timing","correct":"A","explanation":"\u2713 A - Behavioural investor types are psychological classifications that describe how investors think, feel and behave in relation to their investments and financial decisions. \u2717 B - Financial product categories are defined by asset class and risk level, not psychological characteristics. \u2717 C - Market sectors describe industries, not investor personality profiles. \u2717 D - Economic indicators are macroeconomic data points; they are not classifications of investor behaviour.","type":"standard"},{"section":"Client Scenarios","question":"An adviser provides advice that technically satisfies the s961B safe harbour steps but recommends a product that clearly does not suit the client. Which of the following BEST describes this situation?","a":"The adviser has met all obligations - safe harbour provides complete protection against any finding of breach","b":"The safe harbour steps are satisfied but a breach of s961G may still arise independently if the advice was not appropriate","c":"Completing safe harbour steps does not guarantee the advice was in the client's best interests - a breach may still be found","d":"The adviser can rely on the safe harbour as a complete defence to any breach of obligation","correct":"C","explanation":"X A - Safe harbour does not provide complete protection; s961G remains a separate applicable standard. X B - This is partially correct but C is more precisely framed - the issue is appropriateness, not just the existence of a breach. \u2713 C - Completing the s961B(2) safe harbour steps provides evidence of best interests compliance but does not guarantee that advice was appropriate under s961G. These are separate obligations - safe harbour satisfies s961B, not s961G. X D - Safe harbour is an evidentiary provision, not a complete defence.","type":"standard"},{"section":"Client Scenarios","question":"A client insists the share market 'always recovers within a year' based on their experience during the 2009 recovery. This is BEST described as:","a":"Confirmation bias - seeking evidence that the market always recovers","b":"Representativeness bias - generalising from one recovery to all future","c":"Anchoring on the speed of the 2009 recovery as a reference point","d":"Recency bias - overweighting the most recent recovery experienced","correct":"B","explanation":"X A - Confirmation bias involves seeking information that supports existing beliefs; representativeness better explains the formation of the belief itself from a single data point. \u2713 B - Representativeness bias causes investors to generalise from a small number of vivid experiences to form a rule. The client is treating the 2009 recovery as representative of all market corrections. X C - Anchoring involves fixating on a specific value; the issue here is the generalisation from one event, not a price anchor. X D - Recency bias overweights recent events; representativeness better explains the pattern of generalising from a vivid single experience.","type":"standard"},{"section":"Client Scenarios","question":"An FSG must include information about how to make a complaint. This requirement primarily serves which purpose?","a":"It ensures clients know how to access internal dispute resolution","b":"It satisfies the adviser's Standard 8 obligation to maintain complete","c":"It protects the licensee from liability by directing complainants away","d":"It is a requirement that applies only when the advice relates to insurance","correct":"A","explanation":"\u2713 A - Under s942B(2)(k) of the Corporations Act, an FSG must disclose how clients can make a complaint. This informs clients about the internal dispute resolution (IDR) process and their right to escalate to AFCA. X B - Standard 8 governs record keeping; FSG complaint information is a disclosure obligation, not a record-keeping requirement. X C - The FSG complaint disclosure is for the client's benefit; it does not shield the licensee from liability. X D - The FSG complaint disclosure obligation applies to all financial services, not only insurance advice.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following investor behaviours BEST illustrates 'present bias'?","a":"Holding a losing stock too long due to reluctance to crystallise the loss","b":"Preferring an immediate smaller gain over a larger long-term gain","c":"Following recent market trends regardless of long-term fundamentals","d":"Anchoring on the original purchase price when evaluating performance","correct":"B","explanation":"X A - Holding a losing stock too long reflects loss aversion and the sunk cost fallacy, not present bias. \u2713 B - Present bias (or hyperbolic discounting) describes the tendency to disproportionately prefer immediate rewards over future ones, even when the future option is objectively superior. X C - Following market trends reflects herding or recency bias, not the temporal preference described by present bias. X D - Anchoring on purchase prices is a distinct bias unrelated to the time preference captured by present bias.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the 'disposition effect'?","a":"The tendency to sell winning investments too early and hold losing investments too long","b":"The tendency to buy and hold only familiar domestic stocks","c":"The tendency to follow the advice of the most recent person spoken to on a topic","d":"The tendency to overestimate future returns based on current performance","correct":"A","explanation":"\u2713 A - Selling winners early and holding losers too long - This is correct because the disposition effect, identified by Shefrin and Statman drawing on Kahneman and Tversky's prospect theory, describes the tendency to sell winning investments prematurely (to realise and enjoy the gain) while holding losing investments too long (to avoid realising and experiencing the pain of a loss). X B - Buying and holding only familiar domestic stocks - This is incorrect because investing in familiar domestic stocks describes home country bias or familiarity bias - not the disposition effect. The disposition effect is about the asymmetric treatment of winners and losers, not about investment geography or familiarity. X C - Following advice of the most recent person spoken to - This is incorrect because following the most recently heard advice describes recency bias applied to social information. The disposition effect is specifically about how investors treat gains and losses in existing holdings - not about social influence on decisions. X D - Overestimating future returns based on current performance - This is incorrect because overestimating future returns based on recent performance describes recency bias or overconfidence. The disposition effect is specifically about the asymmetric holding behaviour - selling winners, holding losers.","type":"standard"},{"section":"Client Scenarios","question":"An adviser at a seminar says: 'If anyone here is within 5 years of retirement, you should consider reducing equity exposure.' Does this constitute personal advice?","a":"Yes - they addressed a specific group","b":"Yes - the statement was made face-to-face","c":"No - no individual's specific circumstances were considered","d":"No - seminars are exempt from advice classifications","correct":"C","explanation":"X A - Yes - they addressed a specific group - This is incorrect because addressing a demographic group (people within 5 years of retirement) does not constitute considering individual personal circumstances. The group is defined by an age bracket - not by the specific financial situation, needs or objectives of any individual attendee. X B - Yes - face-to-face delivery - This is incorrect because the medium of delivery (face-to-face seminar) does not determine whether advice is personal. Personal advice can be given by email; general advice can be given face-to-face. The determinant is whether individual circumstances were considered. \u2713 C - No - no individual's specific circumstances were considered - This is correct because the key test for personal advice under s766B of the Corporations Act is whether the adviser has considered one or more of the specific client's personal circumstances. At a seminar addressing a broad demographic group, no individual's specific circumstances are considered - the advice is general advice. X D - No - seminars are exempt from advice classifications - This is incorrect because there is no seminar exemption from the advice classification provisions of the Corporations Act. Advice given at a seminar is classified on the same basis as any other advice - by applying the s766B test.","type":"standard"},{"section":"Client Scenarios","question":"A client asks their financial adviser whether they can consolidate their three superannuation accounts into one. The adviser holds a standard AFSL?","a":"Requires a separate SMSF authorisation as fund consolidation is a form of SMSF-specific advice","b":"Is factual information only and therefore does not require any AFSL","c":"Is tax agent work only and requires a separate TPB registration to advise on specifically","d":"Falls within the adviser's superannuation authorisation - no SMSF authorisation is required for fund consolidation advice","correct":"D","explanation":"X A - Fund consolidation is superannuation advice, not SMSF advice; it does not require a separate SMSF authorisation. X B - Recommending a consolidation strategy is a specific recommendation, not factual information; an AFSL is required. X C - Fund consolidation advice does not involve tax return preparation; TPB registration is not required for the consolidation itself. \u2713 D - Advising a client on consolidating superannuation accounts involves financial product advice on superannuation and falls within a standard superannuation AFSL authorisation.","type":"standard"},{"section":"Behavioural Finance","question":"Identifying behavioural investor types primarily helps advisers to:","a":"Manage behavioural reactions","b":"Increase trading volume","c":"Predict markets","d":"Increase portfolio complexity","correct":"A","explanation":"\u2713 A - Manage behavioural reactions - This is correct because understanding behavioural investor types enables advisers to anticipate and manage how different clients will react to market events - including designing portfolios and communication strategies that help clients maintain their plan through volatility. This is one of the most practical applications of behavioural finance in advice practice. \u2717 B - Increase trading volume - This is incorrect because increasing trading volume would be contrary to the interests of most investors and could itself constitute churning - an issue under Standard 2 of the FASEA Code. Understanding investor types should reduce unnecessary trading, not increase it. \u2717 C - Predict markets - This is incorrect because behavioural investor types classify individual psychology, not market behaviour. They do not enable market prediction. \u2717 D - Increase portfolio complexity - This is incorrect because complexity typically worsens outcomes for emotionally driven investors by creating more variables, more volatility exposure and more decision points - each of which can trigger an emotional reaction.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the purpose of the FASEA Code of Ethics in the context of the regulatory framework?","a":"It replaces the Corporations Act obligations for all licensed financial","b":"It is voluntary guidance that advisers may choose to follow","c":"It applies only to advisers who were newly registered after 1 January","d":"It sets ethical standards above the minimum legal requirements to shape professional conduct and culture","correct":"D","explanation":"X A - The Code does not replace the Corporations Act; both operate concurrently. X B - The Code is mandatory for all relevant providers, not optional guidance. X C - The Code applies to all relevant providers regardless of when they were registered. \u2713 D - The FASEA Code of Ethics sets professional ethical standards above the minimum requirements of the Corporations Act, shaping adviser conduct at a higher level than mere legal compliance.","type":"standard"},{"section":"Client Scenarios","question":"An adviser's client has given a non-lapsing binding death benefit nomination in favour of their estranged spouse from a marriage that ended 15 years ago. What is the MOST appropriate action for the adviser?","a":"Raise it proactively - an outdated nomination directing super to an estranged former spouse is not in the client's best interests","b":"Leave it - beneficiary nominations are personal decisions outside the adviser's scope","c":"Update the nomination without consulting the client to prevent","d":"Only raise the issue if the client specifically asks about estate planning","correct":"A","explanation":"\u2713 A - Standard 2 requires acting in the client's best interests on an ongoing basis. An outdated non-lapsing binding death benefit nomination that would direct super to an estranged former spouse is clearly not in the client's best interests. The adviser must raise this proactively. X B - Estate planning interacts directly with financial advice; the nomination has significant financial consequences and is within scope. X C - Updating the nomination without client instruction would exceed the adviser's authority. X D - Waiting to be asked would be a failure of the proactive best interests duty under Standard 2.","type":"standard"},{"section":"Behavioural Finance","question":"Which of the following is most likely caused by emotional bias?","a":"Constructing an incorrectly weighted financial model","b":"Calculating portfolio returns using incorrect methodology","c":"Making systematic tax reporting errors over time","d":"Selling investments during a market decline due to fear","correct":"D","explanation":"\u2717 A - Financial modelling errors are cognitive mistakes, not emotional bias. \u2717 B - Return calculation errors are technical mistakes, not driven by emotional states. \u2717 C - Tax errors are administrative or cognitive errors, not examples of emotional investment bias. \u2713 D - Emotional bias causes decisions driven by feelings rather than rational analysis. Selling investments during a market decline because of fear is the defining example of emotional bias overriding a sound long-term strategy.","type":"standard"},{"section":"Client Scenarios","question":"An adviser notices a client always becomes more willing to take investment risks immediately after receiving good news, and more risk-averse after bad news. This pattern is BEST explained by:","a":"The risk tolerance/risk appetite distinction - appetite fluctuates","b":"Framing effect - good and bad news frames the same decision differently","c":"Herding - the client is following market sentiment","d":"Loss aversion - bad news activates fear of loss more than good news","correct":"A","explanation":"\u2713 A - Risk tolerance is a relatively stable personality characteristic. Risk appetite fluctuates with mood, news and market conditions. A client who consistently changes willingness to accept risk with news flow is demonstrating variable risk appetite, not a change in underlying tolerance. X B - The framing effect involves presenting identical outcomes differently; here the underlying news and market conditions genuinely differ. X C - Herding involves following other investors; the pattern here is a personal emotional response to news, not social conformity. X D - Loss aversion explains asymmetric pain from losses; it does not fully capture the systematic fluctuation in risk willingness driven by news flow.","type":"standard"},{"section":"Client Scenarios","question":"A client makes a complaint about their adviser's fee disclosure. The adviser believes the complaint is frivolous. What must the adviser do?","a":"Dismiss the complaint immediately as frivolous without investigating it","b":"Refer the complaint directly to AFCA for external resolution","c":"Respond to the complaint through the firm's IDR process regardless of its apparent merit","d":"Notify ASIC of the complaint within 10 business days","correct":"C","explanation":"X A - Dismissing a complaint without investigation breaches the IDR obligations under RG 271. X B - AFCA is only accessible after IDR has been completed or failed to resolve within 30 days. \u2713 C - Under RG 271, all complaints from retail clients must be addressed through the firm's IDR process. The adviser's personal view that a complaint is frivolous is irrelevant. X D - ASIC notification is not the required response to an individual client complaint; IDR is the prescribed first step.","type":"standard"},{"section":"Behavioural Finance","question":"Research consistently shows that even financially literate investors often fail to achieve their long-term goals. According to behavioural finance, the most common reason for this is:","a":"Lack of financial markets","b":"Excessive diversification","c":"Lack of investment products","d":"Behavioural biases","correct":"D","explanation":"\u2717 A - Lack of financial markets - This is incorrect because Australian investors have access to highly developed, well-regulated financial markets with a broad range of investment options. Access to markets is not a meaningful barrier to achieving investment goals. \u2717 B - Excessive diversification - This is incorrect because diversification is generally protective of long-term goals - it reduces unsystematic risk. Excessive diversification can marginally reduce returns but is not a primary reason investors fail to achieve financial goals. \u2717 C - Lack of investment products - This is incorrect because Australian investors have access to a wide range of investment products across all major asset classes. A lack of available products is not a significant barrier to achieving long-term financial goals. \u2713 D - Behavioural biases - This is correct because behavioural finance research - including the work of Kahneman, Tversky, Thaler and others - demonstrates that systematic behavioural biases (such as loss aversion, overconfidence, herding and mental accounting) cause even financially literate investors to make poor decisions that undermine their long-term goals.","type":"standard"},{"section":"Behavioural Finance","question":"A client's risk profile questionnaire result suggests 'balanced' but during conversation they say 'I can't sleep when my investments drop.' The adviser should:","a":"Accept the questionnaire result and proceed with the balanced risk profile","b":"Note the discrepancy, explore it further, and use the more conservative indicator to guide the advice","c":"Override the questionnaire and classify the client as conservative","d":"Repeat the questionnaire until the client provides consistent answers","correct":"B","explanation":"\u2717 A - Accepting only the questionnaire result ignores a material piece of information the client has disclosed. \u2713 B - Where there is a discrepancy between a formal risk profile questionnaire and verbal disclosure, the adviser must explore it. Using the more conservative indicator protects the client from a strategy they cannot emotionally sustain. \u2717 C - Overriding the questionnaire without exploration is not appropriate; the discrepancy must be understood before conclusions are drawn. \u2717 D - Repeating the questionnaire without exploring the discrepancy does not resolve the underlying inconsistency.","type":"standard"},{"section":"Behavioural Finance","question":"A client who received financial advice from their parents always invests in term deposits regardless of their financial situation or interest rate environment.","a":"Familiarity bias and status quo bias - following an inherited pattern","b":"Rational conservatism that is appropriate for all investors","c":"Loss aversion applied uniformly to all available investment types","d":"Anchoring on historically high term deposit interest rates","correct":"A","explanation":"\u2713 A - Two biases operate together. Familiarity bias causes overweighting of familiar investment types inherited from family. Status quo bias reinforces continuing the pattern regardless of whether it suits current circumstances. \u2717 B - Investing exclusively in term deposits regardless of financial situation or rate environment is not rational conservatism. \u2717 C - Loss aversion would explain reluctance to crystallise losses; the issue here is familiarity and inertia, not loss avoidance. \u2717 D - Anchoring on historical rates is a component but does not explain the primary driver - the inherited familiarity pattern.","type":"standard"},{"section":"Client Scenarios","question":"When a client raises a fee complaint, what is the adviser's primary obligation?","a":"Refer the complaint immediately to AFCA to ensure timely external","b":"Address the complaint through the firm's internal dispute resolution","c":"Disregard the complaint if the fees were correctly disclosed and charged","d":"Reduce the fees immediately to resolve the matter without further escalation","correct":"B","explanation":"X A - AFCA is accessible only after the IDR process is exhausted or fails to resolve within 30 days. \u2713 B - Under RG 271, all complaints from retail clients must be addressed through the firm's internal dispute resolution (IDR) process before the client can escalate to AFCA. X C - A complaint cannot be dismissed because the fees were correctly charged; all complaints must be addressed through IDR. X D - Reducing fees to avoid a complaint is not the prescribed regulatory response; the obligation is to investigate and respond.","type":"standard"},{"section":"Ethics & Corps Act","question":"Which Standard specifically requires compliance with the law?","a":"Standard 2","b":"Standard 1","c":"Standard 11","d":"Standard 12","correct":"B","explanation":"\u2717 A - Standard 2 - This is incorrect because Standard 2 is the integrity and best interests standard. While integrity includes compliance, Standard 2 goes beyond legal compliance to require advisers to act with integrity in the client's best interests even where the law does not specifically require it. \u2713 B - Standard 1 - This is correct because Standard 1 of the FASEA Code of Ethics specifically requires advisers to 'act in accordance with all applicable laws, including this Code, and not try to avoid or circumvent their intent.' It is the legal compliance standard. \u2717 C - Standard 11 - This is incorrect because Standard 11 specifically requires advisers to 'cooperate with ASIC and monitoring bodies in any investigation of a breach or potential breach.' It is about regulatory cooperation, not general legal compliance. \u2717 D - Standard 12 - This is incorrect because Standard 12 requires advisers to 'uphold and promote the ethical standards of the profession and hold each other accountable for the protection of the public interest.' It addresses professional peer standards, not legal compliance.","type":"standard"},{"section":"Client Scenarios","question":"An adviser gives personal advice to a retail client. The client asks for the SOA immediately after the meeting. The adviser emails it three weeks later. Which of the following BEST describes the regulatory position?","a":"No breach - three weeks is a reasonable timeframe given competing demands","b":"A breach of s946A - an SOA must be provided at the time of advice or as soon","c":"No breach - if the client did not formally complain about the delay","d":"A breach only if the client actually implemented the advice before receiving","correct":"B","explanation":"X A - Three weeks is not a reasonable period; the obligation is to provide the SOA promptly after advice. \u2713 B - Under s946A, an SOA must be provided at the time the personal advice is given or, if not reasonably practicable, as soon as practicable after. Three weeks is not as soon as practicable when the client requested it immediately. X C - The breach arises from the timing failure, not from the client's complaint. X D - The breach is the delayed delivery of the SOA itself; it is not contingent on whether the advice was implemented first.","type":"standard"},{"section":"Ethics & Corps Act","question":"Under s923A, an adviser may only use the term 'independent' if:","a":"They operate as a sole trader without institutional ties","b":"They hold a relevant degree and professional body membership","c":"They disclose all commissions received to each client","d":"They receive no commissions or benefits that could influence advice","correct":"D","explanation":"\u2717 A - Operating as a sole trader does not satisfy s923A if commissions or tied arrangements exist. \u2717 B - Qualifications and professional membership are not the s923A test for independence. \u2717 C - Disclosure of commissions is not a substitute for independence; s923A requires the absence of those commissions. \u2713 D - s923A of the Corporations Act requires that an adviser using the term 'independent' must not receive commissions, volume-based payments or any benefits that could reasonably be expected to influence their advice.","type":"standard"},{"section":"Client Scenarios","question":"A client requests access to all personal information held about them by their financial adviser. Under the Privacy Act, the adviser must:","a":"Decline - client files are the adviser's property","b":"Only provide information less than two years old","c":"Provide access within a reasonable time unless an exception applies","d":"Require the client to pay a fee before access is granted","correct":"C","explanation":"X A - Decline - client files are the adviser's property - This is incorrect because while client files may be the property of the AFS licensee, the Privacy Act gives the individual a right of access to their own personal information regardless of who holds it. Ownership of the file does not override the privacy access right. X B - Only provide information less than two years old - This is incorrect because there is no two-year limitation on the access right in APP 12. The individual has the right to access all their personal information held by the entity, subject only to the specific exceptions listed in APP 12. \u2713 C - Provide access within a reasonable time unless an exception applies - This is correct because APP 12 of the Privacy Act 1988 (Cth) gives individuals the right to access their personal information held by an APP entity. The entity must provide access within a reasonable time - generally 30 days - unless a specific exception applies (such as where access would prejudice a regulatory investigation or unreasonably impact another person's privacy). X D - Require the client to pay a fee before access - This is incorrect because while APP 12 permits charging a reasonable fee for providing access (covering actual costs), it does not permit withholding access until a fee is paid upfront. Requiring payment as a precondition for access could amount to a de facto refusal.","type":"standard"},{"section":"Behavioural Finance","question":"An adviser notices a client consistently makes different financial decisions when meeting in person compared to when emailed the same information.","a":"Greater confidence derived from the physical presence of the adviser","b":"The influence of social context - physical presence amplifies emotional and social pressure in decision-making","c":"The client reads emails less carefully than face-to-face information","d":"Overconfidence that is only triggered by face-to-face social interaction","correct":"B","explanation":"\u2717 A - Greater confidence in the adviser's presence may partially explain it but does not capture the broader social context mechanism. \u2713 B - Behavioural economics research shows that social context significantly affects decision-making. Physical presence amplifies emotional engagement, social pressure and the desire to appear decisive, leading to bolder decisions. \u2717 C - The difference in decisions is systematic and reflects a behavioural pattern, not email reading habits. \u2717 D - Overconfidence is a cognitive bias unrelated to the social-context mechanism described here.","type":"standard"},{"section":"Client Scenarios","question":"A client has just purchased an investment property and asks their financial adviser to advise on negative gearing strategy, including how to structure the loan?","a":"AFSL only - negative gearing is a financial planning strategy covered","b":"Potentially both an ACL (loan structure advice) and TPB registration (tax deduction advice) required","c":"ACL only - the strategy is primarily a borrowing arrangement","d":"No licence is required - negative gearing strategies are publicly","correct":"B","explanation":"X A - An AFSL does not cover credit advice (loan structure) or tax deduction advice. \u2713 B - Advising on negative gearing spans multiple regulated services: the loan structure requires ACL authorisation, and the tax deduction strategy requires TPB registration. The AFSL alone does not cover either component. X C - The ACL alone covers the loan structure; TPB registration is also needed for the tax strategy component. X D - Specific advice on loan structures and tax deductions requires the relevant licences.","type":"standard"},{"section":"Client Scenarios","question":"An adviser has two joint clients who are separating. Client A privately tells the adviser information that is highly relevant to Client B's financial interests. What should the adviser do?","a":"Disclose to Client B - the best interests duty overrides","b":"Maintain confidentiality to Client A - privacy obligations are absolute","c":"Continue acting for both clients and keep the information strictly confidential from each party","d":"Cease acting for both clients - the conflict of duties is irreconcilable","correct":"D","explanation":"X A - Disclosing to Client B would breach the adviser's duty of confidentiality to Client A. X B - Privacy obligations are not absolute; they must be weighed against other duties, but here the conflict cannot be resolved. X C - Compartmentalising information while continuing to act means the adviser is knowingly withholding material information from Client B - a breach of best interests duty. \u2713 D - When an adviser holds confidential information from one joint client that is material to the interests of the other, the conflict of duties is irreconcilable. The adviser cannot disclose (breach of confidentiality) or withhold (breach of best interests). The only proper course is to cease acting for both clients.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the concept of 'scalable advice' and its relationship to access to advice?","a":"Scaled advice is lower quality advice provided to clients who pay a reduced","b":"Scaled advice does not require a Statement of Advice or satisfy the best","c":"Scaled advice is only appropriate for wholesale clients who have complex financial circumstances","d":"Scaled advice allows advice on a specific agreed topic while meeting the best interests duty fully within that scope","correct":"D","explanation":"X A - Scaled advice is full personal advice within the agreed scope; it is not lower quality. X B - Scaled advice requires an SOA when given to retail clients and the best interests duty applies fully. X C - Scaled advice is available to retail and wholesale clients alike. \u2713 D - Scaled advice allows advisers to focus on a specific topic agreed with the client, reducing cost and complexity while fully meeting the best interests duty within that scope.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes why the Code of Ethics uses principles rather than prescriptive rules?","a":"Principles are simpler to administer than detailed prescriptive rules","b":"Prescriptive rules would require excessive documentation and regulatory","c":"Principles carry no legal force and are treated as aspirational only","d":"Principles require professional judgment in each situation rather than mechanical rule-following","correct":"D","explanation":"X A - Administrative simplicity is not the stated rationale for a principles-based approach. X B - Documentation requirements exist under both principles-based and rules-based regimes. X C - The FASEA Code of Ethics is mandatory and legally enforceable; it is not merely aspirational. \u2713 D - A principles-based Code requires advisers to exercise genuine professional judgment appropriate to each situation. This prevents advisers from looking for technical loopholes that satisfy the letter but not the spirit of the obligation.","type":"standard"}]},{"label":"Tuesday 1 July","mode":"standards","warmup":[{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"A","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"C","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"C","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","d":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","correct":"A","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"D","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"B","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"D","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9},{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","c":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","d":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","correct":"C","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6},{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","b":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","correct":"B","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","correct":"D","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"B","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"A","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1}],"questions":[{"section":"Ethics & Corps Act","question":"A client agrees to an ongoing fee arrangement but is never shown what services they are receiving for the fee. Under Standard 7, advisers must ensure:","a":"Advisers receive no more than 2% commission","b":"Clients are fully informed of fees and give consent to payment","c":"Licensees approve all remuneration arrangements","d":"Clients receive a refund for underperformance","correct":"B","explanation":"\u2717 A - Advisers receive no more than 2% commission - This is incorrect because Standard 7 contains no specific percentage cap on commissions or fees. The obligation is that fees are fair, reasonable and represent value for money - not that they fall below a specific limit. \u2713 B - Clients are fully informed of fees and give consent to payment - This is correct because Standard 7 of the FASEA Code of Ethics requires advisers to 'obtain the client's free, prior and informed consent to all benefits' received in connection with acting for the client, including fees. Clients must understand and agree to what they are paying. \u2717 C - Licensees approve all remuneration arrangements - This is incorrect because Standard 7 places the obligation on the individual adviser, not solely on the licensee. The adviser must personally satisfy themselves that fees are fair and that the client has given informed consent. \u2717 D - Clients receive a refund for underperformance - This is incorrect because neither Standard 7 nor any other provision of the FASEA Code requires refunds for investment underperformance. The best interests duty governs advice quality, not investment outcomes.","type":"standard"},{"section":"Client Scenarios","question":"Under Standard 12, advisers must hold each other accountable. An adviser notices a colleague is providing advice outside their authorisation.","a":"Ignore it - monitoring colleagues is not an individual adviser's","b":"Raise the concern through appropriate internal or regulatory channels","c":"Contact the affected clients directly to inform them of the situation","d":"Confront the colleague publicly at the next team meeting","correct":"B","explanation":"X A - Standard 12 explicitly places peer accountability obligations on all advisers. \u2713 B - Standard 12 requires advisers to hold each other accountable and report concerns through appropriate compliance or regulatory channels, not to remain silent when they observe conduct that may harm clients. X C - Contacting clients directly is not the appropriate first step; internal escalation or reporting to ASIC is. X D - Public confrontation is not a professional or appropriate mechanism under Standard 12.","type":"standard"},{"section":"Client Scenarios","question":"An AFS licensee outsources its paraplanning function to an overseas firm. Which statement BEST reflects the licensee's obligations?","a":"The licensee transfers all compliance responsibility to the overseas","b":"Outsourcing paraplanning overseas is prohibited under the Corporations Act","c":"ASIC must pre-approve all outsourcing arrangements before they commence","d":"The licensee retains full responsibility and must ensure the outsourced firm meets the same standards as if services were provided in-house","correct":"D","explanation":"X A - Responsibility does not transfer to the outsourced party; the licensee remains accountable. X B - Outsourcing is not prohibited; it is permitted subject to the licensee maintaining oversight and accountability. X C - ASIC pre-approval is not required for outsourcing arrangements; the obligation is on the licensee to ensure ongoing compliance. \u2713 D - Under s912A, a licensee cannot outsource its regulatory obligations. It retains full responsibility for the conduct of outsourced service providers and must ensure they operate to the same standard required of the licensee itself.","type":"standard"},{"section":"Client Scenarios","question":"Standard 6 requires advisers to consider the 'broad effects' of advice. Which of the following is the BEST example of applying Standard 6?","a":"Recommending a product from the approved product list without reviewing","b":"Disclosing all fees and charges in the Statement of Advice as required","c":"Recommending a portfolio that matches the client's stated balanced","d":"Recommending a geared strategy to a client with young children and no income protection, without considering the broad financial impact","correct":"D","explanation":"X A - Recommending from the approved product list may still comply with Standard 6 if the broader effects are considered. X B - Fee disclosure is a Standard 7 and Corporations Act obligation; it does not satisfy Standard 6. X C - A risk-matched portfolio recommendation does not itself engage Standard 6. \u2713 D - Standard 6 requires advisers to consider the broad effects of their advice, including risks to financial wellbeing beyond the immediate strategy. Recommending a geared strategy to a client with dependants and no income protection without flagging the downside risks (such as a margin call coinciding with loss of income) breaches Standard 6.","type":"standard"},{"section":"Client Scenarios","question":"A licensee instructs all advisers to recommend a new in-house managed fund to all clients with a balanced risk profile. What should override this instruction?","a":"Licensee direction - authorised representatives must follow their licensee's","b":"Standard 8 - document the licensee direction and proceed as instructed","c":"Standard 3 - disclose the conflict arising from the licensee","d":"Best interests duty - each adviser's duty to individual clients","correct":"D","explanation":"X A - Authorised representatives are not obliged to follow licensee instructions that would cause them to breach their best interests duty. X B - Documenting the direction and proceeding still results in a best interests duty breach; documentation is not a substitute for compliance. X C - Disclosing the conflict in the SOA does not cure the underlying best interests duty breach. \u2713 D - The best interests duty under s961B and Standard 2 is personal to each adviser. A licensee product directive does not override it. If the recommended product is not in a specific client's best interests, the adviser cannot comply with the directive without breaching their duty.","type":"standard"},{"section":"Client Scenarios","question":"A client asks their adviser to draft their will. The adviser is not a legal practitioner. What should the adviser do?","a":"Draft the will directly - estate planning falls within the scope of financial","b":"Complete the will document and have it witnessed by the client's accountant","c":"Decline to provide any estate planning guidance or discussion","d":"Advise on the financial aspects of the estate plan and refer the will drafting to a qualified solicitor","correct":"D","explanation":"X A - Drafting a will without a legal practitioner's licence is practising law without authorisation. X B - Using an untrained witness and an unqualified drafter creates a will that may be invalid. X C - Declining all estate planning discussion is unnecessarily restrictive; financial planners play a valuable role in estate planning strategy. \u2713 D - Drafting a will is the practice of law and requires a practising solicitor's licence. The adviser can discuss and advise on the financial aspects of the estate plan but must refer the will drafting to a qualified solicitor.","type":"standard"},{"section":"Client Scenarios","question":"Standard 3 requires an adviser not to advise, refer or act where a conflict of interest or duty exists. When is an adviser MOST likely to satisfy Standard 3?","a":"When the conflict is disclosed generically in the FSG prior to the meeting","b":"When specifically disclosed, the client consents, and the adviser can still act in the client's best interests","c":"When the adviser has personally assessed and documented the conflict","d":"When the licensee has reviewed and approved the specific conflicted","correct":"B","explanation":"X A - Generic FSG disclosure alone does not satisfy Standard 3; the conflict must be specifically identified and disclosed, not just noted in a generic boilerplate statement. \u2713 B - Standard 3 MOST likely to be satisfied when the conflict is specifically disclosed, the client gives informed consent, AND the adviser can demonstrate the conflict is properly managed in the client's interests. Note: even with disclosure and consent, Standard 3 may still prohibit acting if the conflict cannot be adequately managed. X C - Personal assessment and documentation alone does not satisfy Standard 3 without specific disclosure to the client and assessment of whether acting is appropriate. X D - Licensee approval is not a substitute for the adviser's own obligation under Standard 3 to manage the conflict in the client's interests.","type":"standard"},{"section":"Client Scenarios","question":"A client requests advice on a strategy that is legal but which the adviser believes is ethically problematic. Under the FASEA Code, the adviser should:","a":"Proceed - if the strategy is legal, the adviser has no basis to decline","b":"Refuse entirely - the Code prohibits acting on any strategy the adviser finds","c":"Refer the matter to ASIC before deciding whether to proceed or decline","d":"Discuss concerns with the client and consider whether the advice can be provided in a way that addresses the ethical concerns","correct":"D","explanation":"X A - Legality alone does not satisfy the Code; the adviser has obligations under Standards 2 and 6 beyond mere compliance. X B - The Code does not require blanket refusal; it requires professional ethical judgment. X C - ASIC referral is not the appropriate mechanism for this type of ethical assessment. \u2713 D - Where a strategy is legal but raises ethical concerns, the FASEA Code requires the adviser to exercise professional judgment under Standards 2 and 6. The adviser should discuss the concern with the client and assess whether the advice can be given with integrity.","type":"standard"},{"section":"Client Scenarios","question":"An investor reads only positive articles about a company before investing and ignores negative analyst reports. This is BEST described as:","a":"Herding","b":"Framing effect","c":"Confirmation bias","d":"Overconfidence","correct":"C","explanation":"X A - Herding - This is incorrect because herding involves following the investment decisions of others. The client is not following the crowd - they are selectively processing information to confirm a pre-existing belief. This is confirmation bias. X B - Framing effect - This is incorrect because the framing effect relates to how the presentation of identical information affects responses. The client is not responding to differently framed versions of the same information - they are choosing which sources of information to engage with based on whether they confirm existing beliefs. \u2713 C - Confirmation bias - This is correct because confirmation bias causes investors to seek out information that supports their existing beliefs and ignore information that contradicts them. Reading only positive articles while deliberately ignoring negative analyst reports before investing is the textbook definition of confirmation bias. X D - Overconfidence - This is incorrect because overconfidence involves overestimating one's own analytical ability or knowledge. The selective information-seeking described is confirmation bias - the client is protecting their existing belief by filtering out contradictory information.","type":"standard"},{"section":"Ethics & Corps Act","question":"Under s961J, what must an adviser do if a conflict of interest exists?","a":"Ignore the conflict if disclosed","b":"Refer the client elsewhere","c":"Obtain client consent only","d":"Give priority to the client's interests","correct":"D","explanation":"\u2717 A - Ignore the conflict if disclosed - This is incorrect because disclosure alone does not satisfy s961J. The priority rule requires the client's interests to be placed ahead of the adviser's and licensee's interests - disclosure is a separate requirement under Standard 3 of the Code. \u2717 B - Refer the client elsewhere - This is incorrect because s961J does not require referral as the primary response to a conflict. Referral may be appropriate in some cases where the conflict is irreconcilable, but the rule's primary obligation is to give priority to the client's interests. \u2717 C - Obtain client consent only - This is incorrect because client consent alone does not satisfy s961J. The priority obligation exists independently - consent may be required under Standard 4 but does not discharge the duty to prioritise the client's interests. \u2713 D - Give priority to the client's interests - This is correct because s961J of the Corporations Act - the priority rule - specifically requires that where a conflict exists between the interests of the client and those of the licensee or adviser, the adviser must give priority to the client's interests.","type":"standard"},{"section":"Client Scenarios","question":"An adviser says to a client: 'The RBA increased rates by 0.25% today.' This is BEST classified as:","a":"Personal advice","b":"General advice","c":"Factual information","d":"Financial product advice","correct":"C","explanation":"X A - Personal advice - This is incorrect because personal advice requires a recommendation that takes into account the client's personal circumstances. Stating a factual RBA rate decision involves no recommendation whatsoever. X B - General advice - This is incorrect because general advice involves a recommendation or opinion about a financial product without considering individual circumstances. This statement contains no recommendation - it is purely factual data about an event. \u2713 C - Factual information - This is correct because stating that 'the RBA increased rates by 0.25% today' is a factual statement about an observable economic event - it involves no recommendation and no consideration of any individual's circumstances. Under the Corporations Act, factual information that involves no recommendation about a financial product is not financial product advice. X D - Financial product advice - This is incorrect because financial product advice under s766B requires either a recommendation, statement of opinion or report about whether to acquire, hold or dispose of a financial product. Reporting an RBA rate decision is none of these - it is factual information.","type":"standard"},{"section":"Client Scenarios","question":"An adviser files a Suspicious Matter Report about a client's unusual transaction. The client then asks the adviser directly: 'Have you reported anything about me to authorities?' Which rule governs the adviser's response?","a":"Privacy Act - the adviser must be transparent with the client about all information held","b":"AML/CTF Act - disclosing that an SMR has been filed (tipping off) is a criminal offence that overrides all other duties","c":"Best interests duty - transparency with the client serves their interests","d":"Standard 9 - the adviser must not make misleading or deceptive statements","correct":"B","explanation":"X A - The Privacy Act access right under APP 12 does not extend to SMR documents; the AML/CTF tipping-off prohibition applies. \u2713 B - Under s123 of the AML/CTF Act, disclosing to a person that an SMR has been or may be filed about them (tipping off) is a criminal offence. This obligation overrides general transparency duties, the Privacy Act access right, and the FASEA Code. X C - The best interests duty does not require the adviser to disclose a filed SMR; tipping off would itself harm the investigation. X D - Standard 9 prohibits misleading conduct but an adviser who cannot answer a question due to a statutory prohibition is not deceiving the client.","type":"standard"},{"section":"Client Scenarios","question":"An adviser provides appropriate personal advice to a retail client but charges a fee they did not disclose in the SOA. Which of the following BEST describes the consequence?","a":"The advice is defective because the undisclosed fee undermines the quality of the advice","b":"The advice may be sound but the undisclosed fee independently","c":"No breach if the fee was reasonable and consistent with market rates","d":"No breach if the client paid the fee without raising an objection at the time","correct":"B","explanation":"X A - The advice quality is assessed on its own merits; a fee disclosure failure does not make the underlying advice defective. \u2713 B - The advice itself is assessed separately from the fee disclosure. Appropriate advice can exist alongside a fee disclosure failure. The undisclosed fee independently breaches s947B and Standard 7. X C - Reasonableness of the fee does not cure the obligation to disclose it. X D - Client payment without objection is not a waiver of the disclosure obligation.","type":"standard"},{"section":"Client Scenarios","question":"Under the Corporations Act, which of the following is the PRIMARY obligation of a product issuer under the DDO regime?","a":"To ensure that all distributors of the product hold and maintain a current AFSL","b":"To independently review and approve all SOAs produced by authorised representatives","c":"To prepare a Target Market Determination for each product describing the class of consumers it is appropriate for","d":"To obtain prior ASIC approval before making any new financial product available","correct":"C","explanation":"X A - DDO does not require all distributors to hold AFSLs; it operates within the existing licensing framework. X B - Reviewing distributor SOAs is not a product issuer obligation under DDO. \u2713 C - Under s994B of Part 7.8A, a product issuer must prepare a TMD before distributing a product that specifies the class of retail clients for whom the product is appropriate. X D - ASIC pre-approval of products is not required under Part 7.8A; the issuer must prepare a TMD and comply with the regime.","type":"standard"},{"section":"Client Scenarios","question":"APP 5 requires entities to notify individuals of certain matters at or before the time personal information is collected. Which of the following is NOT required to be included in that notification?","a":"The identity and contact details of the collecting entity","b":"The purposes for which the information is collected","c":"The exact fee the entity charges for managing personal information","d":"The client's right to access their personal information","correct":"C","explanation":"X A - Identity and contact details - This is incorrect because this IS a required APP 5 notification. X B - Purposes for which information is collected - This is incorrect because this IS a required APP 5 notification. \u2713 C - The exact fee for managing personal information - This is correct because this is NOT a required APP 5 notification. APP 5 requires notification of identity, purposes, consequences of not providing, potential disclosures, overseas disclosure likelihood, and access/complaint rights - but not fee schedules for information management. X D - Client's right to access their personal information - This is incorrect because information about how to access and correct personal information IS a required APP 5 notification.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following scenarios would most likely constitute tax (financial) advice requiring TASA registration?","a":"An adviser mentions that selling shares may trigger a capital gains tax event","b":"An adviser notes that super contributions are taxed at 15%","c":"An adviser constructs a detailed salary sacrifice strategy","d":"An adviser explains that franking credits may reduce tax payable","correct":"C","explanation":"X A - Mentioning that selling shares may trigger CGT - This is incorrect because a general observation that a share sale may have CGT consequences - made incidentally to financial product advice - is likely to be within the incidental advice exception under TASA. It is not substantive tax advice. X B - Noting that super contributions are taxed at 15% - This is incorrect because stating a factual tax rate (15% contributions tax) as background information is factual, not tax advice. It does not involve advising on a specific client's tax obligations. \u2713 C - Constructing a detailed salary sacrifice strategy to minimise tax - This is correct because under the Tax Agent Services Act 2009 (Cth) (TASA), tax (financial) advice means advice that relates to ascertaining or advising about liabilities, obligations or entitlements under a taxation law. A detailed salary sacrifice strategy specifically designed to minimise a client's marginal tax rate is advice on tax obligations and entitlements - it requires TPB registration as a tax (financial) adviser. X D - Explaining that franking credits may reduce tax - This is incorrect because explaining the general concept of franking credits is informational. It does not amount to advising a specific client on their individual tax obligations or entitlements.","type":"standard"},{"sect
