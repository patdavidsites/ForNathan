ble data breach under which scheme?","a":"Mandatory Data Breach Scheme","b":"AML Incident Reporting Scheme","c":"ASIC Data Breach Protocol","d":"Notifiable Data Breaches Scheme","correct":"D","explanation":"X A - Mandatory Data Breach Scheme - This is incorrect because this is not the correct name of the scheme under the Privacy Act. The correct name is the Notifiable Data Breaches (NDB) scheme. X B - ASIC Data Breach Protocol - This is incorrect because ASIC does not administer data breach notification for Privacy Act purposes. Data breach notification is administered by the OAIC under the Privacy Act 1988. ASIC has its own cybersecurity guidance but the NDB scheme is under the Privacy Act. X C - AML Incident Reporting Scheme - This is incorrect because AML/CTF incident reporting is administered by AUSTRAC under the Anti-Money Laundering and Counter-Terrorism Financing Act 2006. It is entirely separate from the Privacy Act data breach notification regime. \u2713 D - Notifiable Data Breaches Scheme - This is correct because Part IIIC of the Privacy Act 1988 (Cth), inserted by the Privacy Amendment (Notifiable Data Breaches) Act 2017, established the Notifiable Data Breaches (NDB) scheme. Under this scheme, entities covered by the Privacy Act must notify both the OAIC and affected individuals when an eligible data breach occurs.","type":"standard"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser notices their practice has been charging two clients different fees for the same service due to a system error. The adviser corrects this immediately and refunds both clients. Which value best applies?","a":"Diligence","b":"Trustworthiness","c":"Competence","d":"Honesty","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care in the advice process. Identifying fee inconsistencies may require diligent review, but the act of proactively correcting the error to ensure both clients pay fairly is most directly an expression of Trustworthiness. \u2713 B - Trustworthiness requires advisers to act reliably and consistently in a manner clients can depend on, including proactively correcting errors that may have disadvantaged them. Noticing and voluntarily correcting a fee inconsistency - rather than benefiting from the oversight - demonstrates that clients can trust the adviser to act honestly and consistently in their interests even without oversight. Note: Fairness would also be the primary answer were it not excluded from this question. X C - Competence relates to knowledge and skills. Identifying and correcting a fee error is not a knowledge challenge - it is a demonstration of the integrity and reliability that Trustworthiness demands. X D - Honesty relates to truthful and transparent communication. Correcting the fee error and notifying both clients involves honesty, but the broader conduct of proactively identifying and rectifying the inequity is Trustworthiness.","type":"values"},{"section":"Client Scenarios","question":"ASIC requests client files from an adviser as part of a surveillance review. The adviser wants to protect client confidentiality. What should the adviser do?","a":"Refuse - client confidentiality and the Privacy Act take absolute","b":"Comply with the ASIC request - regulatory cooperation obligations and ASIC's statutory powers require compliance","c":"Seek written client consent before providing any client files to ASIC","d":"Only provide files where clients have pre-consented to regulatory disclosure","correct":"B","explanation":"X A - Neither confidentiality nor the Privacy Act is absolute; both yield to ASIC's statutory compulsion powers. \u2713 B - Standard 11 requires cooperation with ASIC and monitoring bodies. ASIC has broad compulsory production powers under s33 of the ASIC Act that override general confidentiality obligations. The Privacy Act also contains exceptions for legally required disclosures. X C - Client consent is not a precondition to complying with a lawful ASIC compulsory production notice. X D - FSG pre-consent is not required or relevant to ASIC's statutory compulsory information-gathering powers.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following best describes a 'retail client' under the Corporations Act?","a":"Any individual who invests more than $500,000","b":"A client investing only through managed funds","c":"A client who holds an AFS licence","d":"A client below the wholesale client threshold","correct":"D","explanation":"X A - Any individual who invests more than $500,000 - This is incorrect because $500,000 is not the relevant threshold for wholesale client status under the Corporations Act. The threshold is net assets of $2.5M or gross income of $250,000 p.a. - $500,000 in an investment does not make a person a wholesale client. X B - A client who holds an AFSL - This is incorrect because holding an AFSL makes a person a licensee, not necessarily a wholesale client for all purposes. Being an AFS licensee is one pathway to wholesale client status but only for certain product categories - it does not automatically make someone a retail client or exclude them from retail client protections. X C - A client who invests only through managed funds - This is incorrect because the retail/wholesale distinction is not determined by the investment vehicle used. A client who invests through managed funds may be either retail or wholesale depending on whether they meet the s761G thresholds. \u2713 D - A client who does not meet the wholesale client threshold - This is correct because under s761G of the Corporations Act, the retail/wholesale distinction is defined by exclusion - a person is a retail client unless they meet one of the categories of wholesale client (net assets exceeding $2.5M, gross income exceeding $250,000, or certain product-specific thresholds). If a person does not meet any wholesale threshold, they are a retail client.","type":"standard"},{"section":"Code Values","question":"An adviser creates a documented process for reviewing all client portfolios against their risk profiles every six months, regardless of market conditions. Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication. Creating a documented process for reviewing portfolios is not about the truthfulness of communication - it is about the professional thoroughness applied to portfolio management. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including implementing systematic processes to ensure regular, rigorous portfolio review. Creating a structured, documented annual review process demonstrates professional commitment to thorough and consistent client engagement. X C - Fairness relates to equitable treatment of clients. A systematic review process does ensure all clients receive the same quality of review, but the primary value demonstrated by creating a rigorous, documented process is Diligence. X D - Competence relates to knowledge and skills. Creating a review process is not a demonstration of technical financial knowledge - it is a demonstration of professional thoroughness.","type":"values"},{"section":"Client Scenarios","question":"An adviser recommends a life insurance product inside superannuation solely to avoid premium cash flow impact without considering the client's specific?","a":"Standard 8 - record keeping","b":"s961B - best interests duty","c":"APP 6 - privacy","d":"s923A - independence","correct":"B","explanation":"X A - Standard 8 - record keeping - This is incorrect because record keeping is about documenting advice, not about whether the advice recommendations are appropriate. The issue here is the quality of the recommendation - not a documentation failure. \u2713 B - s961B - best interests duty - This is correct because recommending a specific insurance placement strategy (inside superannuation) primarily to manage cash flow - without properly assessing whether the policy's benefit definitions, claims process and tax treatment are appropriate for the client's specific circumstances - fails to properly address the client's insurance needs. This is a failure of the best interests duty under s961B. X C - APP 6 - privacy - This is incorrect because APP 6 of the Privacy Act governs use and disclosure of personal information. Recommending insurance inside super is an advice quality issue, not a privacy issue. X D - s923A - independence - This is incorrect because s923A governs the use of independence-related titles by advisers who receive no conflicted remuneration. The issue here is the quality of the insurance placement recommendation - not the adviser's independence status.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following MOST accurately describes the relationship between Standard 5 and Standard 6?","a":"Standard 6 overrides Standard 5 in every case where they appear to conflict","b":"They are identical in practical effect and are read together as a single","c":"Standard 5 applies to retail clients only; Standard 6 applies to all clients","d":"Standard 5 requires advice to be appropriate to the client's circumstances; Standard 6 requires consideration of the broader long-term effects of acting on the advice","correct":"D","explanation":"X A - Neither standard overrides the other; they are complementary and cumulative. X B - They address distinct obligations - suitability versus broader effects - and are not identical. X C - Both standards apply to the same class of clients; the client type is not the distinguishing factor. \u2713 D - Standard 5 requires that advice is appropriate to the client's individual circumstances (suitability). Standard 6 goes further, requiring the adviser to consider the broad effects on the client of acting on the advice, including long-term consequences beyond the immediate recommendation.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following best describes the 'priority rule' under s961J?","a":"Adviser interests take priority in any conflict situation","b":"Licensee interests are paramount where a conflict arises","c":"Client interests must be prioritised over adviser and licensee interests","d":"All conflicts of interest must be completely avoided","correct":"C","explanation":"X A - Adviser interests are expressly subordinated to client interests under s961J. X B - Licensee interests are also subordinated to client interests under s961J. \u2713 C - s961J of the Corporations Act requires an adviser, when there is a conflict between a client's interests and those of the licensee or adviser, to give priority to the client's interests. X D - s961J does not require avoidance of all conflicts; it requires prioritising the client's interests when a conflict exists.","type":"standard"},{"section":"Code Values","question":"An adviser is asked by a client to co-sign a document verifying that the client's financial position meets lending criteria. The adviser knows the information is false and declines to sign. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care. Refusing to co-sign a false document requires integrity, not thoroughness. \u2713 B - Honesty requires advisers to be truthful and not to participate in conduct that is misleading or deceptive. Declining to co-sign a document that misrepresents a client's financial position - even though the client is asking - is a direct and unequivocal demonstration of Honesty. The adviser will not be party to a falsehood regardless of the client relationship or the client's wishes. X C - Fairness relates to equitable treatment of clients. Refusing to sign a false document is not about comparing the treatment of different clients - it is about the adviser's own commitment to truthful conduct. X D - Competence relates to knowledge and skills. Recognising that the document misrepresents the client's position requires competence, but the refusal to participate in the deception is Honesty.","type":"values"},{"section":"Client Scenarios","question":"An adviser is asked by a client to recommend an investment in an unlisted company the adviser has a personal shareholding in. What should the adviser do?","a":"Proceed - as long as the investment is genuinely suitable for the client's","b":"Disclose the personal shareholding verbally during the meeting and proceed","c":"Decline to advise - a personal financial interest in the recommended","d":"Proceed if the unlisted company is included on the licensee's","correct":"C","explanation":"X A - Suitability alone is insufficient; the personal financial interest creates a conflict Standard 3 requires to be addressed. X B - Verbal disclosure alone does not satisfy Standard 3 when the conflict cannot be adequately managed. \u2713 C - Under Standard 3, an adviser with a personal financial interest in an investment they are recommending has a conflict that cannot be adequately managed; the adviser must decline. X D - APL inclusion does not cure a personal financial interest conflict.","type":"standard"},{"section":"Conflicted Remuneration","question":"Which of the following is another example of conflicted remuneration?","a":"Override commissions paid to an adviser for exceeding sales targets","b":"A fee-for-service charged directly to the client for advice","c":"Ongoing service fees disclosed in the SOA and consented to by the client","d":"A flat adviser fee agreed with the client and documented in the OSA","correct":"A","explanation":"\u2713 A - Override commissions are payments made by a licensee to an adviser for exceeding product sales targets. They are conflicted remuneration because they incentivise sales over client interests. \u2717 B - Fee-for-service charged to the client is not conflicted remuneration; it is a client-paid fee disclosed in the SOA. \u2717 C - Disclosed ongoing service fees consented to by the client are not conflicted remuneration under the FOFA regime. \u2717 D - A flat adviser fee agreed with and paid by the client does not constitute conflicted remuneration.","type":"standard"},{"section":"Code Values","question":"An adviser immediately notifies their licensee when they realise they have made a compliance error, even though self-reporting may result in disciplinary consequences for themselves. Which value does this MOST demonstrate?","a":"Fairness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Fairness relates to equitable treatment of clients. Immediately self-reporting a compliance error to the licensee is not about comparing the treatment of different clients - it is about the adviser's own truthful conduct. \u2713 B - Honesty requires advisers to be truthful and transparent, including - and especially - when reporting their own errors or compliance failures to those who need to know. Immediately notifying the licensee of a compliance error without waiting to see if it is discovered demonstrates the adviser's commitment to truthful conduct even when disclosure is to their own disadvantage. X C - Competence relates to knowledge and skills. Recognising a compliance error requires competence, but reporting it immediately is Honesty. X D - Diligence relates to thoroughness and due care. Noticing the error may require diligent review, but the act of immediate self-reporting is Honesty.","type":"values"},{"section":"Client Scenarios","question":"A client is classified as wholesale. Does this mean the FASEA Code of Ethics imposes no obligations on the adviser?","a":"Yes - the FASEA Code applies only to advice given to retail clients, not wholesale","b":"Only if the advice involves superannuation or retirement planning matters","c":"Only Standards 1 and 2 apply when advising wholesale clients under the Code","d":"No - the Code applies to all advice given by relevant providers","correct":"D","explanation":"X A - The Code is not limited to retail client advice; it applies to the adviser's conduct generally. X B - There is no superannuation carve-in; the Code applies across all advice topics. X C - All 12 Standards of the Code apply to all advice; they are not selectively applied based on client type. \u2713 D - The FASEA Code applies to all relevant providers in relation to all advice they give. The wholesale or retail classification of the client does not affect the adviser's obligations under the Code.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following is the best example of factual information (not advice)?","a":"You should invest in this fund given your goals'","b":"Based on your situation, I recommend a balanced portfolio'","c":"This fund returned 9.2% over the last 5 years'","d":"You should consider switching super funds'","correct":"C","explanation":"X A - 'You should invest in this fund given your goals' - This is incorrect because this statement is personal advice - it involves a recommendation ('you should invest') that has considered the client's goals (personal circumstances). It engages s766B as personal financial product advice. X B - 'Based on your situation, I recommend a balanced portfolio' - This is incorrect because this is personal advice - it explicitly references the client's situation (personal circumstances) and makes a recommendation. It engages s961B and all personal advice obligations. \u2713 C - 'This fund returned 9.2% over the last 5 years' - This is correct because this statement is a purely factual piece of information - it reports a historical performance figure with no recommendation about what the investor should do with it. Under s766B of the Corporations Act, factual information involves no recommendation and does not constitute financial product advice. X D - 'You should consider switching super funds' - This is incorrect because 'you should consider' is a recommendation - even if not as direct as 'you should invest.' It involves a suggestion about what the investor should do, making it at minimum general advice, and personal advice if the client's circumstances have been considered.","type":"standard"},{"section":"Code Values","question":"An adviser prepares a simple comparison table showing how three products differ in fees and features before recommending one. Which value does this MOST demonstrate?","a":"Trustworthiness","b":"Honesty","c":"Diligence","d":"Fairness","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Preparing a clear comparison table to assist a client decision does serve their long-term interest, but the primary value demonstrated by presenting accurate, clear and complete comparative information is Honesty. \u2713 B - Honesty requires advisers to be truthful and transparent, including presenting product information in a way that gives clients an accurate and complete picture for decision-making. Preparing a simple, clear comparison table showing how three products differ in fees and features - rather than a one-sided summary favouring the adviser's preferred recommendation - is a direct demonstration of Honesty in the presentation of information. X C - Diligence relates to thoroughness and due care. Preparing a thorough comparison table requires diligence, but the primary value demonstrated by the balanced, transparent presentation of information is Honesty. X D - Fairness relates to equitable treatment of clients. Presenting a balanced comparison is not about comparing the treatment of different clients - it is about the quality and completeness of truthful information provided to this client.","type":"values"},{"section":"Scaled Advice","question":"A client asks for advice only on their insurance needs. They have complex financial circumstances including a large investment portfolio, but specifically want?","a":"Comprehensive advice covering all areas of the client's financial situation","b":"Personal advice limited in scope to the specific area agreed with the client","c":"General advice provided only to wholesale clients in limited circumstances","d":"Advice that replaces the requirement for an SOA in limited circumstances","correct":"B","explanation":"\u2717 A - Comprehensive advice covers all aspects; scaled advice is deliberately limited to the agreed topic. \u2713 B - Scaled advice is personal advice limited in scope by agreement with the client to one or more specific areas. It must still meet the best interests duty within that agreed scope. \u2717 C - Scaled advice is a form of personal advice, not general advice; it applies to both retail and wholesale clients. \u2717 D - Scaled advice still requires an SOA when given to a retail client; the scope does not remove the documentation obligation.","type":"standard"},{"section":"Behavioural Finance","question":"Which behavioural investor type is most likely to be strongly influenced by emotions?","a":"All investor types equally","b":"Only cognitive investor types","c":"Emotional investor types","d":"Rational investor types","correct":"C","explanation":"\u2717 A - All investor types equally - This is incorrect because different investor types respond to emotions differently. Cognitive investor types are more driven by reasoning errors than feelings, and rational investor types make decisions based primarily on analysis. Emotional investor types are disproportionately influenced by feelings. \u2717 B - Only cognitive investor types - This is incorrect because cognitive investor types are driven by reasoning errors and mental shortcuts (such as anchoring or representativeness), not primarily by emotional responses. Cognitive biases involve faulty logic, not emotional reactions. \u2713 C - Emotional investor types - This is correct because by definition, emotional investor types are those whose investment decisions are most strongly influenced by feelings such as fear, excitement, anxiety and attachment. This is the defining characteristic of the emotional investor type classification in behavioural finance. \u2717 D - Rational investor types - This is incorrect because rational investor types make investment decisions based primarily on analysis and evidence. While no investor is entirely free of emotion, rational investor types are the least influenced by feelings relative to the other investor types.","type":"standard"},{"section":"Code Values","question":"An adviser charges the same fee for a service regardless of whether the client is new or long-standing, because the work involved is equivalent. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Competence","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Charging the same fee for a service regardless of whether the client is new or long-standing is not a matter of thoroughness - it is a matter of professional objectivity and equitable treatment. X B - Honesty relates to truthful communication. Charging consistent fees is not about what the adviser communicates - it is about equitable professional conduct. \u2713 C - Fairness requires advisers to maintain professional objectivity and to treat all clients consistently, without giving preferential pricing or service based on the length or value of the relationship. Charging the same fee for the same service regardless of whether the client is new or long-standing demonstrates that professional objectivity governs the adviser's conduct - not personal familiarity or commercial considerations. X D - Competence relates to knowledge and skills. Consistent fee-charging is not a knowledge issue - it is a question of professional objectivity and equitable treatment.","type":"values"}]},{"label":"Friday 4 July","mode":"mixed","warmup":[{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"A","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","c":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"A","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"C","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9},{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"C","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6},{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","c":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","d":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","correct":"C","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","correct":"B","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"C","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"C","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","correct":"B","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"C","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"B","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","b":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","correct":"B","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2}],"questions":[{"section":"Code Values","question":"Competence is NOT listed. An adviser reads every piece of new ASIC regulatory guidance as it is released and updates their advice process accordingly. Which value best applies?","a":"Trustworthiness","b":"Fairness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Staying current with new ASIC regulatory guidance certainly serves clients' long-term interests, but the specific obligation driving an adviser to read guidance as it is released is Diligence - the continuous, thorough effort to remain professionally engaged. X B - Fairness relates to equitable treatment of clients. Staying current with regulations does not involve comparing the treatment of different clients - it is about the quality of professional effort applied to maintaining knowledge. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactive and continuous engagement with new regulatory developments. Reading every new ASIC guidance release as it is published - rather than waiting until it becomes immediately necessary - demonstrates the professional thoroughness and continuous engagement that Diligence demands. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful and transparent communication with clients. Staying current with regulations is not primarily about communication - it is about the thoroughness and care of professional effort.","type":"values"},{"section":"Client Scenarios","question":"A client insists on keeping their 'safety' money in a term deposit earning 2% while also carrying credit card debt at 20%. This BEST illustrates:","a":"Loss aversion - the client is afraid of losing the term deposit principal","b":"Status quo bias - the client defaults to keeping the term deposit due to inertia","c":"Mental accounting - treating different pools of money by different","d":"Anchoring - the client is fixated on the term deposit interest rate","correct":"C","explanation":"X A - Loss aversion explains reluctance to crystallise losses; the issue here is the compartmentalisation of money pools. X B - Status quo bias involves inertia; mental accounting better explains the active and ongoing application of different rules to different money pools. \u2713 C - Mental accounting explains the irrational treatment of the same money by different rules depending on its mental category. Earning 2% on a \"safety\" deposit while paying 20% on credit card debt is financially irrational but emotionally logical to the client. X D - Anchoring on an interest rate is a related concept but mental accounting better captures the multi-pool reasoning structure.","type":"standard"},{"section":"Code Values","question":"An adviser is offered a higher commission product but recommends a lower-cost alternative that better suits the client. Which value does this primarily demonstrate?","a":"Fairness","b":"Honesty","c":"Diligence","d":"Competence","correct":"A","explanation":"\u2713 A - Fairness requires advisers to maintain professional objectivity and to serve clients' interests without allowing personal financial incentives to distort advice. Recommending a lower-cost product that better suits the client's needs - despite the availability of a higher-commission alternative - demonstrates that the adviser's professional judgment is not distorted by personal gain. X B - Honesty relates to truthful and transparent communication. Not recommending the higher-commission product is not specifically an act of communication - it is an act of professional objectivity that places the client's interests above the adviser's financial benefit. X C - Diligence relates to thoroughness and due care in the advice process. Identifying the lower-cost alternative may require diligent research, but the decision to recommend it over the higher-commission option is an expression of Fairness. X D - Competence relates to knowledge and skills. Knowing which product better suits the client requires competence, but the value specifically demonstrated by choosing the client-appropriate option over personal gain is Fairness.","type":"values"},{"section":"Client Scenarios","question":"An adviser provides advice that leads to a client losing $50,000. The advice followed all safe harbour steps. Which statement is MOST accurate?","a":"The financial loss itself proves the adviser breached the best","b":"The adviser is automatically liable for the loss because they provided","c":"A financial loss does not automatically establish a breach","d":"The client cannot complain or seek compensation if they signed the Statement","correct":"C","explanation":"X A - Loss is an outcome; the test for breach is whether the advice process met the statutory standard. X B - Providing advice does not automatically create liability; the adviser is liable only if they failed to comply with the applicable obligations. \u2713 C - The best interests duty is a process obligation. A client can follow correct advice and still suffer a loss due to market movements; that outcome alone does not constitute a breach. X D - Signing an SOA does not waive the client's rights to complain or seek compensation for a breach.","type":"standard"},{"section":"Client Scenarios","question":"APP 11 requires entities to take reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification or disclosure. Which of these options is the most compliant way of meeting this principle?","a":"Storing all physical client files in a locked office that is accessible to all staff","b":"Placing a single shared password on the primary office computer where client","c":"Shredding paper documents when they are no longer in active use","d":"Implementing a security framework: access controls, encryption, staff training, and regular security reviews","correct":"D","explanation":"X A - A locked office accessible to all staff is insufficient; access must be controlled and limited to those with a need. X B - A single computer password is a minimal measure that falls well short of the reasonable steps standard in APP 11. X C - Shredding documents addresses destruction only; APP 11 requires protection across the entire information lifecycle. \u2713 D - APP 11 requires reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification and disclosure. A comprehensive framework covering access controls, encryption, training, incident response and regular review best satisfies this obligation.","type":"standard"},{"section":"Client Scenarios","question":"A client asks their financial adviser whether they should buy an investment property in Brisbane. The adviser holds a standard AFSL covering managed investments and superannuation. Which of the following is correct?","a":"Direct property is not a financial product under the Corporations Act","b":"The adviser can recommend purchasing direct investment property as an investment decision","c":"The adviser can advise on purchasing direct investment property if they also hold a real estate licence","d":"The adviser can provide a general recommendation about property as an asset","correct":"A","explanation":"\u2713 A - Direct real property is not a financial product under the Corporations Act. An AFSL authorisation does not extend to direct property. The adviser can discuss property in the context of overall financial planning but cannot provide financial product advice on it. X B - Direct property is not covered by an AFSL; recommending a property purchase would exceed the adviser's authorisation. X C - A real estate licence covers the sale and management of property, not financial advice on it. X D - There is no distinction between general and specific property recommendations under the AFSL framework; direct property is outside AFSL scope entirely.","type":"standard"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser discovers that the product they recommended last year has significantly changed its fee structure. They contact all affected clients immediately. Which value best applies?","a":"Diligence","b":"Fairness","c":"Competence","d":"Trustworthiness","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Proactively notifying clients of product problems requires diligence to identify, but the act of contacting clients to ensure they are protected is most directly an expression of Trustworthiness. X B - Fairness relates to equitable treatment of clients. Notifying clients of a product problem does not involve comparing the treatment of different clients - it is about acting reliably in each individual client's interest. X C - Competence relates to knowledge and skills. Identifying a product problem requires competence, but the act of proactively contacting clients to protect them is Trustworthiness. \u2713 D - Trustworthiness requires advisers to act reliably in clients' long-term interests, including proactively contacting them when the adviser becomes aware of a significant change that affects their position. Voluntarily contacting clients about a product problem - without being prompted - demonstrates that the client can trust the adviser to protect their interests continuously. Note: Honesty would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Client Scenarios","question":"APP 10 requires entities to take reasonable steps to ensure personal information is accurate, up-to-date and complete. Which of the following BEST demonstrates compliance with this obligation?","a":"Collecting detailed information at the first appointment and relying","b":"Storing all information exactly as provided without modification","c":"Asking the client to notify the adviser of any changes at their own","d":"Conducting an annual review that includes updating the client's","correct":"D","explanation":"X A - Collecting information once and relying indefinitely - This is incorrect because relying on original collection without updating fails APP 10's active currency obligation. X B - Storing all information without modification - This is incorrect because passive retention without updating fails APP 10's requirement for accuracy over time. X C - Asking client to notify changes at their initiative - This is incorrect because relying entirely on the client to report changes is not 'taking reasonable steps' under APP 10. \u2713 D - Annual review updating personal information, circumstances and objectives - This is correct because APP 10 of the Privacy Act 1988 (Cth) requires entities to take reasonable steps to ensure personal information is accurate, up-to-date and complete. An annual review that systematically updates all client information best satisfies this active obligation.","type":"standard"},{"section":"Client Scenarios","question":"Under APP 11, an entity must take reasonable steps to protect personal information from misuse, interference and loss.","a":"Keeping paper files in an unlocked filing cabinet in a back office","b":"Using password-protected systems, encryption","c":"Only retaining the minimum information required","d":"Relying on the IT department to manage security without a written policy","correct":"B","explanation":"X A - Unlocked filing cabinet in a back office - This is incorrect because an unlocked filing cabinet, even in a private area, does not constitute reasonable steps under APP 11. Personal information must be protected from unauthorised access - an unlocked cabinet fails this test. \u2713 B - Password protection, encryption, access controls and staff training - This is correct because APP 11 of the Privacy Act 1988 (Cth) requires entities to take 'reasonable steps' to protect personal information. What constitutes reasonable steps is assessed holistically - a comprehensive security framework combining technical controls (encryption, passwords, access controls), physical controls and human controls (staff training) best satisfies the multi-layered requirement. X C - Only retaining minimum information and deleting the rest - This is incorrect because while data minimisation is part of APP 11's requirement to destroy or de-identify information no longer needed, it alone does not satisfy the security obligation for information that must be retained. Security measures are required for retained information. X D - Relying on IT without a written policy - This is incorrect because delegating security entirely to an IT department without a documented security policy means there is no documented framework - APP 11 requires a systematic, documented approach to security. Undocumented informal arrangements do not constitute adequate 'reasonable steps.'","type":"standard"},{"section":"Client Scenarios","question":"A financial planning firm sends a client's personal information to a related entity for cross-selling purposes without the client's consent.","a":"APP 3","b":"APP 11","c":"APP 8","d":"APP 6","correct":"D","explanation":"X A - APP 3 - This is incorrect because APP 3 governs the collection of solicited personal information. The information was already collected - APP 3 does not govern what happens to it after collection. APP 6 is the relevant provision for how collected information may be used or disclosed. X B - APP 11 - This is incorrect because APP 11 governs the security of personal information - protecting it from misuse and unauthorised access. Sending information to a related entity for cross-selling is not a security breach - it is a use and disclosure issue governed by APP 6. X C - APP 8 - This is incorrect because APP 8 governs cross-border disclosure of personal information - sending information to overseas recipients. The related entity in this question is not specified as overseas - APP 6 governs any secondary disclosure, domestic or international. \u2713 D - APP 6 - This is correct because APP 6 of the Privacy Act 1988 (Cth) governs the use and disclosure of personal information. Sending client personal information to a related entity for cross-selling purposes is a secondary use of the information - it goes beyond the primary purpose for which the information was collected (providing financial advice). APP 6 requires consent or a permitted purpose for such secondary use.","type":"standard"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser who has a strong relationship with a client consistently charges them the same fee as new clients for equivalent services, without giving long-standing clients an unjustified discount. Which value best applies?","a":"Diligence","b":"Fairness","c":"Trustworthiness","d":"Competence","correct":"B","explanation":"X A - Diligence relates to thoroughness and due care. Consistently charging the correct fees regardless of the relationship requires integrity, not thoroughness. \u2713 B - Fairness requires advisers to maintain professional objectivity and to treat all clients consistently - including charging fees consistently regardless of the personal warmth of the relationship. Consistently charging correct fees to a client with whom the adviser has a strong personal relationship - rather than discounting out of personal affinity - demonstrates that the adviser's professional conduct is governed by Fairness, not by personal closeness. Note: Honesty would also be a strong answer were it not excluded from this question. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While consistent fee practices build trust, the primary value demonstrated by ensuring personal relationships do not distort professional fee-charging is Fairness. X D - Competence relates to knowledge and skills. Consistent fee-charging is not a knowledge issue - it is a question of professional objectivity and equitable treatment.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser notices a long-standing client has not been contacted in 18 months due to a filing error. The adviser calls them to check in and address any outstanding matters. Which value best applies?","a":"Diligence","b":"Competence","c":"Fairness","d":"Honesty","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively identifying and contacting clients who have not been reviewed in an extended period. Noticing a long-standing client has not been contacted in 18 months and reaching out proactively - rather than waiting for the client to call - demonstrates the continuous professional engagement that Diligence demands. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X B - Competence relates to knowledge and skills. Identifying an overlooked client is not a matter of technical knowledge - it is a matter of professional thoroughness and systematic engagement. X C - Fairness relates to equitable treatment of clients. Proactively reaching out to a neglected client may raise fairness concerns, but the conduct of reaching out is most directly a demonstration of Diligence. X D - Honesty relates to truthful communication. Reaching out to a neglected client is not primarily about the truthfulness of communication - it is about the thoroughness and care of ongoing professional engagement.","type":"values"},{"section":"Behavioural Finance","question":"Which type of bias is generally harder for advisers to correct?","a":"Cognitive bias","b":"Emotional bias","c":"Statistical bias","d":"Economic bias","correct":"B","explanation":"\u2717 A - Cognitive bias - This is incorrect because cognitive biases involve faulty reasoning or mental shortcuts that can sometimes be addressed through education, reframing and the presentation of objective evidence. While not easy to eliminate, cognitive biases are generally more amenable to correction through analytical tools. \u2713 B - Emotional bias - This is correct because emotional biases - such as loss aversion, fear, overconfidence driven by emotion, and status quo bias - are rooted in deep psychological responses that persist even when the person is presented with contrary logic or evidence. They are harder to correct than cognitive biases because they do not respond consistently to information or education. \u2717 C - Statistical bias - This is incorrect because statistical bias is not a standard category in behavioural finance investor psychology. The relevant distinction in this field is between emotional and cognitive biases. \u2717 D - Economic bias - This is incorrect because economic bias is not a recognised category in the behavioural finance classification of investor biases. The two main categories relevant to financial advice are emotional biases and cognitive biases.","type":"standard"},{"section":"Privacy & AML/CTF","question":"A client asks their adviser to correct their address and date of birth in the firm's records. The adviser confirms the changes are warranted.","a":"APP 6","b":"APP 13","c":"APP 11","d":"APP 8","correct":"B","explanation":"\u2717 A - APP 6 - This is incorrect because APP 6 governs the use and disclosure of personal information - what can be done with information that has been collected. It does not govern the right of individuals to have their information corrected. \u2713 B - APP 13 - This is correct because APP 13 of the Privacy Act 1988 (Cth) specifically governs the right to correction of personal information. It gives individuals the right to request that an APP entity correct personal information that is inaccurate, out-of-date, incomplete, irrelevant or misleading. \u2717 C - APP 11 - This is incorrect because APP 11 governs the security of personal information - the obligation to take reasonable steps to protect information from misuse, interference and unauthorised access. It does not address the right to correction. \u2717 D - APP 8 - This is incorrect because APP 8 governs the cross-border disclosure of personal information - when and how personal information can be sent to overseas recipients. It has no connection to a domestic correction request.","type":"standard"},{"section":"Conflicted Remuneration","question":"Under the Corporations Act, when are commissions permissible in retail investment advice?","a":"Commissions on retail investment advice are generally prohibited under the Corporations Act","b":"When the commission is volume-based and linked to funds under advice","c":"When the client provides prior written consent to the commission payment","d":"When the commission is rebated in full to the client via a fee reduction","correct":"A","explanation":"\u2713 A - The FOFA reforms prohibit conflicted remuneration including commissions on retail investment advice. Limited exceptions apply to insurance and certain legacy products. \u2717 B - Volume-based commissions are specifically identified as conflicted remuneration and are prohibited, not permitted. \u2717 C - Client consent does not make a banned commission permissible; the FOFA prohibition is not waivable by client consent. \u2717 D - Rebating commissions does not satisfy the FOFA prohibition; the receipt itself is what is prohibited under s963E.","type":"standard"},{"section":"Code Values","question":"An adviser tells a client they cannot recommend a particular investment because it falls outside the adviser's AFSL authorisation, rather than providing an unqualified opinion anyway. Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Honesty requires advisers to be truthful and transparent with clients, including about the limits of their own authorisation. Telling a client clearly that a particular investment falls outside the adviser's AFSL authorisation - rather than attempting to provide advice beyond their scope - is a direct demonstration of Honesty. The adviser does not overstate what they can offer. X B - Diligence relates to thoroughness and due care. Knowing the boundaries of one's authorisation requires awareness, but the act of clearly communicating that limitation to the client is Honesty. X C - Fairness relates to equitable treatment of clients. Informing this client of a scope limitation is not about comparing their treatment to others - it is about truthful communication of the adviser's own limitations. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While being transparent about authorisation limits does serve the client's long-term interest, the specific act of clearly communicating a personal scope limitation is most directly Honesty.","type":"values"},{"section":"Code Values","question":"An adviser volunteers to mentor a junior colleague, helping them understand how to identify conflicts of interest in complex advice situations. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Competence","d":"Fairness","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Volunteering to mentor a junior colleague involves effort, but the primary value demonstrated by taking personal responsibility for upholding professional ethical standards is Competence. X B - Honesty relates to truthful communication. Mentoring involves honest guidance, but the primary value demonstrated by sharing professional expertise to raise the standard of the profession is Competence. \u2713 C - Competence requires advisers to develop and maintain their own knowledge and skills, and to contribute to the professional standards of the advice community. Volunteering to mentor a junior adviser - helping them understand conflicts of interest and the Code of Ethics - is an expression of professional Competence that extends beyond the individual adviser to the broader profession. X D - Fairness relates to equitable treatment of clients. Mentoring a junior colleague is not about how clients are treated relative to each other - it is about the professional standards of the advice community.","type":"values"},{"section":"Code Values","question":"An adviser explains to a client that the investment strategy the client wants to pursue carries a meaningful probability of losing a significant portion of their capital, even though this information may deter the client from proceeding. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Competence","d":"Honesty","correct":"D","explanation":"X A - Fairness relates to equitable treatment of clients. Explaining a meaningful risk to a client who has heard about a strategy through word of mouth is not about comparing the treatment of different clients - it is about the quality of truthful communication. X B - Diligence relates to thoroughness and due care. Explaining risks clearly requires thorough preparation, but the primary value demonstrated by ensuring the client understands the risks - particularly a medium to high-risk strategy - is Honesty. X C - Competence relates to knowledge and skills. Understanding the risks of the strategy requires competence, but communicating those risks truthfully and completely to the client is Honesty. \u2713 D - Honesty requires advisers to be truthful and transparent with clients, including ensuring that all material risks are disclosed clearly so the client can make a genuinely informed decision. Explaining to a client that a strategy carries medium to high risk - despite their enthusiasm from word of mouth - is a direct demonstration of Honesty. The adviser ensures the client has accurate information rather than a one-sided picture.","type":"values"},{"section":"Client Scenarios","question":"Under Standard 6, advisers must take into account the broad effects on clients of acting on the advice. Which scenario MOST clearly breaches Standard 6?","a":"Charging advice fees that are consistent with market rates","b":"Recommending a balanced portfolio to a client with a balanced risk","c":"Recommending super consolidation without considering loss of insurance","d":"Providing a Record of Advice for a switch between similar fund options","correct":"C","explanation":"X A - Charging market-rate fees is consistent with Standard 7 and does not engage Standard 6. X B - Recommending a portfolio matched to the client's risk profile is appropriate advice, not a Standard 6 breach. \u2713 C - Standard 6 requires advisers to consider the broad effects of advice. Recommending super consolidation without considering the loss of insurance held in the fund being closed is a classic Standard 6 breach - the insurance loss is a consequence of the advice that was not taken into account. X D - An ROA for a switch between comparable funds is a valid documentation approach.","type":"standard"},{"section":"Ethics & Corps Act","question":"Under s912A(1)(a) of the Corporations Act, an AFS licensee must:","a":"Act in each client's best interests at all times","b":"Provide services efficiently, honestly and fairly","c":"Only advise through AFSL-authorised representatives","d":"Avoid all conflicts of interest and duty","correct":"B","explanation":"\u2717 A - The best interests duty is in s961B and applies to individual advisers, not licensees under s912A(1)(a). \u2713 B - s912A(1)(a) of the Corporations Act requires an AFS licensee to do all things necessary to ensure that financial services are provided efficiently, honestly and fairly. \u2717 C - s912A(1)(ca) covers authorised representatives but s912A(1)(a) is the general conduct obligation. \u2717 D - Conflict avoidance is addressed in s912A(1)(aa) and Standard 3, not s912A(1)(a).","type":"standard"},{"section":"Client Scenarios","question":"Which behavioural bias causes investors to hold losing investments too long because they cannot accept a loss?","a":"Confirmation bias","b":"Anchoring","c":"Loss aversion","d":"Herding","correct":"C","explanation":"X A - Confirmation bias - This is incorrect because confirmation bias involves selectively seeking information that confirms existing beliefs. While a loss-averse investor might also engage in confirmation bias (seeking reasons the investment will recover), the primary driver of holding a losing investment is loss aversion - the unwillingness to realise the loss. X B - Anchoring - This is incorrect because anchoring involves fixation on a specific reference point such as the purchase price. While anchoring and loss aversion often interact (the investor anchors on the purchase price and won't sell below it), the core mechanism that prevents selling a loser is loss aversion - the emotional pain of confirming the loss. \u2713 C - Loss aversion - This is correct because loss aversion, identified by Kahneman and Tversky in their research on prospect theory, describes the asymmetric pain of losses relative to gains - the pain of losing is approximately twice as intense as the pleasure of an equivalent gain. Holding losing investments too long because the investor cannot accept the psychological pain of crystallising a loss is the classic expression of loss aversion. X D - Herding - This is incorrect because herding involves following the investment decisions of others. Holding a losing investment long after it has underperformed is an individual behavioural pattern - it is not driven by following the crowd.","type":"standard"},{"section":"Code Values","question":"A client asks their adviser about a product the adviser has no experience with. The adviser takes time to research it thoroughly before providing any opinion. Which value does this MOST demonstrate?","a":"Fairness","b":"Competence","c":"Trustworthiness","d":"Diligence","correct":"B","explanation":"X A - Fairness relates to equitable treatment of clients. Researching an unfamiliar product before advising on it is not about comparing the treatment of different clients - it is about the quality of professional preparation for this engagement. \u2713 B - Competence requires advisers to have the appropriate knowledge and skills to provide advice, including investing time to develop understanding of products they have not previously worked with. Researching and consulting experts before advising on an unfamiliar product - rather than relying on general financial knowledge or guessing - demonstrates the commitment to professional capability that Competence demands. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While developing product knowledge before advising does serve the client's long-term interest, the specific conduct of investing in building product expertise is most directly Competence. X D - Diligence relates to thoroughness and due care. Researching the product does require diligence, but the primary value demonstrated by acquiring the specific knowledge necessary to advise on an unfamiliar product is Competence.","type":"values"},{"section":"Client Scenarios","question":"Under TASA, what is the PRIMARY test for determining whether advice constitutes tax (financial) advice?","a":"Whether the adviser is currently registered with the Australian","b":"Whether the advice would directly or indirectly affect the client's","c":"Whether the advice relates solely to superannuation contributions and nothing","d":"Whether the advice relates to ascertaining or advising about liabilities","correct":"D","explanation":"X A - ATO registration is for tax agents; TPB registration is required for tax (financial) advisers. X B - Affecting the tax return is not the statutory test; the test is whether the advice relates to tax liabilities or entitlements. X C - The test applies across all financial products and strategies, not only superannuation. \u2713 D - Under s90-10 of TASA, tax (financial) advice includes advice that relates to ascertaining or advising about a client's liabilities, obligations or entitlements under a taxation law in relation to a financial product or strategy.","type":"standard"},{"section":"Privacy & AML/CTF","question":"An adviser collects personal information that is not reasonably necessary to provide financial advice. Which APP is most likely breached?","a":"APP 3","b":"APP 5","c":"APP 6","d":"APP 11","correct":"A","explanation":"\u2713 A - APP 3 - This is correct because APP 3 of the Privacy Act 1988 (Cth) governs the collection of solicited personal information. It requires that an APP entity must not collect personal information unless it is reasonably necessary for one or more of the entity's functions or activities. Collecting information speculatively - 'just in case it becomes relevant' - exceeds what is reasonably necessary and directly breaches APP 3. \u2717 B - APP 5 - This is incorrect because APP 5 requires an entity to notify the individual of certain matters at or before the time personal information is collected (such as the entity's identity and the purposes of collection). It does not restrict what types of information can be collected. \u2717 C - APP 6 - This is incorrect because APP 6 governs the use and disclosure of personal information after it has been collected - it addresses what can be done with information once held. APP 3 is the provision that restricts what can be collected in the first place. \u2717 D - APP 11 - This is incorrect because APP 11 requires entities to take reasonable steps to protect personal information from misuse, interference, loss, and unauthorised access. It deals with security once information is held, not the propriety of collection.","type":"standard"},{"section":"Code Values","question":"An adviser contacts a client whose circumstances have changed - they have recently had a child - to suggest a review of their insurance and estate planning without being asked. Which value does this MOST demonstrate?","a":"Diligence","b":"Competence","c":"Trustworthiness","d":"Honesty","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including proactively identifying life events that change a client's circumstances and reaching out to review their advice. Contacting a client who has recently had a child - even without being asked - to review their insurance and estate planning demonstrates the continuous, thorough professional engagement that Diligence demands. X B - Competence relates to knowledge and skills. Knowing that having a child changes insurance and estate planning needs requires competence, but the act of proactively reaching out to address those needs is Diligence. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While proactive outreach does serve the client's long-term interest, the specific conduct of identifying a life event and acting on it without prompting is most directly Diligence. X D - Honesty relates to truthful communication. Proactively contacting a client about changed circumstances is not about the truthfulness of communication - it is about the thoroughness and care of ongoing professional engagement.","type":"values"},{"section":"Client Scenarios","question":"A client tells their adviser their former name (used before marriage) to assist with identity verification. The adviser stores both names. Which APP is MOST directly engaged by the obligation to secure this information?","a":"APP 3","b":"APP 11","c":"APP 6","d":"APP 13","correct":"B","explanation":"X A - APP 3 - This is incorrect because APP 3 governs the collection of personal information. The former name has already been collected - the question of how to store and protect it is governed by APP 11, not APP 3. \u2713 B - APP 11 - This is correct because APP 11 of the Privacy Act 1988 (Cth) requires entities to take reasonable steps to protect personal information from misuse, interference, loss, and unauthorised access. Storing a former name - which could be used to identify the person in other contexts - in a secure, access-controlled system is a measure to protect it under APP 11. X C - APP 6 - This is incorrect because APP 6 governs the use and disclosure of personal information. Storing the name securely for identification purposes is not a secondary use or disclosure - it is retaining information for a legitimate purpose within the entity. X D - APP 13 - This is incorrect because APP 13 governs the correction of personal information. The question is not about correcting inaccurate information - it is about protecting the former name that has been legitimately provided for identification purposes.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the relationship between Standard 5 and s961B of the Corporations Act?","a":"They are entirely separate - Standard 5 applies to all clients, s961B applies only to retail clients receiving personal advice","b":"Standard 5 supplements s961B by requiring advice to be appropriate","c":"s961B replaces Standard 5 for licensed advisers","d":"They impose identical obligations with identical remedies","correct":"B","explanation":"X A - They are entirely separate - This is incorrect because Standard 5 and s961B are not entirely separate - they operate concurrently and reinforce each other. Meeting s961B does not necessarily mean Standard 5 is satisfied, and vice versa. The Code's ethical standards sit above the statutory floor. \u2713 B - Standard 5 supplements s961B - This is correct because s961B of the Corporations Act imposes the legal best interests duty on advisers providing personal advice to retail clients. Standard 5 of the FASEA Code supplements this by requiring all advice and recommendations to be appropriate to the client's individual circumstances - this ethical obligation applies more broadly than just retail clients and operates alongside, not instead of, s961B. X C - s961B replaces Standard 5 - This is incorrect because neither provision replaces the other. s961B is a statutory obligation under the Corporations Act and Standard 5 is an ethical obligation under the FASEA Code. Both must be complied with independently. X D - They impose identical obligations - This is incorrect because while they overlap significantly, they are not identical. Standard 5 applies to all clients (not just retail), is principles-based rather than prescriptive, and requires the adviser's own ethical judgement about appropriateness - not merely procedural compliance with safe harbour steps.","type":"standard"},{"section":"Client Scenarios","question":"A financial adviser mentions to a client: 'Salary sacrificing into super will reduce your taxable income this year.' The adviser is not TPB-registered. Which of the following BEST describes whether this constitutes tax (financial) advice?","a":"Tax (financial) advice requiring TPB registration because it refers to a tax","b":"A breach of Standard 9 because the general observation about tax may be misleading to the client","c":"Prohibited entirely - advisers cannot mention tax consequences without TPB","d":"Incidental to superannuation advice and unlikely to constitute tax","correct":"D","explanation":"X A - Not every reference to a tax consequence constitutes tax (financial) advice; incidental observations are excluded. X B - A general and accurate observation about a tax benefit is not misleading conduct under Standard 9. X C - Advisers may mention tax consequences incidentally; the restriction is on substantive tax (financial) advice. \u2713 D - A brief, general observation that salary sacrificing reduces taxable income, made in the context of superannuation advice, is likely to be incidental and not constitute standalone tax (financial) advice requiring TPB registration.","type":"standard"}]},{"label":"Saturday 5 July","mode":"mixed","warmup":[{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","correct":"D","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","b":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"C","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","correct":"C","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"B","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","correct":"C","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"C","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"D","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","c":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"B","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","correct":"B","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Act with integrity - act with integrity and in the best interests of each client, be
