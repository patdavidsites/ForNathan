ing open, honest and frank.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"A","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"C","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","b":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"A","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6}],"questions":[{"section":"Client Scenarios","question":"An eligible data breach under the Notifiable Data Breaches scheme must be reported to which body?","a":"ASIC - as the financial services regulator","b":"The OAIC - Office of the Australian Information Commissioner","c":"AUSTRAC - as the data security regulator","d":"The affected individuals only - no regulator notification required","correct":"B","explanation":"X A - ASIC regulates financial services conduct; it is not the body to which data breaches are reported under the Privacy Act. \u2713 B - Under Part IIIC of the Privacy Act 1988 (Cth), an eligible data breach must be reported to the Office of the Australian Information Commissioner (OAIC) as soon as practicable after the entity becomes aware of it. X C - AUSTRAC regulates AML/CTF obligations; it does not receive data breach notifications. X D - Notification to affected individuals is also required under the NDB scheme, but the OAIC must also be notified.","type":"standard"},{"section":"Client Scenarios","question":"A client asks their financial adviser to prepare and lodge their annual income tax return. The adviser is registered with the TPB as a tax (financial) adviser. Can they?","a":"No - preparing and lodging tax returns requires tax agent","b":"Yes - TPB registration as a tax (financial) adviser authorises the full range","c":"Yes - provided the tax return relates only to investment or financial product","d":"Yes - as long as the adviser discloses to the client that they are not a registered tax agent","correct":"A","explanation":"\u2713 A - Tax (financial) adviser registration authorises advice about tax liabilities related to financial products. Preparing and lodging tax returns is a separate category of work requiring tax agent registration with the TPB. X B - Tax (financial) adviser registration does not authorise all tax services; it is limited to advice relating to financial products. X C - There is no exception allowing non-tax-agents to prepare and lodge tax returns, even for investment income. X D - Disclosure does not authorise a service that requires a specific registration.","type":"standard"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser confirms in writing after every meeting what was discussed, what was agreed, and what the next steps are, so there is always a clear record. Which value best applies?","a":"Competence","b":"Fairness","c":"Honesty","d":"Diligence","correct":"D","explanation":"X A - Competence relates to knowledge and skills. Providing a written summary after every meeting does not primarily demonstrate technical financial knowledge - it demonstrates reliable, systematic professional conduct. X B - Fairness relates to equitable treatment of clients. Providing written summaries to all clients is equitable, but the primary value demonstrated by the commitment to documenting every meeting outcome is Diligence and reliability. X C - Honesty relates to truthful communication. Written summaries do involve transparent communication, but the primary value demonstrated by creating a systematic record of every discussion and commitment is the reliability that Trustworthiness demands. \u2713 D - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including maintaining a complete written record of every client meeting with outcomes and action items clearly documented. Confirming in writing after every meeting what was discussed, decided and committed to demonstrates the professional thoroughness that Diligence demands - and the reliability that Trustworthiness requires. Note: Trustworthiness would also be the primary answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Competence is NOT listed. An adviser takes on a client whose needs are at the edge of their expertise but invests significant time to ensure they are fully prepared to advise effectively. Which value best applies?","a":"Fairness","b":"Trustworthiness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Taking on a client at the edge of one's expertise and investing extra effort to ensure good advice is not about comparing the treatment of different clients - it is about the quality of professional engagement with this individual client. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While investing extra effort for a complex client does serve their long-term interest, the specific conduct of upskilling and consulting experts to reach the required standard is most directly Diligence. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including when that means investing additional effort to develop sufficient understanding for a case at the edge of one's expertise. Consulting specialists and doing additional research before advising - rather than proceeding on partial knowledge - demonstrates the professional commitment to due care that Diligence demands. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. Taking on a challenging case and investing extra effort is not about the truthfulness of communication - it is about the thoroughness of professional preparation.","type":"values"},{"section":"Client Scenarios","question":"An adviser provides advice that is technically legal but structured to exploit a loophole the law was clearly designed to close. Which Standard of the FASEA Code is MOST directly breached?","a":"Standard 2","b":"Standard 1","c":"Standard 3","d":"Standard 9","correct":"A","explanation":"\u2713 A - Standard 2 requires integrity and acting in the client's best interests. Deliberately exploiting a technical loophole to circumvent the intent of legislation - while technically lawful - is a breach of integrity, not a breach of Standard 1. X B - Standard 1 requires compliance with the law. If the conduct is technically legal, Standard 1 is not breached - the issue is the ethical intent, which is Standard 2. X C - Standard 3 addresses conflicts of interest; that is not the primary issue here. X D - Standard 9 prohibits misleading conduct; the issue here is integrity, not deception.","type":"standard"},{"section":"Code Values","question":"An adviser who has been advising a family for 10 years recognises that the adult children now need independent advice and refers them to colleagues rather than continuing to advise them. Which value does this MOST demonstrate?","a":"Fairness","b":"Diligence","c":"Honesty","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Fairness requires advisers to treat clients equitably and with professional objectivity, including ensuring that where clients' needs exceed the adviser's current scope or capacity, appropriate arrangements are made. Recognising that the adult children of a long-standing family client have outgrown the current advisory arrangement and proactively ensuring they receive appropriate service - rather than retaining them in an unsuitable arrangement - demonstrates professional Fairness. X B - Diligence relates to thoroughness and due care. Recognising the need for a new arrangement requires diligence, but the decision to ensure clients receive equitable service is most directly Fairness. X C - Honesty relates to truthful communication. Acknowledging that the adult children's needs have grown beyond the current arrangement involves honesty, but the act of ensuring they receive equitable, appropriate service is Fairness. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While addressing the advisory gap does serve the clients' long-term interests, the specific value of ensuring equitable treatment for all clients - including those who have outgrown the current arrangement - is Fairness.","type":"values"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser proactively tells a client that a competitor product has a lower fee than the one they recommended and explains why the recommended product is still more appropriate overall. Which value best applies?","a":"Diligence","b":"Trustworthiness","c":"Competence","d":"Honesty","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Proactively telling a client that a competitor product has a lower fee requires honesty, not thoroughness. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While disclosing a better competitor product does serve the client's long-term interest, the primary value demonstrated by proactively disclosing information commercially disadvantageous to the adviser is Honesty. X C - Competence relates to knowledge and skills. Knowing that a competitor product has a lower fee requires market awareness and competence, but the act of voluntarily disclosing that information to the client is Honesty. \u2713 D - Honesty requires advisers to be truthful and transparent, including proactively disclosing material information that could affect the client's decision - even when that information is commercially disadvantageous to the adviser. Telling a client that a competitor product charges a lower fee for a comparable outcome - despite the personal cost of that disclosure - is a direct demonstration of Honesty. Note: Trustworthiness would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Client Scenarios","question":"An investor refuses to sell a poorly performing stock because they paid a high price for it. This is an example of:","a":"Loss aversion","b":"Sunk cost fallacy","c":"Anchoring bias","d":"Herding behaviour","correct":"B","explanation":"X A - Loss aversion explains reluctance to crystallise losses generally; the sunk cost fallacy specifically relates to factoring in past unrecoverable investment into current decisions. \u2713 B - The sunk cost fallacy is the tendency to factor in past irrecoverable costs when making current decisions. Refusing to sell a poor performer because of the high original price paid is the defining example. X C - Anchoring involves fixating on a reference point such as the purchase price; while related, the sunk cost fallacy captures the irrationality of treating past costs as relevant to a forward-looking decision. X D - Herding involves following the crowd; it is unrelated to the individual's reluctance to sell based on past cost.","type":"standard"},{"section":"Client Scenarios","question":"Is car insurance (general insurance) regulated under the Corporations Act 2001?","a":"Yes - all insurance products are regulated under the Corporations Act","b":"No - car insurance is entirely unregulated in Australia","c":"Yes - but only when car insurance is sold by an AFSL holder","d":"No - general insurance like car insurance is regulated under the Insurance","correct":"D","explanation":"X A - Not all insurance is under the Corporations Act; general insurance falls under a separate legislative framework. X B - Car insurance is regulated; it is not unregulated. X C - General insurance is regulated by the Insurance Contracts Act regardless of who sells it. \u2713 D - General insurance products such as car insurance are regulated under the Insurance Contracts Act 1984, not the Corporations Act. The Corporations Act governs financial products such as managed investments, superannuation and life insurance.","type":"standard"},{"section":"Behavioural Finance","question":"A client frequently changes investment strategy based on market news. What is the most likely cause?","a":"Rational analysis","b":"Emotional bias","c":"Efficient markets","d":"Tax planning","correct":"B","explanation":"\u2717 A - Rational analysis - This is incorrect because rational analysis involves systematically evaluating information against one's investment objectives and making considered decisions. Reacting to media headlines - which are designed to be emotionally engaging rather than analytically complete - is the opposite of rational analysis. \u2713 B - Emotional bias - This is correct because changing investment strategy frequently based on media headlines reflects emotional bias - the client's decisions are driven by external emotional stimuli (news stories designed to provoke reactions) rather than by their own financial plan and objectives. This is characteristic of investors who allow emotions to override their long-term strategy. \u2717 C - Efficient markets - This is incorrect because the efficient market hypothesis is an academic framework stating that market prices reflect all available information. It does not describe or explain why an individual investor changes strategy based on media coverage. \u2717 D - Tax planning - This is incorrect because tax planning involves analytical assessment of tax obligations and strategies. It is entirely unrelated to the pattern of changing investment strategy in response to emotional media content.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following BEST describes the purpose of the Design and Distribution Obligations introduced by Part 7.8A?","a":"To require all advisers to use only standardised, pre-approved","b":"To limit the number of products that any licensee can include on their approved product list","c":"To replace the best interests duty with a product-suitability test","d":"To ensure financial products are designed for and distributed to consumers in the target market for which they were designed","correct":"D","explanation":"X A - DDO does not standardise products; it requires issuers to define and distribute to an appropriate target market. X B - DDO does not limit APL size; it creates product issuer and distributor obligations. X C - DDO supplements rather than replaces the best interests duty; both apply concurrently. \u2713 D - The DDO regime under Part 7.8A requires product issuers to identify a target market and ensure products are distributed consistently with that target market, reducing consumer harm.","type":"standard"},{"section":"Client Scenarios","question":"A client who runs a small business asks their financial adviser to advise on the best business structure (sole trader vs company vs trust) for tax purposes. What is required to provide this advice?","a":"The adviser can recommend a business structure as it relates to the client's","b":"The adviser can advise if the client's business is directly connected","c":"The adviser can provide general information about each structure","d":"Business structure advice for tax purposes requires legal and tax","correct":"D","explanation":"X A - Business structure advice is outside AFSL scope regardless of whether it relates to the client's financial plan. X B - The connection to the client's financial plan does not extend AFSL scope to legal and tax advice on business structures. X C - Making a specific recommendation on business structure constitutes legal and tax advice; general information does not discharge the duty to refer. \u2713 D - Advising on the optimal business structure for tax purposes involves both legal advice (company law, trust law) and tax advice (tax implications of each structure). This falls outside the scope of an AFSL.","type":"standard"},{"section":"Code Values","question":"Competence is NOT listed. An adviser makes sure a client who recently lost their spouse understands all the financial decisions they now face, offering to pace the process to avoid overwhelming them. Which value best applies?","a":"Honesty","b":"Trustworthiness","c":"Diligence","d":"Fairness","correct":"D","explanation":"X A - Honesty relates to truthful communication. Ensuring a grieving client understands all their options before making any decisions is not about the truthfulness of information - it is about equitable professional treatment that does not allow a client's emotional vulnerability to result in lesser care. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While ensuring a grieving client gets the full picture serves their long-term interest, the specific value of giving this client the same level of careful, complete advice as any other is Fairness. X C - Diligence relates to thoroughness and due care. Taking the time to ensure a grieving client understands all their options requires diligence, but the primary value is treating this vulnerable client with the same professional rigour as any other. \u2713 D - Fairness requires advisers to maintain professional objectivity and to treat all clients equally, regardless of their emotional state or vulnerability. Ensuring a client who recently lost their spouse fully understands all their options before making any decisions - rather than taking shortcuts because the client is distressed - demonstrates that Fairness governs the adviser's conduct regardless of the client's personal circumstances. Note: Competence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Client Scenarios","question":"An adviser recommends a client make a non-concessional contribution to their super that exceeds the annual cap. What is the PRIMARY risk of this strategy?","a":"The excess contribution is simply rejected and returned by the fund","b":"The fund is required to report the excess contribution and the adviser to ASIC","c":"The client permanently loses their right","d":"The excess is returned and subject to excess non-concessional contributions tax on associated earnings","correct":"D","explanation":"X A - The excess is returned but is not simply rejected without consequence; the associated earnings tax applies. X B - The fund reports the contribution to the ATO; there is no mechanism to report the adviser to ASIC for this. X C - The right to make future contributions is not permanently lost; the excess is managed through the tax regime. \u2713 D - Excess non-concessional contributions are returned to the client but associated earnings are taxed at the top marginal rate, which can result in a significant and unexpected tax liability.","type":"standard"},{"section":"Behavioural Finance","question":"A risk-averse client driven by emotional concerns should receive:","a":"High-risk growth investments to maximise long-term returns","b":"Maximum equity exposure to build wealth over the long term","c":"Investments aligned with the client's behavioural risk tolerance","d":"An aggressive growth strategy to overcome emotional conservatism","correct":"C","explanation":"\u2717 A - High-risk investments would conflict with the client's risk aversion and emotional profile. \u2717 B - Maximum equity exposure is appropriate for aggressive investors, not emotionally risk-averse clients. \u2713 C - A risk-averse emotionally driven client requires a portfolio aligned with their behavioural tolerance, not just their theoretical capacity. A strategy that exceeds their emotional comfort will likely be abandoned at the worst time. \u2717 D - An aggressive strategy may theoretically be optimal but is counterproductive if the client cannot maintain it through volatility.","type":"standard"},{"section":"Client Scenarios","question":"A junior adviser observes that a colleague is regularly omitting key risk disclosures from client SOAs. The junior adviser feels uncomfortable raising it.","a":"Act in each client's best interests at all times","b":"Avoid any conduct that is misleading or deceptive","c":"Hold colleagues accountable and report misconduct appropriately","d":"Maintain CPD requirements to ensure ongoing competence","correct":"C","explanation":"X A - Acting in the client's best interests is the core obligation of Standard 2; it does not address peer accountability. X B - Avoiding misleading conduct is Standard 9; it addresses the content of advice, not peer oversight. \u2713 C - Standard 12 requires advisers to hold each other accountable for conduct that falls below the standards of the Code, and to report concerns through appropriate internal or regulatory channels. X D - CPD obligations are the subject of Standard 10.","type":"standard"},{"section":"Client Scenarios","question":"A client insists that a historical file note recording a conversation with their previous adviser is factually incorrect. What should the current adviser do?","a":"Decline to correct if not satisfied, but allow the client","b":"Refuse any correction - historical file notes are permanent records","c":"Delete the original file note and replace it entirely with the client's","d":"Ask the previous adviser to confirm which account of the conversation","correct":"A","explanation":"\u2713 A - APP 13 allows an entity to decline a correction request if it is not satisfied the information is inaccurate. However, if it declines, it must allow the client to associate a statement of correction with the information, and take steps to attach the complaint. X B - APP 13 does not permit blanket refusal; the entity must either correct or allow a statement to be associated with the record. X C - Replacing the original file note with the client's version without verification is inappropriate; the original note may be accurate. X D - Seeking the previous adviser's input may be reasonable but does not discharge the entity's obligation under APP 13 while the dispute is unresolved.","type":"standard"},{"section":"Client Scenarios","question":"A Record of Advice (ROA) may be used instead of an SOA when:","a":"The advice is being given to a wholesale rather than a retail client","b":"The advice relates exclusively to general insurance products","c":"The client has specifically requested a shorter document format","d":"The advice is further advice and circumstances have not materially changed since the last SOA","correct":"D","explanation":"X A - Client classification as wholesale does not trigger the ROA; the ROA is a substitute for SOA in specific circumstances, not a wholesale client exemption. X B - The ROA is not limited to general insurance; it applies across advice types where circumstances are unchanged. X C - Client preference for a shorter document is not a basis for using an ROA; the statutory test is whether circumstances have materially changed. \u2713 D - Under s946B of the Corporations Act, an ROA may be used instead of an SOA where further advice is provided and the client's relevant personal circumstances have not materially changed since the last SOA.","type":"standard"},{"section":"Behavioural Finance","question":"What is the primary purpose of behavioural investor type classification?","a":"To predict future investment returns for each client type","b":"To identify personality traits that affect investment behaviour","c":"To eliminate emotional bias from investment decision-making","d":"To forecast economic cycles and market movements","correct":"B","explanation":"\u2717 A - BIT classification does not predict returns; it predicts behaviour patterns. \u2713 B - Behavioural investor type classification identifies psychological and personality characteristics that influence how investors make decisions, respond to risk and react to market events. \u2717 C - Identifying BITs helps manage bias, not eliminate it; emotional bias cannot be fully eliminated. \u2717 D - BITs explain individual investor behaviour, not macroeconomic cycles.","type":"standard"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser who is about to go on leave ensures all their clients are assigned a qualified colleague and personally briefs the colleague on each client's circumstances. Which value best applies?","a":"Fairness","b":"Honesty","c":"Diligence","d":"Competence","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Ensuring clients are covered during leave is not about comparing the treatment of different clients across the practice - it is about the ongoing reliability of service to the individual clients being handed over. X B - Honesty relates to truthful communication. Ensuring coverage for clients while on leave is not primarily about honest communication - it is about the systematic thoroughness of professional responsibility. \u2713 C - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including ensuring that all client obligations are properly covered when the adviser is unavailable. Proactively arranging adequate coverage for all clients before going on leave - rather than simply leaving and hoping nothing arises - demonstrates the continuous professional commitment that Diligence demands. Note: Trustworthiness would also be the primary answer were it not excluded from this question. X D - Competence relates to knowledge and skills. Arranging client coverage while on leave is not a knowledge challenge - it is a professional discipline of thoroughness and responsibility.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser who is behind on CPD requirements declines to advise on a complex area until they have completed the relevant CPD. Which value best applies?","a":"Fairness","b":"Diligence","c":"Competence","d":"Honesty","correct":"C","explanation":"X A - Fairness relates to equitable treatment of clients. Declining to advise in an area where CPD is behind is not about comparing the treatment of different clients - it is about the quality of professional capability available to this client. X B - Diligence relates to thoroughness and due care. Recognising a CPD gap and declining to advise requires self-awareness and professional responsibility, but the primary value demonstrated by acknowledging the limit of current knowledge is Competence. \u2713 C - Competence requires advisers to recognise the limits of their current knowledge and to decline to advise on matters where their knowledge is not current enough to provide the required standard of advice. Declining to advise on an area where CPD requirements are behind - and committing to completing the required training first - demonstrates the self-awareness and professional integrity that Competence demands. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. While acknowledging a CPD gap involves honesty, the primary value demonstrated by recognising the limit of current professional knowledge is Competence.","type":"values"},{"section":"SOA/FDS/FSG Obligations","question":"A new client contacts a financial planning firm by phone. Before the adviser provides any financial service, when should the FSG be provided?","a":"Before or at the time of providing any financial service","b":"Within 5 business days after the first financial service is provided","c":"Only when the client specifically requests a copy","d":"At the same time as providing the Statement of Advice","correct":"A","explanation":"\u2713 A - Under s941D of the Corporations Act, a financial services licensee must give a client an FSG before providing any financial service, or as soon as practicable after if it was not reasonably practicable to do so before. \u2717 B - There is no 5 business day grace period for FSG delivery; it must be provided before or at the time of the service. \u2717 C - The FSG is a mandatory disclosure document; it must be provided proactively, not only on request. \u2717 D - The FSG and SOA serve different purposes and have different timing requirements; the FSG must be provided before advice, not only when an SOA is also given.","type":"standard"},{"section":"Code Values","question":"Competence is NOT listed. An adviser creates a follow-up schedule for all clients who received advice on insurance to check that their cover has been confirmed as placed. Which value best applies?","a":"Trustworthiness","b":"Fairness","c":"Diligence","d":"Honesty","correct":"C","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Creating a follow-up schedule for clients who received advice during volatile times does serve clients' long-term interests, but the specific conduct of building a systematic follow-up process is most directly a demonstration of Diligence. X B - Fairness relates to equitable treatment of all clients. Creating a follow-up schedule is not about treating clients comparably - it is about the thoroughness and care of professional follow-through. \u2713 C - Diligence requires advisers to perform all professional engagements with due care, including following up to ensure advice has been understood and implemented appropriately. Creating a structured follow-up schedule for clients who received advice during a volatile period demonstrates the systematic thoroughness and professional commitment that Diligence demands - the adviser's responsibility does not end at the point of advice. Note: Competence would also be a strong answer were it not excluded from this question. X D - Honesty relates to truthful communication. A follow-up schedule is about thoroughness and care in professional follow-through, not about the truthfulness of communication.","type":"values"},{"section":"Behavioural Finance","question":"A client makes impulsive investment decisions based on media headlines, often selling at market lows and buying at highs. What is the primary purpose of understanding behavioural finance when advising this client?","a":"To understand and anticipate client investment psychology","b":"To increase the volume of transactions and commissions","c":"To predict future market movements and returns","d":"To replace client decision-making with adviser judgment","correct":"A","explanation":"\u2713 A - Behavioural finance helps advisers understand why clients make irrational decisions, anticipate those patterns, and provide advice that accounts for psychological factors. \u2717 B - Understanding client psychology serves the client's interests; it is not a revenue mechanism. \u2717 C - Behavioural finance explains investor behaviour, not market movements. \u2717 D - The adviser's role is to guide and support client decision-making, not substitute for it.","type":"standard"},{"section":"Client Scenarios","question":"An adviser accepts a cash payment of $12,000 from a client for an investment. What AML/CTF obligation is triggered?","a":"A Suspicious Matter Report - cash payments over $5,000 require an SMR","b":"No reporting obligation - the client is a known and established client","c":"A Threshold Transaction Report - cash transactions of $10,000 or more must be reported to AUSTRAC","d":"A notification to the OAIC under the Notifiable Data Breaches scheme","correct":"C","explanation":"X A - The SMR threshold is suspicion, not a dollar amount; the TTR is the cash-amount triggered obligation. X B - Knowledge of the client does not remove the TTR obligation; it is triggered solely by the transaction amount. \u2713 C - Under s43 of the AML/CTF Act, a reporting entity must submit a TTR to AUSTRAC for any physical currency transaction of $10,000 or more. The obligation is automatic and is not affected by knowledge of the client. X D - The NDB scheme applies to data breaches under the Privacy Act; it has no connection to cash transaction reporting.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following scenarios is MOST likely to satisfy Standard 4's requirement for free, prior and informed consent?","a":"The client signs the SOA after the adviser verbally described the strategy in general terms","b":"The adviser sends the SOA by email and the client returns a signed","c":"The adviser explains the strategy, risks, fees and conflicts, answers all questions, and confirms the client's genuine understanding before proceeding","d":"The client says 'sounds good' during a phone call before the SOA has been provided","correct":"C","explanation":"X A - Signing after a verbal description may or may not satisfy Standard 4 depending on whether genuine understanding was confirmed. X B - Returning a signed SOA without any discussion provides no assurance the client understood the advice. \u2713 C - Standard 4 requires free, prior and informed consent. This scenario shows the adviser confirming genuine understanding before the client agrees - all elements of informed consent are present. X D - A verbal 'sounds good' before the SOA is received cannot constitute informed consent.","type":"standard"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser takes the same amount of time to carefully explain a complex strategy to a client with limited financial literacy as they do to a financially sophisticated client. Which value best applies?","a":"Diligence","b":"Honesty","c":"Trustworthiness","d":"Competence","correct":"D","explanation":"X A - Diligence relates to thoroughness and due care. Taking the same amount of time to explain a strategy to a less financially literate client requires diligence, but the primary value demonstrated by ensuring this client receives the same quality of professional explanation as any other is Competence - the ability to communicate effectively across different levels of financial literacy. X B - Honesty relates to truthful communication. Taking extra time to explain a strategy clearly to a less literate client is not primarily about the truthfulness of information - it is about the professional skill of adapting communication. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While ensuring a less literate client genuinely understands advice does serve their long-term interest, the specific skill of adapting explanation to different levels of literacy is Competence. \u2713 D - Competence requires advisers to have the knowledge and skills to provide effective advice to clients at all levels of financial literacy. Taking the same amount of time and care to ensure a less financially literate client genuinely understands a complex strategy - adapting the explanation as needed - demonstrates the professional communication capability that Competence demands. Note: Fairness would also be the primary answer were it not excluded from this question.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser uses interactive scenario modelling tools to help a client understand the long-term impact of different retirement income strategies. Which value best applies?","a":"Honesty","b":"Trustworthiness","c":"Fairness","d":"Competence","correct":"D","explanation":"X A - Honesty relates to truthful and transparent communication. Using interactive scenario modelling to help clients understand complex strategies involves honesty, but the primary value demonstrated by investing in and applying sophisticated analytical tools is Competence. X B - Trustworthiness relates to acting reliably in the client's long-term interest. While using good modelling tools serves the client's long-term interest, the specific conduct of applying advanced analytical capability to explain complex scenarios is most directly a demonstration of Competence. X C - Fairness relates to equitable treatment of clients. Using scenario modelling for a specific client is not about comparing that client's treatment to others - it is about the quality of professional analysis applied. \u2713 D - Competence requires advisers to have and apply the knowledge, skills and professional tools necessary to provide advice at the required standard. Using interactive scenario modelling tools to help a client understand the implications of complex strategies demonstrates professional capability - the adviser has the skills and tools to make sophisticated analysis accessible. Note: Diligence would also be a strong answer were it not excluded from this question.","type":"values"}]},{"label":"Sunday 6 July","mode":"mixed","warmup":[{"section":"Standards Warm-up","question":"Standard 11 requires advisers to...","a":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","b":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","c":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"C","explanation":"\u2713 Standard 11: Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","type":"warmup","standard_num":11},{"section":"Standards Warm-up","question":"Standard 10 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","d":"Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","correct":"D","explanation":"\u2713 Standard 10: Continuing professional development - develop, maintain and apply a high level of relevant knowledge and skills.","type":"warmup","standard_num":10},{"section":"Standards Warm-up","question":"Standard 1 requires advisers to...","a":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"C","explanation":"\u2713 Standard 1: Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","type":"warmup","standard_num":1},{"section":"Standards Warm-up","question":"Standard 4 requires advisers to...","a":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","b":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","correct":"A","explanation":"\u2713 Standard 4: Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","type":"warmup","standard_num":4},{"section":"Standards Warm-up","question":"Standard 2 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"A","explanation":"\u2713 Standard 2: Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","type":"warmup","standard_num":2},{"section":"Standards Warm-up","question":"Standard 8 requires advisers to...","a":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"C","explanation":"\u2713 Standard 8: Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","type":"warmup","standard_num":8},{"section":"Standards Warm-up","question":"Standard 7 requires advisers to...","a":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","b":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","c":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","d":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","correct":"B","explanation":"\u2713 Standard 7: Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","type":"warmup","standard_num":7},{"section":"Standards Warm-up","question":"Standard 5 requires advisers to...","a":"Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","b":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","c":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"A","explanation":"\u2713 Standard 5: Best interests and suitability - ensure advice is appropriate to the client's individual circumstances and that they understand it.","type":"warmup","standard_num":5},{"section":"Standards Warm-up","question":"Standard 12 requires advisers to...","a":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Act with integrity - act with integrity and in the best interests of each client, being open, honest and frank.","correct":"A","explanation":"\u2713 Standard 12: Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","type":"warmup","standard_num":12},{"section":"Standards Warm-up","question":"Standard 3 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Comply with the law - act in accordance with all applicable laws and not seek to avoid them.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Record keeping - keep complete, accurate and up-to-date records of advice and services provided.","correct":"A","explanation":"\u2713 Standard 3: Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","type":"warmup","standard_num":3},{"section":"Standards Warm-up","question":"Standard 6 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Broader effects - take into account the broad effects of advice on the client and others such as family members.","c":"Consent to remuneration - obtain the client's free, prior and informed consent to all fees and benefits you receive.","d":"Informed consent - only act for a client with their free, prior and informed consent to the services and terms.","correct":"B","explanation":"\u2713 Standard 6: Broader effects - take into account the broad effects of advice on the client and others such as family members.","type":"warmup","standard_num":6},{"section":"Standards Warm-up","question":"Standard 9 requires advisers to...","a":"Conflicts of interest - do not advise, refer or act where you have a conflict of interest or duty.","b":"Cooperate with investigations - cooperate with ASIC and monitoring bodies in any investigation of a breach.","c":"Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","d":"Uphold the profession - individually and with peers, uphold and promote ethical standards and hold each other accountable.","correct":"C","explanation":"\u2713 Standard 9: Good faith in product recommendations - only offer financial products in good faith and not mislead or deceive clients.","type":"warmup","standard_num":9}],"questions":[{"section":"Client Scenarios","question":"A client's documented risk profile is 'balanced' but they verbally insist they want 'aggressive' growth. The adviser updates the risk profile to 'aggressive'?","a":"The adviser changed the profile without written client consent as required by Standard 4","b":"The adviser should have refused to change the profile regardless of client","c":"Risk tolerance is relatively stable - accepting an upward revision during a bull market may not reflect genuine tolerance","d":"A verbal instruction is never a sufficient or appropriate basis for any risk","correct":"C","explanation":"X A - The absence of written consent is a procedural concern; the Standard 5 issue is the potential mismatch between stated and genuine risk tolerance. X B - Profile changes are permissible; the issue is whether the change genuinely reflects the client's circumstances. \u2713 C - Standard 5 requires advice to be appropriate to the client's genuine circumstances. Risk tolerance is a stable personality trait, not a variable one. Updating a risk profile based on a verbal instruction during a bull market without exploring whether it reflects true tolerance may produce an unsuitable risk assessment. X D - Verbal instructions can be a valid basis for profile reviews; the obligation is to explore rather than automatically accept or refuse them.","type":"standard"},{"section":"Client Scenarios","question":"A licensee's compliance officer identifies a pattern of advisers failing to provide FDS documents on time. The licensee takes no action.","a":"Individual advisers are solely responsible","b":"The licensee only breaches its obligations if affected clients make a formal","c":"ASIC must first issue a formal warning before a licensee breach can be reported","d":"The licensee breaches s912A by failing to maintain adequate compliance systems and oversight","correct":"D","explanation":"X A - The licensee is responsible for the conduct of its authorised representatives and for maintaining systems that prevent and detect compliance failures. X B - A breach of s912A arises from systemic failure; it is not contingent on client complaints. X C - ASIC enforcement may follow a breach but the breach occurs at the time the compliance failure exists, not when ASIC issues a warning. \u2713 D - Under s912A(1)(a) and s912A(1)(d), a licensee must maintain adequate compliance systems and respond to identified failures. Identifying a pattern of FDS non-compliance and taking no action is a breach of both provisions.","type":"standard"},{"section":"Behavioural Finance","question":"Which of the following is the primary purpose of identifying behavioural investor types?","a":"To identify which products to upsell to each investor type","b":"To provide the most suitable and tailored investment advice","c":"To classify investors for targeted marketing campaigns","d":"To predict market movements based on investor sentiment","correct":"B","explanation":"\u2717 A - Behavioural investor typing is a client-interest tool, not a sales mechanism. \u2713 B - The primary purpose of identifying behavioural investor types is to tailor advice to the client's psychological profile, improving suitability and the likelihood the client will stick with the strategy. \u2717 C - Marketing segmentation is a commercial application; the regulatory purpose is suitability of advice. \u2717 D - Behavioural investor types explain individual investor behaviour, not aggregate market movements.","type":"standard"},{"section":"Mixed - Advanced","question":"An adviser briefly mentions to a client that salary sacrificing into super 'may have some tax benefits' while discussing their superannuation strategy. Why does this comment most likely NOT require the adviser to be registered with the Tax Practitioners Board (TPB)?","a":"It is merely incidental","b":"It influences tax liability","c":"It includes modelling","d":"It structures CGT","correct":"A","explanation":"\u2713 A - Under the Tax Agent Services Act 2009 (Cth) (TASA), advice that is merely incixdental to financial product advice - a brief, passing reference to a tax consequence that is secondary to the main advice - does not constitute tax (financial) advice requiring TPB registration. A general observation that salary sacrificing may have tax benefits, made in the context of superannuation advice, falls within the incidental exception. X B - The TASA test is not simply whether tax is mentioned. The question is whether the advice is substantively about ascertaining or advising on the client's tax obligations or entitlements. An incidental reference does not cross that threshold. X C - The question describes a brief verbal observation, not modelling. Detailed tax modelling would go beyond incidental advice and would likely require TPB registration. X D - The comment is not about capital gains tax structuring. Advising specifically on CGT would be tax (financial) advice, but a general comment about salary sacrifice and taxable income is not CGT structuring.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following is an example of the 'endowment effect'?","a":"Following market trends when the inherited shares perform well","b":"Buying shares in companies the investor personally works for due to familiarity","c":"Refusing to sell inherited shares at market value because they feel","d":"Anchoring on the price at which the original owner purchased the shares","correct":"C","explanation":"X A - Following market trends is herding behaviour, unrelated to the endowment effect. X B - Buying shares in one's employer reflects familiarity bias, not the endowment effect. \u2713 C - The endowment effect causes people to assign higher value to things they own, particularly when there is emotional attachment. Inherited shares feel more valuable than their market price because of their personal and sentimental significance. X D - Anchoring on the original purchase price is a related but distinct bias; the endowment effect captures the emotional overvaluation of ownership itself.","type":"standard"},{"section":"Code Values","question":"An adviser declines to rush a complex strategy implementation even when the client says 'just get it done.' Which value does this MOST demonstrate?","a":"Honesty","b":"Diligence","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication. Refusing to rush a complex strategy implementation is not about the truthfulness of communication - it is about the quality and thoroughness of professional process. \u2713 B - Diligence requires advisers to perform all professional engagements with due care and thoroughness, even under client pressure to proceed quickly. Refusing to rush a complex strategy implementation - despite the client's insistence - demonstrates that the adviser will not compromise the standard of professional care required to implement the strategy correctly. X C - Fairness relates to equitable treatment of clients. Refusing to rush this client is not about comparing their treatment to others - it is about the standard of care applied to the individual engagement. X D - Competence relates to knowledge and skills. Refusing to rush is not about the adviser's technical knowledge - it is about their commitment to applying that knowledge with appropriate care.","type":"values"},{"section":"Client Scenarios","question":"Under APP 6, a financial adviser wants to share a client's contact details and financial summary with a referral partner to generate new business leads. Which of the following BEST describes when this is permitted?","a":"Permitted - referral arrangements are standard industry practice","b":"Not permitted - sharing information for referral marketing without consent","c":"Permitted - provided the referral partner is an Australian-based entity","d":"Permitted - if the referral arrangement is disclosed in the Financial","correct":"B","explanation":"X A - Industry practice does not create an implied consent or override APP 6; the test is actual consent or reasonable expectation. \u2713 B - APP 6 prohibits use or disclosure of personal information for a purpose other than the primary purpose of collection without consent or reasonable expectation. Sharing client information with a referral partner for marketing purposes is a secondary purpose that requires consent. X C - The residency of the referral partner is not the relevant test under APP 6; APP 8 governs cross-border disclosures. X D - FSG disclosure of a referral arrangement does not constitute client consent to the use of their personal information for referral marketing.","type":"standard"},{"section":"Code Values","question":"Honesty is NOT listed. An adviser explains clearly to a client that a strategy they want to pursue is outside the adviser's AFSL authorisation and that the client needs a specialist. Which value best applies?","a":"Diligence","b":"Fairness","c":"Competence","d":"Trustworthiness","correct":"C","explanation":"X A - Diligence relates to thoroughness and due care. Explaining why a strategy is complex and risky requires thorough analysis, but the act of clearly communicating those risks and acknowledging the adviser's own limitations is most directly Competence. X B - Fairness relates to equitable treatment of clients. Explaining strategy complexity and risk to one client is not about comparing their treatment to others - it is about the quality of advice and communication. \u2713 C - Competence requires advisers to have the knowledge and skills to assess and explain complex strategies, including recognising where those strategies exceed the adviser's expertise and recommending specialist input. Explaining clearly why a strategy the client wants is complex and risky, and being transparent about the limits of the adviser's own expertise in that area, demonstrates the professional capability and self-awareness that Competence requires. Note: Honesty would also be a strong answer were it not excluded from this question. X D - Trustworthiness relates to acting reliably in the client's long-term interest. Advising the client of complexity and risk does serve their long-term interest, but the primary value demonstrated by the professional assessment and its clear communication is Competence.","type":"values"},{"section":"Client Scenarios","question":"The wife asks her adviser - who also advises the husband - to disclose the husband's assets. What should the adviser do?","a":"Inform the wife she must use the Freedom of Information Act","b":"Disclose the assets as the adviser owes equal duty to both clients","c":"Contact the husband and obtain his consent before disclosing any information","d":"Refer the matter to the Family Court directly","correct":"C","explanation":"X A - Tell the wife to use the Freedom of Information Act - This is incorrect because the Freedom of Information Act applies to government agencies, not financial advisers. This response would be unhelpful, incorrect and potentially misleading to the client. X B - Disclose because the adviser owes equal duty - This is incorrect because owing equal duties to both clients does not mean the duties can override each other. The duty of confidentiality to the husband prevents disclosure to the wife without his consent - equal duties does not mean disclosure is automatic. \u2713 C - Contact the husband and obtain his consent - This is correct because the husband is also a client and the adviser owes him a duty of confidentiality under APP 6 of the Privacy Act 1988. Personal information about the husband cannot be disclosed to the wife without his consent, even though she is also a client. The adviser must contact the husband, explain the situation, and seek his consent before disclosing any information about his financial position. X D - Refer the matter to the Family Court directly - This is incorrect because the adviser cannot refer matters to the Family Court on a client's behalf - that is the role of a solicitor. The adviser's immediate obligation is to protect the husband's confidentiality while advising the wife of her options.","type":"standard"},{"section":"Client Scenarios","question":"Which of the following MOST accurately describes the legal status of the 'reasonable adviser' test in s961B?","a":"It requires the adviser to act in the way a reasonable adviser in those circumstances would act","b":"It requires the adviser to replicate the average conduct seen across the industry","c":"It applies only to advisers who hold a professional designation or membership","d":"It is a purely objective test that ignores all personal circumstances","correct":"A","explanation":"\u2713 A - The reasonable adviser test in s961B asks whether the adviser's conduct would be considered to be in the client's best interests by a reasonable adviser in the same circumstances. X B - The test is not about matching average industry conduct; it sets a standard of what a reasonable adviser would consider best for the client. X C - The test applies to all relevant providers regardless of professional designations. X D - The test is objective but takes into account the circumstances of the specific advice engagement.","type":"standard"},{"section":"Client Scenarios","question":"A new licensee has no documented compliance plan and no dedicated compliance staff. Which provision of s912A is MOST directly breached?","a":"s912A(1)(d) - adequate financial, technological and human resources","b":"s912A(1)(a) - providing services efficiently, honestly and fairly","c":"s912A(1)(f) - dispute resolution arrangements","d":"s912A(1)(g) - adequate risk management systems","correct":"A","explanation":"\u2713 A - s912A(1)(d) requires an AFS licensee to have adequate resources - including human resources such as compliance staff - to provide its financial services. A new licensee with no compliance plan and no compliance staff has manifestly failed this obligation. X B - s912A(1)(a) is the general conduct standard; s912A(1)(d) more precisely identifies the resource adequacy obligation breached here. X C - s912A(1)(f) requires dispute resolution arrangements; the absence of compliance staff is not primarily a dispute resolution failure. X D - s912A(1)(g) requires risk management systems; while related, s912A(1)(d) more directly captures the failure to have adequate human compliance resources.","type":"standard"},{"section":"Client Scenarios","question":"An adviser provides a client with a verbal recommendation and later provides a written SOA that contains different advice. Which of the following BEST describes the regulatory and ethical consequences?","a":"The verbal recommendation is irrelevant - only the written SOA has legal effect","b":"The verbal advice given first automatically overrides the written SOA","c":"The client is entitled to choose which version of the advice to follow","d":"The inconsistency is a serious compliance issue - the SOA must accurately reflect the advice actually given","correct":"D","explanation":"X A - Verbal advice given to the client is part of the advice engagement; the SOA must accurately reflect it. X B - Neither version automatically overrides the other; the issue is the inconsistency itself. X C - Allowing the client to choose between inconsistent versions does not resolve the compliance failure. \u2713 D - Standard 9 prohibits misleading conduct and Standard 8 requires accurate records. An SOA that records different advice from what was verbally given is inaccurate and potentially misleading.","type":"standard"},{"section":"Code Values","question":"An adviser invests in a new software platform to improve the accuracy and efficiency of their financial modelling, primarily to improve outcomes for clients. Which value does this MOST demonstrate?","a":"Competence","b":"Honesty","c":"Diligence","d":"Fairness","correct":"A","explanation":"\u2713 A - Competence requires advisers to maintain and develop the knowledge, skills and professional tools necessary to provide advice at a high standard. Investing in new software specifically to improve the accuracy and efficiency of financial modelling demonstrates a commitment to professional capability - the adviser uses resources to do their work better. X B - Honesty relates to truthful and transparent communication. Investing in better modelling software is not about the truthfulness of communication - it is about the quality of professional capability. X C - Diligence relates to thoroughness and due care. While using better tools does enable more thorough work, the decision to invest in professional improvement is most directly a Competence commitment. X D - Fairness relates to equitable treatment of clients. Investing in tools that improve advice quality may benefit all clients equally, but the primary value demonstrated by the investment in professional capability is Competence.","type":"values"},{"section":"Client Scenarios","question":"APP 1 requires entities to manage personal information in an open and transparent way. Which of the following BEST satisfies APP 1?","a":"Having a current, clearly written privacy policy that is freely","b":"Having a privacy policy but only providing it when a client specifically requests a copy","c":"Explaining privacy practices verbally to clients at the first meeting","d":"Maintaining an internal-only privacy policy accessible to staff but not to clients or the public","correct":"A","explanation":"\u2713 A - APP 1 requires entities to have a clearly expressed, up-to-date privacy policy that is available free of charge, describing how they manage personal information including collection, use, disclosure, storage and access. X B - The privacy policy must be freely available, not provided only on request; reactive availability is insufficient. X C - Verbal explanation at the first meeting does not constitute a privacy policy; APP 1 requires a written, accessible document. X D - An internal-only policy does not satisfy APP 1; the policy must be accessible to the individuals whose information is collected.","type":"standard"},{"section":"Ethics & Corps Act","question":"Which of the following best demonstrates compliance with Standard 6 (broader long-term interests)?","a":"Advising based solely on the client's stated short-term goals","b":"Considering the client's broader circumstances and long-term outcomes","c":"Ensuring the advice maximises investment returns in the short term","d":"Focusing on financial outcomes while ignoring non-financial consequences","correct":"B","explanation":"\u2717 A - Standard 5 addresses suitability to client goals; Standard 6 requires consideration beyond those stated goals. \u2713 B - Standard 6 requires advisers to take account of the broad effects of their advice, including likely long-term outcomes beyond the immediate advice. \u2717 C - Standard 6 is not about return maximisation; it is about the wider effects of advice. \u2717 D - Standard 6 explicitly requires consideration of non-financial consequences and long-term wellbeing.","type":"standard"},{"section":"Scaled Advice","question":"A client with a comprehensive financial plan calls to discuss one specific change - switching their income protection policy.","a":"Scaled advice does not require the best interests duty to be met","b":"Scaled advice is general advice because its scope is limited to one","c":"Scaled advice is personal advice limited in scope by agreement with the client","d":"Scaled advice is only permitted when the advice relates to insurance","correct":"C","explanation":"\u2717 A - The best interests duty applies to all personal advice including scaled advice; the scope limitation does not remove the duty. \u2717 B - Scaled advice is personal advice, not general advice; the adviser has considered the client's circumstances within the agreed scope. \u2713 C - Scaled advice is personal advice. The scope is agreed with the client and limited to specific subject matter, but the best interests duty applies fully within that scope. \u2717 D - Scaled advice is available across all advice topics, not only insurance.","type":"standard"},{"section":"Code Values","question":"Fairness is NOT listed. An adviser notices their own recommendation may be influenced by a recent bad experience with a similar product and takes extra care to assess the current product on its own merits. Which value best applies?","a":"Trustworthiness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Recognising that a personal bias could influence a recommendation does serve the client's interest by leading to a correction, but the primary value demonstrated by identifying and disclosing one's own potential bias is Honesty. \u2713 B - Honesty requires advisers to be truthful and transparent, including about their own potential biases or conflicts that could affect the objectivity of their advice. Noticing that a recent bad experience with a particular product category could be influencing a recommendation - and disclosing that potential bias - is a direct demonstration of Honesty. The adviser takes personal responsibility for transparent communication about the limits of their own objectivity. X C - Competence relates to knowledge and skills. Recognising the effect of bias on professional judgment requires self-awareness, but the act of disclosing that potential bias to the client is Honesty. X D - Diligence relates to thoroughness and due care. Identifying a potential bias in one's own recommendation is diligent, but disclosing it to the client is Honesty. Note: Fairness would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Client Scenarios","question":"A financial planning firm transfers client data to a cloud storage provider based overseas. Which APP is MOST directly engaged?","a":"APP 8","b":"APP 6","c":"APP 3","d":"APP 11","correct":"A","explanation":"\u2713 A - APP 8 - This is correct because APP 8 of the Privacy Act 1988 (Cth) specifically governs the cross-border disclosure of personal information. When a financial planning firm transfers client data to an overseas cloud provider, this constitutes a disclosure to an overseas recipient - engaging APP 8. The Australian entity remains accountable if the overseas recipient mishandles the information. X B - APP 6 - This is incorrect because APP 6 governs the use and disclosure of personal information generally - including domestic disclosures. However, APP 8 is the more specific provision that applies when the disclosure is to an overseas recipient, making it the primary APP engaged here. X C - APP 3 - This is incorrect because APP 3 governs the collection of solicited personal information. The information was already collected - transferring it to an overseas cloud provider is a disclosure issue, not a collection issue. X D - APP 11 - This is incorrect because APP 11 governs the security of personal information. While overseas storage raises security concerns, the primary provision engaged by the act of transferring data to an overseas entity is APP 8 - the cross-border disclosure obligation.","type":"standard"},{"section":"Conflicted Remuneration","question":"An investment company flies an adviser to an island resort once a year in recognition of funds placed with them. What type of benefit is this?","a":"Volume-based commission","b":"Soft-dollar benefit","c":"Conflicted remuneration under s963A","d":"Permissible business expense","correct":"B","explanation":"\u2717 A - Volume-based commission - This is incorrect because a volume-based commission is a monetary (cash) payment calculated by reference to the volume of business placed. A resort trip is a non-cash benefit - it is not a commission in the monetary sense, making soft-dollar benefit the more precise classification. \u2713 B - Soft-dollar benefit - This is correct because a resort trip provided in recognition of funds placed with a product company is a non-cash benefit linked to recommendation behaviour. In financial services, such non-cash benefits are classified as 'soft-dollar benefits' - they include travel, accommodation, conferences and entertainment provided to advisers by product manufacturers or licensees in connection with the placement of client funds. \u2717 C - Conflicted remuneration under s963A - This is incorrect because while the trip may ultimately constitute conflicted remuneration, the more precise initial characterisation is as a soft-dollar benefit. Whether it constitutes conflicted remuneration under Part 7.7A Division 4 requires further analysis. \u2717 D - Permissible business expense - This is incorrect because a resort trip provided by a product company to an adviser for placing client funds is not the adviser's own business expense - it is a benefit received from a third party linked to product placement. It is not a legitimate business expense of the advice practice.","type":"standard"},{"section":"Client Scenarios","question":"A financial planning firm receives a subpoena requiring disclosure of a client's financial records in legal proceedings. Which of the following BEST describes the firm's obligations?","a":"A breach of APP 6 - no exceptions apply to court-ordered disclosures","b":"Permitted - disclosure required or authorised by law is an exception","c":"Permitted only if the client provides prior written consent to the disclosure","d":"Permitted only if both ASIC and the OAIC have approved the disclosure","correct":"B","explanation":"X A - APP 6 contains several exceptions; court-ordered disclosure is specifically carved out. \u2713 B - APP 6(c) of the Privacy Act expressly permits use or disclosure of personal information where required or authorised by or under an Australian law. A subpoena falls within this exception. X C - Client consent is one basis for disclosure under APP 6 but it is not required where a legal obligation to disclose exists. X D - Neither ASIC nor OAIC approval is required for disclosure pursuant to a court subpoena.","type":"standard"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser documents every client interaction including phone calls and informal conversations to ensure a complete record exists. Which value best applies?","a":"Honesty","b":"Competence","c":"Fairness","d":"Trustworthiness","correct":"D","explanation":"X A - Honesty relates to truthful and transparent communication. Documenting every client interaction - including informal ones - is not about the truthfulness of communication - it is about the completeness and reliability of the professional record. X B - Competence relates to knowledge and skills. Thorough documentation is not a knowledge challenge - it is a professional discipline of reliable, consistent record-keeping. X C - Fairness relates to equitable treatment of clients. Documenting all interactions is not about comparing the treatment of different clients - it is about the reliability and integrity of each individual client record. \u2713 D - Trustworthiness requires advisers to maintain complete and reliable records of all client interactions so that clients can depend on an accurate account of what was discussed and agreed. Documenting every interaction - including informal phone calls - demonstrates professional reliability and ensures that the client relationship is built on a foundation of transparent, verifiable conduct. Note: Diligence would also be a strong answer were it not excluded from this question.","type":"values"},{"section":"Ethics & Corps Act","question":"An adviser has not completed any CPD in two years and continues advising on complex SMSF strategies. Standard 10 of the Code of Ethics emphasises:","a":"Adviser accountability to the profession","b":"Avoidance of conflicted remuneration","c":"Promoting ethical leadership","d":"Maintaining competence through CPD","correct":"D","explanation":"\u2717 A - Adviser professionalism and accountability to the profession - This is incorrect because professional accountability to peers and the profession is the subject of Standard 12, which requires advisers to 'uphold and promote the ethical standards of the profession.' \u2717 B - Avoidance of conflicted remuneration - This is incorrect because conflicted remuneration is regulated under the FOFA reforms in Part 7.7A Division 4 of the Corporations Act (ss963A-963L), not Standard 10. Standard 10 is specifically about competence. \u2717 C - Promoting ethical leadership - This is incorrect because while ethical leadership is related to Standard 12 (upholding professional standards), Standard 10 is specifically focused on the development and maintenance of individual knowledge and skills. \u2713 D - Maintaining competence and CPD - This is correct because Standard 10 of the FASEA Code of Ethics specifically requires advisers to 'develop, maintain and apply a high level of relevant knowledge and skills.' This directly encompasses maintaining competence through CPD and ongoing professional development.","type":"standard"},{"section":"Code Values","question":"Which is the second FASEA Code Value that best supports the obligation to know your client?","a":"Honesty","b":"Trustworthiness","c":"Fairness","d":"Competence","correct":"B","explanation":"X A - Honesty relates to truthful and transparent communication with clients. While honest communication supports good client relationships, the specific value of consistently acting in clients' long-term interests and maintaining their confidence is Trustworthiness. \u2713 B - Trustworthiness requires advisers to act reliably and in their clients' long-term interests, and to maintain client confidence through consistent, dependable conduct. An adviser who genuinely knows their client - understanding their life circumstances, goals and concerns - builds the kind of enduring trust that allows clients to rely on the advice relationship. This is the foundation of Trustworthiness. X C - Fairness relates to professional objectivity and equitable treatment. Knowing each client individually is not about treating clients comparably to each other - it is about the quality and reliability of the individual relationship. X D - Competence relates to knowledge, skills and professional development. While knowing clients requires skill in questioning and assessment, the specific obligation to maintain a deep, reliable understanding of each client's circumstances over time is an expression of Trustworthiness.","type":"values"},{"section":"Code Values","question":"Trustworthiness is NOT listed. An adviser recommends a product that benefits the licensee more than the client without disclosure. Which value is most clearly breached?","a":"Fairness","b":"Competence","c":"Diligence","d":"Honesty","correct":"A","explanation":"\u2713 A - Fairness requires advisers to maintain professional objectivity and to recommend products based on the client's needs rather than the adviser's or licensee's financial benefit. Recommending a product that benefits the licensee more than the client - without disclosure - is a direct breach of Fairness. The adviser allows institutional financial interests to distort professional objectivity. Note: Trustworthiness would also be a strong answer were it not excluded from this question. X B - Competence relates to knowledge and skills. Recommending an unsuitable product is not a knowledge failure - the adviser may fully understand both products. It is a failure to apply professional objectivity. X C - Diligence relates to thoroughness in the advice process. Recommending the licensee's preferred product without disclosure is not a failure of thoroughness - it is a failure of professional objectivity. X D - Honesty relates to truthful and transparent communication. The failure to disclose the conflict is an Honesty issue, but the underlying failure of giving biased advice that benefits the licensee over the client is primarily a Fairness breach.","type":"values"},{"section":"Code Values","question":"Diligence is NOT listed. An adviser who is asked a question on a topic they last studied five years ago checks updated references before responding. Which value best applies?","a":"Competence","b":"Fairness","c":"Trustworthiness","d":"Honesty","correct":"A","explanation":"\u2713 A - Competence requires advisers to maintain current knowledge across the areas they advise in, including pausing to refresh knowledge before answering questions on topics not recently studied. Checking current guidance before answering a client question on a topic last studied five years ago - rather than answering from potentially outdated memory - demonstrates the professional commitment to current, accurate knowledge that Competence demands. Note: Diligence would also be a strong answer were it n
