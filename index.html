ot excluded from this question. X B - Fairness relates to equitable treatment of clients. Refreshing knowledge before answering a specific client's question is not about comparing the treatment of different clients - it is about the quality of professional knowledge available to this client. X C - Trustworthiness relates to acting reliably in the client's long-term interest. While providing current, accurate answers serves the client's long-term interest, the specific conduct of refreshing knowledge before answering is most directly Competence. X D - Honesty relates to truthful communication. Refreshing knowledge to ensure an accurate answer is not primarily about the truthfulness of communication - it is about the currency and quality of professional knowledge.","type":"values"},{"section":"Code Values","question":"An adviser tells a couple that the strategy they want to pursue - using their SMSF to lend money to a family member - is illegal under the SIS Act, even though they know the couple will be disappointed. Which value does this MOST demonstrate?","a":"Trustworthiness","b":"Honesty","c":"Competence","d":"Diligence","correct":"B","explanation":"X A - Trustworthiness relates to acting reliably in the client's long-term interest. Telling clients that their SMSF plan is illegal does serve their long-term interest, but the primary value demonstrated by proactively telling them a truth they may not want to hear is Honesty. \u2713 B - Honesty requires advisers to tell clients the truth, including when that truth is unwelcome. Informing a couple that their proposed SMSF strategy - lending money to their son at below-market rates - is illegal, despite their enthusiasm for the plan, is a direct demonstration of Honesty. The adviser prioritises truthful guidance over client approval. X C - Competence relates to knowledge and skills. Knowing that the strategy is illegal requires competence, but communicating that truth to the clients is Honesty. X D - Diligence relates to thoroughness and due care. Identifying the illegality of the strategy may require diligent review, but the act of clearly informing the clients is Honesty.","type":"values"},{"section":"Code Values","question":"An adviser creates a structured annual review process that systematically considers changes in a client's circumstances, legislative changes, and product changes. Which value does this MOST demonstrate?","a":"Diligence","b":"Honesty","c":"Fairness","d":"Trustworthiness","correct":"A","explanation":"\u2713 A - Diligence requires advisers to perform all professional engagements with due care and thoroughness, including implementing structured, systematic processes for regular client reviews. Creating a documented annual review process that systematically considers changes in a client's life circumstances, investment performance and regulatory environment demonstrates the professional commitment to thoroughness and continuous engagement that Diligence demands. X B - Honesty relates to truthful communication. Creating a review process is not about the truthfulness of communication - it is about the systematic thoroughness of professional engagement. X C - Fairness relates to equitable treatment of clients. A structured review process does ensure all clients receive the same quality of review, but the primary value demonstrated by creating a rigorous, documented process is Diligence. X D - Trustworthiness relates to acting reliably in the client's long-term interest. While systematic annual reviews do serve clients' long-term interests, the specific conduct of creating and implementing a thorough process is most directly Diligence.","type":"values"},{"section":"Client Scenarios","question":"A client asks their financial adviser to recommend the best home loan for their owner-occupied property purchase. The adviser does not hold an ACL. Which of the following BEST describes the adviser's obligations?","a":"Recommending a specific home loan requires an ACL","b":"The adviser can recommend a home loan as it is connected to the client's","c":"The adviser can compare home loan options and present this as factual","d":"The adviser can recommend a home loan if they disclose they are not a credit","correct":"A","explanation":"\u2713 A - Recommending a specific home loan is credit advice regulated under the National Consumer Credit Protection Act 2009. An Australian Credit Licence (ACL) is required; an AFSL does not cover credit advice. X B - Connection to the client's financial position does not extend the AFSL to cover credit advice. X C - Presenting a specific loan comparison as factual information does not avoid the credit advice characterisation. X D - Disclosure does not authorise credit advice under an AFSL.","type":"standard"}]}]
</script>

<script>
var DAYS = null;
try {
  DAYS = JSON.parse(document.getElementById('qdata').textContent);
} catch(e) {
  document.body.innerHTML += '<p style="color:red;padding:20px">Error loading data: ' + e.message + '</p>';
}

var ST = {};
try { ST = JSON.parse(localStorage.getItem('fasea_s') || '{}'); } catch(e) { ST = {}; }
var cDay = 0, cQ = 0, cPhase = 'wu', answered = false;

function save() { try { localStorage.setItem('fasea_s', JSON.stringify(ST)); } catch(e) {} }
function ds(d) {
  if (!ST[d]) ST[d] = { wa: {}, ra: {}, wdone: false, done: false };
  return ST[d];
}

// \u2500\u2500 Logbook \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var lbDone = false;
function lbPick(yes) {
  if (lbDone) return;
  lbDone = true;
  var yb = document.getElementById('lb-yes');
  var nb = document.getElementById('lb-no');
  var msg = document.getElementById('lb-msg');
  var go = document.getElementById('lb-go');
  if (yes) {
    yb.style.background = '#def7ec';
    nb.style.opacity = '0.3';
    msg.className = 'lb-msg yes-msg';
    msg.textContent = 'Great - staying on top of your CPD log keeps Standard 10 covered. Time to study!';
  } else {
    nb.style.background = '#fde8e8';
    yb.style.opacity = '0.3';
    msg.className = 'lb-msg no-msg';
    msg.textContent = 'Make a note to update it after your session today. Standard 10 requires your CPD to be current!';
  }
  go.className = 'ov-btn btn-blue vis';
  go.style.display = 'block';
}

function startApp() {
  document.getElementById('lb').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildTabs();
  renderOv();
}

// \u2500\u2500 Tabs \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function buildTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  DAYS.forEach(function(day, i) {
    var d = ds(i);
    var cls = d.done ? 'tab done' : (i === cDay ? 'tab act' : 'tab');
    var b = document.createElement('button');
    b.className = cls;
    b.textContent = day.label.split(' ')[0];
    b.setAttribute('onclick', 'selDay(' + i + ')');
    el.appendChild(b);
  });
}

function selDay(i) {
  cDay = i;
  buildTabs();
  renderOv();
}

// \u2500\u2500 Overview \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderOv() {
  document.getElementById('qpanel').style.display = 'none';
  document.getElementById('done').style.display = 'none';
  document.getElementById('ov').style.display = 'block';

  var day = DAYS[cDay], d = ds(cDay);
  var wuT = day.warmup.length, regT = day.questions.length;
  var wuD = Object.keys(d.wa).length, regD = Object.keys(d.ra).length;
  var wuC = 0, regC = 0;
  Object.keys(d.wa).forEach(function(i) { if (d.wa[i] === day.warmup[i].correct) wuC++; });
  Object.keys(d.ra).forEach(function(i) { if (d.ra[i] === day.questions[i].correct) regC++; });
  var totD = wuD + regD, totC = wuC + regC, totQ = wuT + regT, rem = totQ - totD;
  var wuP = Math.round(wuD / wuT * 100), regP = Math.round(regD / regT * 100);
  var mb = day.mode === 'standards' ? '<span class="bdg b-std">Standards only</span>' : '<span class="bdg b-mix">Standards + Values</span>';
  var btns = '';
  if (d.done) {
    btns = '<button class="ov-btn btn-blue" onclick="showRev()">Review all answers</button><button class="ov-btn btn-reset" onclick="resetDay()">Reset day</button>';
  } else if (!d.wdone) {
    btns = '<button class="ov-btn btn-teal" onclick="goPhase(\'wu\')">Start warm-up (12 standards)</button>';
  } else {
    btns = '<button class="ov-btn btn-blue" onclick="goPhase(\'reg\')">Continue to questions &rarr;</button><button class="ov-btn btn-reset" onclick="resetDay()">Reset day</button>';
  }
  document.getElementById('ov-card').innerHTML =
    '<h2>' + esc(day.label) + '</h2>' +
    '<div class="badges">' + mb + '<span class="bdg b-wu">12 warm-up</span><span class="bdg b-cnt">' + totQ + ' total</span></div>' +
    '<div class="progs">' +
      '<div class="prow"><div class="plbl"><span>Warm-up</span><span>' + wuD + '/' + wuT + '</span></div><div class="ptrack"><div class="pfill wu-fill" style="width:' + wuP + '%"></div></div></div>' +
      '<div class="prow"><div class="plbl"><span>Questions</span><span>' + regD + '/' + regT + '</span></div><div class="ptrack"><div class="pfill reg-fill" style="width:' + regP + '%"></div></div></div>' +
    '</div>' +
    '<div class="scores">' +
      '<div class="sc sc-c"><div class="n">' + totC + '</div><div class="l">Correct</div></div>' +
      '<div class="sc sc-w"><div class="n">' + (totD - totC) + '</div><div class="l">Wrong</div></div>' +
      '<div class="sc sc-r"><div class="n">' + rem + '</div><div class="l">Remaining</div></div>' +
    '</div>' + btns;

  if (d.done) buildRev();
  else document.getElementById('revwrap').style.display = 'none';
}

function showRev() {
  buildRev();
  document.getElementById('revwrap').scrollIntoView({ behavior: 'smooth' });
}

function buildRev() {
  var wrap = document.getElementById('revwrap');
  wrap.style.display = 'block';
  var day = DAYS[cDay], d = ds(cDay), html = '';
  html += '<div class="rev-title">Warm-up - Standards</div>';
  day.warmup.forEach(function(q, i) {
    var g = d.wa[i], ok = g === q.correct;
    var ct = q[q.correct.toLowerCase()] || q.correct;
    var gt = g ? (q[g.toLowerCase()] || g) : '--';
    html += '<div class="ri wu-ri ' + (ok ? 'ok' : 'no') + '">' +
      '<div class="ri-q">' + (i + 1) + '. ' + esc(q.question) + '</div>' +
      '<div class="ri-a">Your answer: <b style="color:' + (ok ? '#0e9f6e' : '#e02424') + '">' + esc(gt) + '</b>' +
      (!ok ? ' &middot; Correct: <b style="color:#0e9f6e">' + esc(ct) + '</b>' : '') + '</div>' +
      '<button class="ri-tog" onclick="togExp(this)">Show explanation</button>' +
      '<div class="ri-exp">' + esc(q.explanation) + '</div></div>';
  });
  html += '<div class="rev-title">Questions</div>';
  day.questions.forEach(function(q, i) {
    var g = d.ra[i], ok = g === q.correct;
    var ct = q[q.correct.toLowerCase()] || q.correct;
    var gt = g ? (q[g.toLowerCase()] || g) : '--';
    html += '<div class="ri ' + (ok ? 'ok' : 'no') + '">' +
      '<div class="ri-q">' + (i + 1) + '. ' + esc(q.question) + '</div>' +
      '<div class="ri-a">Your answer: <b style="color:' + (ok ? '#0e9f6e' : '#e02424') + '">' + esc(gt) + '</b>' +
      (!ok ? ' &middot; Correct: <b style="color:#0e9f6e">' + esc(ct) + '</b>' : '') + '</div>' +
      '<button class="ri-tog" onclick="togExp(this)">Show explanation</button>' +
      '<div class="ri-exp">' + esc(q.explanation) + '</div></div>';
  });
  wrap.innerHTML = html;
}

function togExp(btn) {
  var e = btn.nextElementSibling;
  e.classList.toggle('open');
  btn.textContent = e.classList.contains('open') ? 'Hide explanation' : 'Show explanation';
}

// \u2500\u2500 Quiz \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function goPhase(phase) {
  cPhase = phase;
  var d = ds(cDay);
  var pool = phase === 'wu' ? DAYS[cDay].warmup : DAYS[cDay].questions;
  var ans = phase === 'wu' ? d.wa : d.ra;
  cQ = 0;
  for (var i = 0; i < pool.length; i++) {
    if (ans[i] === undefined) { cQ = i; break; }
  }
  document.getElementById('ov').style.display = 'none';
  document.getElementById('done').style.display = 'none';
  document.getElementById('qpanel').style.display = 'block';
  renderQ();
}

function renderQ() {
  var day = DAYS[cDay], d = ds(cDay);
  var isWU = cPhase === 'wu';
  var pool = isWU ? day.warmup : day.questions;
  var q = pool[cQ];

  document.getElementById('qnum').textContent = (isWU ? 'Warm-up ' : 'Question ') + (cQ + 1) + ' of ' + pool.length;

  var pi = document.getElementById('qpi');
  if (isWU) { pi.className = 'pi pi-wu'; pi.textContent = 'Standards warm-up'; }
  else if (q.type === 'values') { pi.className = 'pi pi-val'; pi.textContent = 'Values'; }
  else { pi.className = 'pi pi-reg'; pi.textContent = 'Standards'; }
  document.getElementById('qsec').textContent = isWU ? ('Standard ' + q.standard_num) : q.section;

  var card = document.getElementById('qcard');
  card.className = 'qcard ' + (isWU ? 'wu-card' : 'reg-card');

  var qtEl = document.getElementById('qtext');
  if (isWU) {
    qtEl.innerHTML = '<div class="wu-lbl">Standard ' + q.standard_num + '</div><div>' + esc(q.question) + '</div>';
  } else {
    qtEl.textContent = q.question;
  }

  var optsEl = document.getElementById('qopts');
  optsEl.innerHTML = '';
  ['a', 'b', 'c', 'd'].forEach(function(l) {
    if (!q[l]) return;
    var b = document.createElement('button');
    b.className = 'opt' + (isWU ? ' wu-opt' : '');
    b.dataset.l = l.toUpperCase();
    b.innerHTML = '<span class="oltr">' + l.toUpperCase() + '</span><span>' + esc(q[l]) + '</span>';
    b.onclick = function() { pickAns(l.toUpperCase(), q); };
    optsEl.appendChild(b);
  });

  var expEl = document.getElementById('expbox');
  expEl.className = 'expbox' + (isWU ? ' wu-exp' : '');

  var ans = isWU ? d.wa : d.ra;
  var prev = ans[cQ];
  if (prev !== undefined) {
    revealAns(prev, q, isWU);
  } else {
    answered = false;
    document.getElementById('btn-next').disabled = true;
  }

  var nx = document.getElementById('btn-next');
  var isLast = cQ >= pool.length - 1;
  nx.className = 'btn-next' + (isWU ? ' teal-next' : '');
  if (isWU && isLast) nx.textContent = 'Start questions \u2192';
  else if (isLast) nx.textContent = 'Finish \u2713';
  else nx.textContent = 'Next \u2192';
}

function pickAns(letter, q) {
  if (answered) return;
  answered = true;
  var d = ds(cDay);
  if (cPhase === 'wu') d.wa[cQ] = letter;
  else d.ra[cQ] = letter;
  save();
  revealAns(letter, q, cPhase === 'wu');
}

function revealAns(given, q, isWU) {
  answered = true;
  var correct = q.correct.toUpperCase();
  var btns = document.querySelectorAll('.opt');
  btns.forEach(function(b) {
    b.classList.add('answered');
    var l = b.dataset.l;
    if (l === correct && l === given) b.classList.add('correct');
    else if (l === given) b.classList.add('wrong');
    else if (l === correct) b.classList.add('show-correct');
  });
  var ok = given === correct;
  var ct = q[correct.toLowerCase()] || correct;
  var expEl = document.getElementById('expbox');
  expEl.className = 'expbox vis' + (isWU ? ' wu-exp' : '');
  expEl.innerHTML =
    '<div class="res-badge ' + (ok ? 'res-ok' : 'res-no') + '">' + (ok ? '\u2713 Correct!' : '\u2717 Incorrect') + '</div>' +
    (!ok ? '<div style="margin-bottom:7px;font-size:0.8rem">Correct: <strong>' + esc(ct) + '</strong></div>' : '') +
    '<div class="exp-title">Explanation</div>' +
    '<div>' + esc(q.explanation) + '</div>';
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  var day = DAYS[cDay], d = ds(cDay);
  var pool = cPhase === 'wu' ? day.warmup : day.questions;
  if (cQ < pool.length - 1) {
    cQ++;
    renderQ();
    window.scrollTo(0, 0);
  } else if (cPhase === 'wu') {
    d.wdone = true;
    save();
    cPhase = 'reg';
    cQ = 0;
    for (var i = 0; i < day.questions.length; i++) {
      if (d.ra[i] === undefined) { cQ = i; break; }
    }
    renderQ();
    window.scrollTo(0, 0);
  } else {
    d.done = true;
    save();
    showDone();
  }
}

function showDone() {
  document.getElementById('qpanel').style.display = 'none';
  document.getElementById('ov').style.display = 'none';
  document.getElementById('done').style.display = 'block';
  var day = DAYS[cDay], d = ds(cDay);
  var wuC = 0, regC = 0;
  Object.keys(d.wa).forEach(function(i) { if (d.wa[i] === day.warmup[i].correct) wuC++; });
  Object.keys(d.ra).forEach(function(i) { if (d.ra[i] === day.questions[i].correct) regC++; });
  var tot = day.warmup.length + day.questions.length, cor = wuC + regC;
  var pct = Math.round(cor / tot * 100);
  document.getElementById('done-pct').textContent = pct + '%';
  document.getElementById('done-h').textContent = pct >= 80 ? 'Excellent Nathan!' : pct >= 60 ? 'Good effort - review the misses!' : "Keep going - you've got this!";
  document.getElementById('done-p').textContent = cor + ' of ' + tot + ' correct - ' + day.label;
  document.getElementById('d-wu').textContent = wuC + '/12';
  document.getElementById('d-reg').textContent = regC + '/28';
  buildTabs();
}

function goOv() {
  document.getElementById('qpanel').style.display = 'none';
  document.getElementById('done').style.display = 'none';
  document.getElementById('ov').style.display = 'block';
  renderOv();
  buildTabs();
}

function resetDay() {
  if (!confirm('Reset all answers for this day?')) return;
  ST[cDay] = { wa: {}, ra: {}, wdone: false, done: false };
  save();
  renderOv();
  buildTabs();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
